<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Flappy Bird</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #1b2b34;
    font-family: "Segoe UI", system-ui, sans-serif;
    overflow: hidden;
  }
  body {
    background: #000;
    user-select: none;
    -webkit-user-select: none;
  }
  .wrap {
    position: fixed;
    inset: 0;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    background: #4ec0ca;
    cursor: pointer;
    touch-action: none;
  }
  .hint {
    position: absolute;
    bottom: 10px;
    left: 0;
    right: 0;
    text-align: center;
    color: rgba(255,255,255,0.75);
    font-size: 13px;
    letter-spacing: 0.03em;
    pointer-events: none;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  }
  #nameInput {
    position: absolute;
    display: none;
    box-sizing: border-box;
    border: 2px solid #ffd400;
    border-radius: 8px;
    background: rgba(255,255,255,0.96);
    color: #1b2b34;
    font: 14px "Segoe UI", sans-serif;
    padding: 0 10px;
    outline: none;
  }
  #nameInput::placeholder { color: #90a0ab; }
  #saveBtn {
    position: absolute;
    display: none;
    box-sizing: border-box;
    border: none;
    border-radius: 8px;
    background: #ffd400;
    color: #1b2b34;
    font: bold 13px "Segoe UI", sans-serif;
    cursor: pointer;
  }
  #saveBtn:hover { background: #ffdd33; }

  /* ---- Admin paneli ---- */
  #adminBtn {
    position: fixed; right: 12px; bottom: 12px; width: 42px; height: 42px;
    border-radius: 12px; background: rgba(10,16,22,0.55); color: #fff;
    border: 1px solid rgba(255,255,255,0.18); font-size: 20px; line-height: 40px;
    text-align: center; cursor: pointer; z-index: 50; user-select: none;
    backdrop-filter: blur(4px); transition: background .15s ease, transform .15s ease;
  }
  #adminBtn:hover { background: rgba(10,16,22,0.85); transform: translateY(-2px); }
  #adminOverlay {
    position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(3,7,12,0.68); z-index: 100; backdrop-filter: blur(5px); padding: 12px;
  }
  #adminBox {
    width: min(460px, 96vw); max-height: 90vh; overflow-y: auto;
    background: linear-gradient(180deg, #1c2a33 0%, #121c23 100%);
    border: 1px solid rgba(255,255,255,0.10); border-radius: 18px; padding: 0;
    color: #e8eef2; font: 14px "Segoe UI", system-ui, sans-serif;
    box-shadow: 0 24px 70px rgba(0,0,0,0.7);
  }
  .adm-head {
    padding: 18px 22px 14px; border-bottom: 1px solid rgba(255,255,255,0.07);
    background: linear-gradient(180deg, rgba(255,212,0,0.07), rgba(255,212,0,0));
    position: sticky; top: 0; z-index: 2; backdrop-filter: blur(6px);
  }
  .adm-title { font-size: 18px; font-weight: 700; color: #ffd400; letter-spacing: .3px; }
  #adminBox .sub { font-size: 12px; color: #8ea1ac; margin-top: 3px; }
  #adminLogin, #adminControls { padding: 16px 22px 20px; }
  #adminLogin input {
    width: 100%; height: 44px; border-radius: 11px; border: 1px solid rgba(255,255,255,0.14);
    background: rgba(255,255,255,0.06); color: #fff; padding: 0 14px;
    font: 15px "Segoe UI", sans-serif; outline: none; margin-bottom: 10px; transition: border-color .15s;
  }
  #adminLogin input:focus { border-color: #ffd400; }
  #adminErr { color: #ff6a5a; font-size: 12px; min-height: 16px; margin-bottom: 8px; }
  .adm-sec {
    margin: 18px 0 9px; font-size: 11px; font-weight: 700; color: #ffd400;
    text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.9;
    display: flex; align-items: center; gap: 10px;
  }
  .adm-sec::after { content: ""; flex: 1; height: 1px; background: rgba(255,255,255,0.09); }
  .adm-row {
    display: flex; align-items: center; gap: 10px; margin: 7px 0;
    background: rgba(255,255,255,0.035); border-radius: 9px; padding: 7px 11px;
  }
  .adm-row label { flex: 1; font-size: 13px; color: #cdd8de; }
  .adm-row input[type=range] { flex: 1.4; accent-color: #ffd400; }
  .adm-row .val { width: 52px; text-align: right; font-weight: 700; color: #ffd400; font-size: 13px; }
  .adm-check {
    display: flex; align-items: center; gap: 11px; margin: 6px 0; padding: 9px 11px;
    background: rgba(255,255,255,0.035); border-radius: 9px; cursor: pointer; transition: background .12s;
  }
  .adm-check:hover { background: rgba(255,255,255,0.07); }
  .adm-check input { width: 17px; height: 17px; accent-color: #ffd400; }
  .adm-check label { flex: 1; font-size: 13px; color: #cdd8de; cursor: pointer; }
  .adm-btns { display: flex; flex-wrap: wrap; gap: 9px; margin-top: 13px; }
  .adm-btns button {
    flex: 1; min-width: 130px; height: 42px; border: 1px solid transparent; border-radius: 11px;
    font: 700 13px "Segoe UI", sans-serif; cursor: pointer; transition: filter .15s, transform .08s, background .15s;
  }
  .adm-btns button:hover { filter: brightness(1.12); }
  .adm-btns button:active { transform: translateY(1px); }
  .btn-y { background: #ffd400; color: #1b2b34; }
  .btn-g { background: #2f8f4a; color: #fff; }
  .btn-d { background: transparent; color: #ff8a7a; border-color: rgba(255,90,60,0.5); }
  .btn-d:hover { background: rgba(255,90,60,0.14); filter: none; }
  .btn-x { background: rgba(255,255,255,0.08); color: #e8eef2; }
</style>
</head>
<body>
  <div class="wrap">
    <canvas id="game" width="420" height="600"></canvas>
    <input id="nameInput" maxlength="12" placeholder="Your name..." autocomplete="off" />
    <button id="saveBtn">Save</button>
    <div class="hint" id="hint">Pick a mode from the main menu · Tap to play · ESC to pause · 💰 buy skins in the shop · Tap to retry</div>
  </div>

  <div id="adminBtn" title="Admin">⚙</div>
  <div id="adminOverlay">
    <div id="adminBox">
      <div class="adm-head">
        <div class="adm-title">⚙ Admin Panel</div>
        <div class="sub">Developer tools &amp; live tuning</div>
      </div>
      <div id="adminLogin">
        <input id="adminPass" type="password" placeholder="Enter password" autocomplete="off" />
        <div id="adminErr"></div>
        <div class="adm-btns">
          <button class="btn-y" id="adminGiris">Unlock</button>
          <button class="btn-x" id="adminKapat1">Close</button>
        </div>
      </div>
      <div id="adminControls" style="display:none;">
        <div class="adm-sec">🎚 Tuning</div>
        <div id="adminFields"></div>
        <div class="adm-check">
          <input type="checkbox" id="cfgGapScale" />
          <label for="cfgGapScale">Scale gap to screen height</label>
        </div>
        <div class="adm-check">
          <input type="checkbox" id="cfgPowerups" />
          <label for="cfgPowerups">Power-ups enabled</label>
        </div>
        <div class="adm-sec">🔊 Audio</div>
        <div class="adm-check">
          <input type="checkbox" id="cfgSound" />
          <label for="cfgSound">Sound effects</label>
        </div>
        <div class="adm-check">
          <input type="checkbox" id="cfgMusic" />
          <label for="cfgMusic">Music</label>
        </div>
        <div class="adm-check">
          <input type="checkbox" id="cfgVibrate" />
          <label for="cfgVibrate">📳 Vibration (mobile)</label>
        </div>
        <div class="adm-sec">⚠ Danger zone</div>
        <div class="adm-btns">
          <button class="btn-d" id="adminSkorSifirla">Reset Best</button>
          <button class="btn-d" id="adminAltinSifirla">Reset Coins</button>
        </div>
        <div class="adm-btns">
          <button class="btn-d" id="adminDeriSifirla">Reset Skins</button>
          <button class="btn-d" id="adminTabloTemizle">Clear Leaderboard</button>
        </div>
        <div class="adm-btns" style="margin-top:16px;">
          <button class="btn-g" id="adminVarsayilan">Restore Defaults</button>
          <button class="btn-y" id="adminKapat2">Save &amp; Close</button>
        </div>
      </div>
    </div>
  </div>

<script>
(function () {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const nameInput = document.getElementById("nameInput");
  const saveBtn = document.getElementById("saveBtn");

  // Tam ekran: canvas pencereyi doldurur · gfxDpr = grafik kalitesi çözünürlük çarpanı
  let W, H, gfxDpr = 1;
  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.round(W * gfxDpr);
    canvas.height = Math.round(H * gfxDpr);
    ctx.setTransform(gfxDpr, 0, 0, gfxDpr, 0, 0);   // yüksek çözünürlükte keskinlik
  }
  resize();
  window.addEventListener("resize", resize);

  // ---- Sabitler ----
  const BALL_R = 16;
  const PIPE_W = 62;
  const GROUND_H = 90;

  // ---- Ayarlanabilir CONFIG (admin panelinden değiştirilebilir) ----
  const DEFAULT_CONFIG = {
    gravity: 0.26,
    jump: -6.1,
    pipeSpeed: 2.4,
    interval: 430,     // borular arası yatay mesafe — nefes alacak kadar geniş
    gapGreen: 235,     // tam ekran için daha geniş boşluklar
    gapYellow: 210,
    gapRed: 190,
    pointsRed: 2,
    probGreen: 70,
    probYellow: 20,
    probRed: 10,
    milestone: 35,
    powerups: true,    // güçlendiriciler aktif mi
    gapScale: true,    // boşluğu ekran yüksekliğine göre ölçekle
    sound: true,       // ses efektleri
    music: true,       // müzik
    musicVol: 35,      // müzik ses seviyesi (%)
    sfxVol: 80,        // efekt ses seviyesi (%)
    vibrate: true,     // 📳 mobil titreşim (haptic)
    quality: "med"     // ✨ grafik kalitesi: "low" | "med" | "high"
  };
  let CONFIG = Object.assign({}, DEFAULT_CONFIG);
  try {
    const saved = JSON.parse(localStorage.getItem("flappy_cfg") || "{}");
    CONFIG = Object.assign(CONFIG, saved);
  } catch (e) {}
  function saveConfig() { localStorage.setItem("flappy_cfg", JSON.stringify(CONFIG)); }

  // ================= SES (Web Audio · prosedürel, dosyasız) =================
  const Sound = (function () {
    let ctx = null, master, musicGain, sfxGain, noiseBuf = null, delaySend = null;
    let sfxOn = true, musicOn = true, musicVol = 0.35, sfxVol = 0.8;
    let rainNode = null, rainGain = null;
    let musicTimer = null, musicKind = null, musicStep = 0;

    function ensure() {
      if (ctx) return true;
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return false;
      ctx = new AC();
      master = ctx.createGain(); master.gain.value = 0.9; master.connect(ctx.destination);
      musicGain = ctx.createGain(); musicGain.gain.value = musicVol; musicGain.connect(master);
      sfxGain = ctx.createGain(); sfxGain.gain.value = sfxVol; sfxGain.connect(master);
      // Echo/delay bus — müzik ve bazı efektler buraya gönderilir → derinlik/mekân hissi
      delaySend = ctx.createGain(); delaySend.gain.value = 1;
      const dl = ctx.createDelay(0.7); dl.delayTime.value = 0.26;
      const fb = ctx.createGain(); fb.gain.value = 0.30;
      const damp = ctx.createBiquadFilter(); damp.type = "lowpass"; damp.frequency.value = 2400;
      const wet = ctx.createGain(); wet.gain.value = 0.85;
      delaySend.connect(dl); dl.connect(damp); damp.connect(fb); fb.connect(dl); damp.connect(wet); wet.connect(master);
      noiseBuf = ctx.createBuffer(1, ctx.sampleRate, ctx.sampleRate);
      const d = noiseBuf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      return true;
    }
    function resume() { if (ensure() && ctx.state === "suspended") ctx.resume(); }

    function tone(freq, dur, type, vol, slideTo, delay) {
      if (!sfxOn || !ensure()) return;
      const t = ctx.currentTime + (delay || 0);
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = type || "square";
      o.frequency.setValueAtTime(freq, t);
      if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1, slideTo), t + dur);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(vol || 0.25, t + 0.014);   // yumuşak atak (çıt yok)
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(g); g.connect(sfxGain);
      o.start(t); o.stop(t + dur + 0.04);
    }
    function noise(dur, vol, filterType, filterFreq, sweepTo) {
      if (!sfxOn || !ensure()) return;
      const t = ctx.currentTime;
      const src = ctx.createBufferSource(); src.buffer = noiseBuf; src.loop = true;
      const g = ctx.createGain();
      const f = ctx.createBiquadFilter(); f.type = filterType || "lowpass";
      f.frequency.setValueAtTime(filterFreq || 1000, t);
      if (sweepTo) f.frequency.exponentialRampToValueAtTime(sweepTo, t + dur);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(vol || 0.3, t + 0.02);   // yumuşak atak
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      src.connect(f); f.connect(g); g.connect(sfxGain);
      src.start(t); src.stop(t + dur + 0.05);
    }

    // Işıltılı/tatlı nota (echo bus'a bir miktar gider) — skor/coin/güç sesleri için
    function ding(freq, dur, vol, delaySec, wave, sendAmt) {
      if (!sfxOn || !ensure()) return;
      const t = ctx.currentTime + (delaySec || 0);
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = wave || "triangle"; o.frequency.value = freq;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(vol, t + 0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(g); g.connect(sfxGain);
      const send = ctx.createGain(); send.gain.value = sendAmt == null ? 0.28 : sendAmt;
      g.connect(send); send.connect(delaySend);
      o.start(t); o.stop(t + dur + 0.05);
    }

    const SFX = {
      // hafif, yuvarlak kanat "pofff" — hızlı yükselen sinüs + minik hava
      flap:    function () { tone(300, 0.09, "sine", 0.13, 560); noise(0.05, 0.04, "highpass", 3000); },
      // parlak "ding-ling" (majör üçlü yukarı, echo'lu) — tatmin edici puan
      score:   function () { ding(784, 0.11, 0.15); ding(1046.5, 0.16, 0.13, 0.065); },
      // klasik altın "pırıl" (iki hızlı tiz)
      coin:    function () { ding(988, 0.09, 0.14); ding(1319, 0.16, 0.12, 0.05); },
      // sihirli yükselen arpej (echo ile ışıltı)
      powerup: function () { ding(523, 0.09, 0.13); ding(659, 0.09, 0.13, 0.075); ding(880, 0.10, 0.13, 0.15); ding(1174, 0.22, 0.12, 0.225); },
      // "güç açılıyor" pırıltılı hum
      shield:  function () { tone(280, 0.22, "sine", 0.16, 170); ding(660, 0.25, 0.10, 0.02, "triangle", 0.4); noise(0.14, 0.06, "lowpass", 800); },
      // dramatik iniş + gümbürtü (yumuşak, sert değil)
      death:   function () { tone(415, 0.5, "triangle", 0.18, 98); tone(207, 0.55, "sine", 0.15, 72, 0.05); noise(0.34, 0.09, "lowpass", 850, 180); },
      thunder: function () { noise(0.7, 0.28, "lowpass", 1400, 90); tone(62, 0.6, "sine", 0.20, 38, 0.03); },
      fire:    function () { noise(0.32, 0.18, "highpass", 500); tone(200, 0.28, "sawtooth", 0.12, 70); },
      click:   function () { tone(720, 0.045, "sine", 0.09, 560); },
      dark:    function () { noise(0.55, 0.13, "lowpass", 560, 110); tone(150, 0.5, "sine", 0.13, 62); tone(95, 0.6, "sine", 0.11, 44, 0.06); }   // 🌑 karanlık çökerken ürkütücü uğultu
    };
    function sfx(name) { if (SFX[name]) SFX[name](); }

    // sürekli yağmur uğultusu (fırtına modu)
    function startRain() {
      if (!sfxOn || !ensure() || rainNode) return;
      rainNode = ctx.createBufferSource(); rainNode.buffer = noiseBuf; rainNode.loop = true;
      const f = ctx.createBiquadFilter(); f.type = "highpass"; f.frequency.value = 1100;
      rainGain = ctx.createGain(); rainGain.gain.value = 0.0001;
      rainNode.connect(f); f.connect(rainGain); rainGain.connect(sfxGain);
      rainNode.start();
      rainGain.gain.exponentialRampToValueAtTime(0.12, ctx.currentTime + 0.5);
    }
    function stopRain() {
      if (!rainNode) return;
      try {
        rainGain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.3);
        rainNode.stop(ctx.currentTime + 0.35);
      } catch (e) {}
      rainNode = null; rainGain = null;
    }

    // sürekli ürkütücü uğultu (Karanlık modu) — alçak sinüs + boğuk gürültü
    let droneSrc = null, droneG = null, droneOsc = null;
    function startDrone() {
      if (!sfxOn || !ensure() || droneSrc) return;
      droneG = ctx.createGain(); droneG.gain.value = 0.0001; droneG.connect(sfxGain);
      droneSrc = ctx.createBufferSource(); droneSrc.buffer = noiseBuf; droneSrc.loop = true;
      const f = ctx.createBiquadFilter(); f.type = "lowpass"; f.frequency.value = 240;
      droneSrc.connect(f); f.connect(droneG);
      droneOsc = ctx.createOscillator(); droneOsc.type = "sine"; droneOsc.frequency.value = 52;
      const og = ctx.createGain(); og.gain.value = 0.5; droneOsc.connect(og); og.connect(droneG);
      droneSrc.start(); droneOsc.start();
      droneG.gain.exponentialRampToValueAtTime(0.09, ctx.currentTime + 1.0);
    }
    function stopDrone() {
      if (!droneSrc) return;
      try {
        droneG.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.5);
        droneSrc.stop(ctx.currentTime + 0.6); droneOsc.stop(ctx.currentTime + 0.6);
      } catch (e) {}
      droneSrc = null; droneG = null; droneOsc = null;
    }

    // ---- Döngülü müzik: kompakt "mood" spec'lerinden üretilen parçalar (her sekme/mod farklı) ----
    function nf(root, semi) { return root * Math.pow(2, semi / 12); }   // yarım-ton → frekans
    // Lead motifleri (kök notaya göre yarım-ton ofset; null = es) — 16 adım
    const MEL = {
      bright:  [0, 4, 7, 12, 7, 4, 7, 0, 5, 9, 12, 16, 12, 9, 7, 0],
      calm:    [0, null, 7, null, 4, null, 7, null, 5, null, 4, null, 2, null, 0, null],
      intense: [0, 0, 7, 0, 3, 3, 10, 3, 5, 5, 12, 5, 7, 7, 10, 0],
      eerie:   [0, null, 3, null, null, 6, null, 3, 8, null, 6, null, 3, null, 0, null],
      playful: [0, 7, 4, 7, 12, 7, 4, 7, 9, 7, 5, 7, 4, 2, 0, null],
      epic:    [0, 0, 3, 5, 7, 7, 3, 0, 8, 8, 7, 5, 3, 3, 0, null],
      fast:    [0, 4, 7, 4, 7, 12, 7, 4, 9, 5, 9, 12, 9, 5, 2, 0],
      quirky:  [0, 3, 7, 3, 10, 7, 3, 0, 6, 9, 6, 2, 5, 2, 0, null],
      airy:    [0, null, 4, 7, null, 9, 7, 4, null, 7, 12, null, 9, 7, 4, null],
      wild:    [0, 6, 3, 10, 1, 8, 5, 11, 2, 9, 4, 7, 0, 6, 3, 0],
      boss:    [0, null, 3, 0, 7, null, 3, 0, 0, null, 3, 5, 7, 8, 10, 0],   // havalı, gruvlu minör savaş riff'i (ürkütücü ama sevimli)
      grand:   [0, 4, 7, 11, 12, 11, 7, 4, 9, 12, 16, 12, 9, 7, 4, 0], // görkemli/majör
      dreamy:  [7, null, 4, null, 0, null, 4, 7, 9, null, 7, null, 4, null, 0, null]
    };
    // Bass motifleri (kök oktav altına göre ofset)
    const BAS = {
      steady: [0, null, null, null, -5, null, null, null, -7, null, null, null, -5, null, null, null],
      drive:  [0, null, 0, null, -5, null, -5, null, -7, null, -7, null, -3, null, -3, null],
      sparse: [0, null, null, null, null, null, -5, null, -7, null, null, null, null, null, -3, null],
      pulse:  [0, 0, null, 0, -5, -5, null, -5, -7, -7, null, -7, -3, -3, null, -3]
    };
    function buildTrack(sp) {
      const mel = MEL[sp.mel], bas = BAS[sp.bass], br = sp.root / 2;
      return {
        tempo: sp.tempo,
        wave: sp.wave || "triangle",
        lp: sp.lp || 2000,
        lead: mel.map(function (s) { return s == null ? 0 : nf(sp.root, s); }),
        bass: bas.map(function (s) { return s == null ? 0 : nf(br, s); })
      };
    }
    // Sekme (s_) ve mod (m_) parça spec'leri — kök/tempo/motif/timbre ile her biri farklı
    const SPECS = {
      // --- menü sekmeleri ---
      s_home:     { root: 220,    tempo: 460, mel: "bright",  bass: "steady", wave: "triangle", lp: 2000 },
      s_modes:    { root: 261.63, tempo: 300, mel: "fast",    bass: "drive",  wave: "triangle", lp: 2400 },
      s_market:   { root: 196,    tempo: 360, mel: "playful", bass: "pulse",  wave: "square",   lp: 1700 },
      s_season:   { root: 293.66, tempo: 420, mel: "epic",    bass: "steady", wave: "triangle", lp: 2200 },
      s_missions: { root: 146.83, tempo: 340, mel: "intense", bass: "drive",  wave: "triangle", lp: 2000 },
      s_scores:   { root: 164.81, tempo: 520, mel: "calm",    bass: "sparse", wave: "sine",     lp: 1500 },
      s_howto:    { root: 174.61, tempo: 480, mel: "airy",    bass: "steady", wave: "triangle", lp: 1900 },

    rainDrops = [];
    // Fırtına modu: yoğun yağmur (dramatik, kasıtlı ağır his). Diğer modlar (milestone yağmuru,
    // boss, chaos): hafif yağmur → FPS düşmez, yavaşlama olmaz.
    const heavy = MODES[mode].storm;
    const base = heavy ? 110 : 42;
    const cnt = Math.round(base * (CONFIG.quality === "low" ? 0.45 : CONFIG.quality === "high" ? 1.4 : 1));
    for (let i = 0; i < cnt; i++) {
      rainDrops.push({ x: Math.random() * W, y: Math.random() * H, len: 10 + Math.random() * 12, sp: 9 + Math.random() * 6 });
    }
  }

  function updateRain() {
    for (const d of rainDrops) {
      d.y += d.sp;
      d.x -= 2.2;
      if (d.y > H - GROUND_H + 10) { d.y = -10; d.x = Math.random() * W; }
      if (d.x < -5) d.x = W + Math.random() * 20;
    }
  }

  // Çevre değişimi — artık YUMUŞAK geçişle. Fırtına modunda hep yağmur.
  function applyMilestone() {
    if (MODES[mode].storm) { setEnv("rain"); return; }
    if (envMode === "night") setEnv("day");
    else setEnv(Math.random() < 0.5 ? "night" : "rain");
  }

  function strikeLightning() {
    flashUntil = frame + 10;
    lightningX = ball.x;
    Sound.sfx("thunder");
    addShake(6, 12);
    // kalkan varsa yıldırımı da emer
    if (shieldActive) { shieldActive = false; invulnUntil = frame + 25; Sound.sfx("shield"); return; }
    gameOver(t("death_lightning"));
  }

  // Kuş seçme / satın alma denemesi
  function trySelectSkin(i) {
    if (i < 0 || i >= SKINS.length) return;
    if (isSkinUnlocked(i)) {
      // zaten açık → seç
      selectedSkin = i;
      localStorage.setItem("flappy_skin", String(i));
      skinMsgUntil = 0;
    } else if (coins >= SKINS[i].cost) {
      // altınla satın al
      coins -= SKINS[i].cost;
      saveCoins();
      owned.push(SKINS[i].id);
      saveOwned();
      selectedSkin = i;
      localStorage.setItem("flappy_skin", String(i));
      skinMsg = tf("skin_bought", { name: skinName(i) });
      skinMsgUntil = frame + 130;
    } else {
      // not enough coins
      skinMsg = tf("not_enough", { c: SKINS[i].cost });
      skinMsgUntil = frame + 130;
    }
  }

  // ---- Liderlik tablosu (ilk 10, local) ----
  function loadLB() {
    try { return JSON.parse(localStorage.getItem("flappy_lb_" + mode) || "[]"); }
    catch (e) { return []; }
  }
  let leaderboard = loadLB();
  let scoreSaved = false;
  nameInput.value = localStorage.getItem("flappy_name") || "";

  function addToLB(name, sc) {
    leaderboard.push({ name: name, score: sc });
    leaderboard.sort(function (a, b) { return b.score - a.score; });
    leaderboard = leaderboard.slice(0, 10);
    localStorage.setItem("flappy_lb_" + mode, JSON.stringify(leaderboard));
  }

  function saveScore() {
    if (scoreSaved) return;
    let nm = (nameInput.value || "").trim();
    if (!nm) nm = t("player");
    localStorage.setItem("flappy_name", nm);
    addToLB(nm, score);
    scoreSaved = true;
  }

  saveBtn.addEventListener("click", function () {
    saveScore();
    nameInput.blur();
  });
  nameInput.addEventListener("keydown", function (e) {
    // yazarken tuşların oyuna gitmesini engelle (space, digit vs.)
    e.stopPropagation();
    if (e.code === "Enter") {
      saveScore();
      nameInput.blur();
    }
  });

  function reset() {
    ball = { x: W * 0.28, y: H / 2, vy: 0, rot: 0 };
    pipes = [];
    pipes2 = []; ball2 = null;
    score = 0;
    // best score + leaderboard for the active mode
    best = loadBest(mode);
    bestAll = computeBestAll();
    leaderboard = loadLB();
    frame = 0;
    groundX = 0;
    isNewBest = false;
    if (mode === "chaos") { chaosSeg = -1; applyChaosPhase(true); }   // Chaos: rastgele ilk fazı seç
    if (mode === "karisim") applyCustom();                            // Karışım: seçili modları birleştir
    setEnvInstant(MODES[mode].storm ? "rain" : "day");   // mod başı: anlık hava (geçiş yok)
    nextEnvSwitch = frame + 60 * 8;                      // Boss'ta ilk otomatik değişim ~8 sn sonra
    paused = false;
    nextMilestone = CONFIG.milestone;
    flashUntil = 0;
    deathReason = "";
    // new run: reset economy & power-up state
    runCoins = 0;
    runCounted = false;
    powerups = [];
    shieldActive = false;
    fastUntil = 0; giantUntil = 0; miniUntil = 0;
    magnetUntil = 0;
    ghostUntil = 0; floatUntil = 0; freezeUntil = 0; blindUntil = 0;
    shakeUntil = 0; shakeMag = 0;
    scorePop = 0;
    birdScale = 1; ballR = BALL_R; fx = [];
    slowUntil = 0;
    doubleUntil = 0;
    invulnUntil = 0;
    nextPowerFrame = frame + 120;
    nextAmbientBolt = frame + 60;
    enemies = [];
    nextEnemyFrame = frame + 120;
    // newer modes
    holding = false;
    nextGust = frame + 90; gustDir = 0; gustUntil = 0;
    coinPickups = []; nextCoinPickup = frame + 40;
    Rewards.onModeStart(mode);
    // Boss mode: no tunnel, the boss takes over instead
    bossAttacks = [];
    bossSurvive = 0;
    bossMouthOpen = 0;
    bossDarkUntil = 0;
    bossLaserState = "idle";
    if (MODES[mode].boss) {
      bossNextAttack = frame + 90;
      smallBirdNext = frame + 60;
      bossNextDark = frame + 60 * (8 + Math.floor(Math.random() * 4));   // ilk karanlık ~8-11 sn sonra
      bossNextLaser = frame + 60 * (6 + Math.floor(Math.random() * 4));  // ilk lazer ~6-9 sn sonra
    } else if (MODES[mode].mirror) {
      // Mirror mode: two lanes, each half the screen wide
      const lw = W / 2;
      ball2 = { x: lw - lw * 0.30, y: H / 2, vy: 0, rot: 0 };
      const MI = CONFIG.interval * 0.72;   // tighter cadence per lane
      for (let i = 0; i < 3; i++) {
        pipes.push(makePipe(lw + 150 + i * MI));
        pipes2.push(makePipe(lw + 150 + i * MI));
      }
    } else {
      // İlk boru kuşun hemen önünde (ekranda görünür) başlasın — geniş ekranda uzun boş uçuş olmasın.
      // Sabit piksel mesafesi → her cihazda aynı tepki süresi (~1.7 sn). İlk boru ekran içinde kalır.
      const startX = Math.min(ball.x + 480, W + 120);
      spawnPipe(startX);
      spawnPipe(startX + CONFIG.interval);
      spawnPipe(startX + CONFIG.interval * 2);
    }
    if (audioReady && CONFIG.sound) Sound.stinger(mode);   // moda özel giriş jingle'ı
  }

  function makePipe(x) {
    const margin = 55;
    const ci = pickPipeColorIndex();
    const col = PIPE_COLORS[ci];
    const gap = gapFor(ci);
    const amp = MODES[mode].moving ? 42 : 0;   // Moving mode: oscillation amplitude
    const lo = margin + amp;
    const hi = H - GROUND_H - gap - margin - amp;
    const topH = lo + Math.random() * Math.max(10, hi - lo);
    const p = { x: x, top: topH, baseTop: topH, amp: amp, phase: Math.random() * 6.28,
                gap: gap, passed: false, col: col, ci: ci, points: pointsFor(ci) };
    // The Troll modunda nadiren (~%15) normal tünel gelsin (boşluktan geçilen)
    if (MODES[mode].troll) {
      p.troll = true;                              // troll'ü boruya pişir → Kaos'ta faz değişse de troll kalır
      if (Math.random() < 0.15) p.normal = true;   // ~%15 normal tünel serpiştir
    }
    return p;
  }
  function spawnPipe(x) { pipes.push(makePipe(x)); }

  function jump() {
    if (paused) return; // duraklatınca zıplama yok
    const hold = MODES[mode].hold;                                // helikopter açıksa kontrol basılı-tut (ters ile de)
    const jv = MODES[mode].invert ? -CONFIG.jump : CONFIG.jump;   // ters modda tık = aşağı
    if (state === STATE.READY) {
      state = STATE.PLAY;
      if (!hold) { ball.vy = jv; Sound.sfx("flap"); burst(ball.x - ballR * 0.6, ball.y + 5, "rgba(230,240,255,0.85)", 3, { spd: 1.6, g: 0.06, d: 0.07, s: 3, vx: -1.2 }); }
    } else if (state === STATE.PLAY) {
      if (!hold) { ball.vy = jv; Sound.sfx("flap"); burst(ball.x - ballR * 0.6, ball.y + 5, "rgba(230,240,255,0.85)", 3, { spd: 1.6, g: 0.06, d: 0.07, s: 3, vx: -1.2 }); }
    }
    // OVER'da zıplama/başlatma yok; oyuna dönüş sadece SPACE (restart)
  }

  // 2P mode: flap one specific bird (which = 1 left / 2 right)
  function flap2P(which) {
    if (paused) return;
    if (state === STATE.READY) state = STATE.PLAY;
    if (state !== STATE.PLAY) return;
    const b = which === 2 ? ball2 : ball;
    if (b && !b.dead) { b.vy = CONFIG.jump; Sound.sfx("flap"); }
  }

  function restart() {
    if (mode === "coinrush" && coinRushLeft() <= 0) {   // hak bitti → menüye dön
      pushToast(tf("coinrush_limit", { n: COINRUSH_MAX }), "#ffb300");
      setEnvInstant("day"); menuScreen = "modes"; state = STATE.MENU;
      return;
    }
    reset();
    state = STATE.READY;
  }

  // Açılış: ilk dokunuş sesi açar → animasyon slam'e yakından SESLİ tekrar oynar; ikinci dokunuş menüye geçer.
  function introAdvance() {
    unlockAudio();
    if (!introArmed && CONFIG.sound) {
      introArmed = true;
      introStart = frame - Math.round(INTRO_DUR * 0.30);   // slam'in hemen öncesine atla
      introSlammed = false; introFlash = 0; introBurst = []; introSparks = [];
      Sound.introFx("whoosh");                              // logo inişi hışırtısı
      return;
    }
    state = STATE.MENU; menuScreen = "home"; Sound.sfx("click");
  }

  // ---- Girdi ----
  canvas.addEventListener("mousedown", function (e) {
    if (e.button !== 0 || adminOpen) return;
    unlockAudio();
    if (state === STATE.INTRO) { introAdvance(); return; }   // girişi sesli tekrar / menüye geç
    // duraklatma menüsü: Devam / Bitir düğmeleri
    if (paused) {
      const rect = canvas.getBoundingClientRect();
      const mx = (e.clientX - rect.left) * (W / rect.width);
      const my = (e.clientY - rect.top) * (H / rect.height);
      const inR = function (r) { return r && mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h; };
      if (inR(pauseEndRect)) { Sound.sfx("click"); paused = false; gameOver(); return; }
      if (inR(pauseMenuRect)) { Sound.sfx("click"); paused = false; setEnvInstant("day"); menuScreen = "home"; state = STATE.MENU; return; }
      if (inR(pauseResumeRect)) { Sound.sfx("click"); paused = false; return; }
      return;
    }
    // sol-alt geri tuşu (oyun içi) → mod ekranı
    if (gameBackRect) {
      const rect = canvas.getBoundingClientRect();
      const mx = (e.clientX - rect.left) * (W / rect.width);
      const my = (e.clientY - rect.top) * (H / rect.height);
      if (mx >= gameBackRect.x && mx <= gameBackRect.x + gameBackRect.w && my >= gameBackRect.y && my <= gameBackRect.y + gameBackRect.h) { goToModes(); return; }
    }
    if (state === STATE.OVER) {
      // OVER'da: deri/tip kutucuğuna tıklama seçer; boş yere tıklama tekrar oynatır
      const rect = canvas.getBoundingClientRect();
      const mx = (e.clientX - rect.left) * (W / rect.width);
      const my = (e.clientY - rect.top) * (H / rect.height);
      // renk kutucukları
      for (let i = 0; i < skinRects.length; i++) {
        const s = skinRects[i];
        if (mx >= s.x && mx <= s.x + s.w && my >= s.y && my <= s.y + s.h) {
          trySelectSkin(i);
          return;
        }
      }
      // kuş tipi kutucukları
      for (let i = 0; i < typeRects.length; i++) {
        const s = typeRects[i];
        if (mx >= s.x && mx <= s.x + s.w && my >= s.y && my <= s.y + s.h) {
          selectType(i);
          return;
        }
      }
      restart();   // boş yere tıkla → tekrar oyna
      return;
    }
    if (state === STATE.MENU) {
      const rect = canvas.getBoundingClientRect();
      const mx = (e.clientX - rect.left) * (W / rect.width);
      const my = (e.clientY - rect.top) * (H / rect.height);
      menuClick(mx, my);
      return;
    }
    if (state === STATE.DYING) return;            // death animation: ignore input
    if (MODES[mode].mirror) {                     // 2P: click only starts; W / ↑ control the birds
      if (state === STATE.READY) state = STATE.PLAY;
      return;
    }
    holding = true; // helikopter: basılı tutma başladı
    jump(); // READY başlat / PLAY zıpla
  });

  window.addEventListener("mouseup", function () { holding = false; activeSlider = null; });

  // Ayarlar ses kaydırıcısı: fare/dokunmatik sürükleme
  canvas.addEventListener("mousemove", function (e) {
    if (!activeSlider) return;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (W / rect.width);
    updateSlider(activeSlider, mx);
  });
  canvas.addEventListener("touchmove", function (e) {
    if (!activeSlider) return;
    e.preventDefault();
    const t = e.changedTouches[0];
    const rect = canvas.getBoundingClientRect();
    const mx = (t.clientX - rect.left) * (W / rect.width);
    updateSlider(activeSlider, mx);
  }, { passive: false });

  // Menü tık yönlendirme (mouse + touch ortak)
  function menuClick(mx, my) {
    const inR = function (r) { return r && mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h; };
    if (inR(backRect)) { Sound.sfx("click"); menuScreen = "home"; return; }
    if (menuScreen === "home") {
      for (const lr of langRects) {
        if (inR(lr)) { Sound.sfx("click"); setLang(lr.code); return; }
      }
      for (const b of menuBtnRects) {
        if (inR(b)) {
          Sound.sfx("click");
          if (b.act === "togglesound") {
            const on = !(CONFIG.sound || CONFIG.music);
            CONFIG.sound = on; CONFIG.music = on; saveConfig(); applyAudioSettings();
          } else {
            menuScreen = b.act;
          }
          return;
        }
      }
      return;
    }
    if (menuScreen === "modes") {
      for (const m of modeRects) {
        if (inR(m)) {
          if (m.placeholder) {   // gelecek mod için boş yer → sadece bilgi
            Sound.sfx("click");
            pushToast(t("mode_soon"), "#ffd400");
            return;
          }
          if (m.key === "karisim") {   // Karışım: önce mod-seçim (builder) ekranı
            Sound.sfx("click");
            menuScreen = "custom";
            return;
          }
          if (m.key === "coinrush" && coinRushLeft() <= 0) {   // günlük hak doldu
            Sound.sfx("death");
            pushToast(tf("coinrush_limit", { n: COINRUSH_MAX }), "#ffb300");
            return;
          }
          Sound.sfx("click");
          mode = m.key;
          localStorage.setItem("flappy_mode", mode);
          reset();
          state = STATE.READY;
          return;
        }
      }
    }
    if (menuScreen === "custom") {
      if (inR(backRect)) { Sound.sfx("click"); menuScreen = "modes"; return; }   // (üstte de var ama net olsun)
      for (const c of customRects) {
        if (inR(c)) {
          const idx = customSel.indexOf(c.key);
          if (idx !== -1) { customSel.splice(idx, 1); Sound.sfx("click"); }        // seçiliyse çıkar
          else if (customSel.length < CUSTOM_MAX) { customSel.push(c.key); Sound.sfx("click"); }
          else { pushToast(tf("custom_max", { n: CUSTOM_MAX }), "#ffb300"); Sound.sfx("death"); }
          saveCustom();
          return;
        }
      }
      if (inR(customPlayRect)) {   // OYNA
        if (!customSel.length) { pushToast(t("custom_pick"), "#ffb300"); Sound.sfx("death"); return; }
        Sound.sfx("click");
        mode = "karisim";
        localStorage.setItem("flappy_mode", mode);
        reset();
        state = STATE.READY;
        return;
      }
      return;
    }
    if (menuScreen === "missions") {
      if (inR(loginClaimRect)) { if (Rewards.claimLogin()) Sound.sfx("powerup"); return; }
      for (const b of missionClaimRects) {
        if (inR(b)) { if (Rewards.claimMission(b.i)) Sound.sfx("powerup"); return; }
      }
      return;
    }
    if (menuScreen === "season") {
      for (const b of seasonClaimRects) {
        if (inR(b)) { if (Season.claim(b.i)) Sound.sfx("powerup"); return; }
      }
      return;
    }
    if (menuScreen === "market") {
      for (const tr of marketTabRects) { if (inR(tr)) { Sound.sfx("click"); marketTab = tr.tab; return; } }
      if (dealRect && inR(dealRect)) { const d = dailyDeal(); tryBuyItem(d.kind, d.i); return; }
      for (const r of marketRects) { if (inR(r)) { tryBuyItem(r.kind, r.i); return; } }
      return;
    }
    if (menuScreen === "settings") {
      for (const s of sliderRects) { if (inR(s)) { activeSlider = s.key; updateSlider(s.key, mx); return; } }
      for (const b of qualityRects) { if (inR(b)) { setQuality(b.q); return; } }
      for (const b of toggleRects) { if (inR(b)) { toggleSetting(b.key); return; } }
      return;
    }
    // scores / howto: back button only (handled above)
  }

  window.addEventListener("keydown", function (e) {
    if (adminOpen) return; // admin panelindeyken oyun tuşları çalışmaz
    unlockAudio();
    if (state === STATE.INTRO) { e.preventDefault(); return; }   // giriş SADECE sol tıkla geçilir → klavye yok say
    // tuş basılı tutunca OS tekrarı = oto-tık etkisi → aksiyon tuşlarında tekrarları yok say
    if (e.repeat && (e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW")) { e.preventDefault(); return; }
    // ESC: oyunda duraklat/devam · hazır/bitişte ana menüye dön
    if (e.code === "Escape") {
      if (state === STATE.PLAY) { paused = !paused; }
      else if (state === STATE.READY || state === STATE.OVER) { setEnvInstant("day"); menuScreen = "home"; state = STATE.MENU; }
      e.preventDefault();
      return;
    }
    if (state === STATE.OVER) {
      // 1-9 ile kuş seç
      if (e.code.indexOf("Digit") === 0) {
        const n = Number(e.code.slice(5));
        if (n >= 1 && n <= SKINS.length) { trySelectSkin(n - 1); e.preventDefault(); return; }
      }
      // SPACE ile oyuna dön
      if (e.code === "Space") { e.preventDefault(); restart(); return; }
      return;
    }
    if (state === STATE.DYING) return;   // death animation: ignore input
    // 2P mode: W = left bird, ↑ = right bird (single click just starts the round)
    if (MODES[mode].mirror) {
      if (e.code === "KeyW") { e.preventDefault(); flap2P(1); return; }
      if (e.code === "ArrowUp") { e.preventDefault(); flap2P(2); return; }
      if (e.code === "Space") { e.preventDefault(); if (state === STATE.READY) state = STATE.PLAY; return; }
      return;
    }
    // READY / PLAY: boşluk veya yukarı ok da zıplatır (ana kontrol sol tık)
    if (e.code === "Space" || e.code === "ArrowUp") {
      e.preventDefault();
      holding = true; // helikopter: basılı tut
      jump();
    }
  });

  window.addEventListener("keyup", function (e) {
    if (e.code === "Space" || e.code === "ArrowUp") holding = false;
  });

  canvas.addEventListener("touchstart", function (e) {
    e.preventDefault();
    unlockAudio();
    if (state === STATE.INTRO) { introAdvance(); return; }   // girişi sesli tekrar / menüye geç
    const t = e.changedTouches[0];
    const rect = canvas.getBoundingClientRect();
    const mx = (t.clientX - rect.left) * (W / rect.width);
    const my = (t.clientY - rect.top) * (H / rect.height);
    const inR = function (r) { return r && mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h; };

    if (paused) {
      if (inR(pauseEndRect)) { paused = false; gameOver(); }
      else if (inR(pauseMenuRect)) { paused = false; setEnvInstant("day"); menuScreen = "home"; state = STATE.MENU; }
      else if (inR(pauseResumeRect)) { paused = false; }
      return;
    }
    if (inR(gameBackRect)) { goToModes(); return; }   // sol-alt geri tuşu → mod ekranı
    if (state === STATE.MENU) { menuClick(mx, my); return; }
    if (state === STATE.OVER) {
      // deri/tip kutucuğuna dokun → seç; boş yere dokun → tekrar oyna
      for (let i = 0; i < skinRects.length; i++) if (inR(skinRects[i])) { trySelectSkin(i); return; }
      for (let i = 0; i < typeRects.length; i++) if (inR(typeRects[i])) { selectType(i); return; }
      restart(); return;
    }
    if (state === STATE.DYING) return;
    if (MODES[mode].mirror) {
      // 2P telefon: sol yarıya dokun → sol kuş, sağ yarıya dokun → sağ kuş (aynı anda iki parmak)
      const rr = canvas.getBoundingClientRect();
      for (let i = 0; i < e.changedTouches.length; i++) {
        const tt = e.changedTouches[i];
        const tx = (tt.clientX - rr.left) * (W / rr.width);
        flap2P(tx < W / 2 ? 1 : 2);
      }
      return;
    }
    holding = true; // helikopter: basılı tut
    jump();
  }, { passive: false });

  canvas.addEventListener("touchend", function () { holding = false; activeSlider = null; }, { passive: false });
  canvas.addEventListener("touchcancel", function () { holding = false; activeSlider = null; });

  // ---- Güncelle ----
  function update() {
    if (adminOpen || paused) return; // admin paneli açıkken veya duraklatınca oyun durur
    frame++;
    // Giriş animasyonu: OTOMATİK GEÇMEZ — sadece sol tık/dokunuşla geçilir (aşağıdaki handler'lar)
    if (state === STATE.INTRO) {
      if (!introJinglePlayed && audioReady && CONFIG.sound) { Sound.stinger("intro"); introJinglePlayed = true; }
      return;
    }
    // hava geçişi (crossfade) her karede ilerler + menü ve Boss'ta otomatik rastgele hava değişimi
    updateEnvTransition();
    if (state === STATE.MENU || (state === STATE.PLAY && MODES[mode].boss)) {
      if (frame >= nextEnvSwitch) {
        setEnv(randomEnv());
        nextEnvSwitch = frame + 60 * (13 + Math.floor(Math.random() * 8));   // ~13-20 sn
      }
    }
    const spd = curSpeed();
    // zemin kaydırma animasyonu
    groundX = (groundX - spd) % 24;

    // kuş boyutu: devasa/mini için yumuşak büyüme-küçülme animasyonu
    const scaleTarget = frame < giantUntil ? 1.85 : (frame < miniUntil ? 0.55 : 1);
    birdScale += (scaleTarget - birdScale) * 0.18;
    ballR = BALL_R * birdScale;
    // parçalanma parçacıkları
    updateFx();

    // yağmur her durumda akar
    if (envMode === "rain") updateRain();

    // Fırtına modu: SADECE oyun sırasında arada bir görsel yıldırım düşer
    if (MODES[mode].storm && state === STATE.PLAY && frame >= nextAmbientBolt) {
      flashUntil = frame + 10;
      lightningX = 60 + Math.random() * Math.max(60, W - 120);
      if (Math.random() < 0.35) Sound.sfx("thunder");   // ara sıra gök gürültüsü
      nextAmbientBolt = frame + 150 + Math.floor(Math.random() * 180); // ~2.5–5.5 sn
    }

    // 🌑 Karanlık çökerken ürkütücü uğultu (Karanlık modu VEYA Boss karanlık saldırısı) — 90'lık döngüde t=60'ta
    if (state === STATE.PLAY && (MODES[mode].dark || frame < bossDarkUntil) && frame % 90 === 60) Sound.sfx("dark");

    // Death animation: dying bird(s) tumble & fall (X eyes) before the Game Over panel
    if (state === STATE.DYING) {
      updateDeathAnim();
      return;
    }

    if (state === STATE.PLAY && MODES[mode].mirror) {
      updateMirror(spd);
    } else if (state === STATE.PLAY) {
      // Wind mode: intermittent sudden vertical gusts
      if (MODES[mode].wind) {
        if (frame >= nextGust) {
          gustDir = Math.random() < 0.5 ? -1 : 1;
          gustUntil = frame + 22;
          nextGust = frame + 110 + Math.floor(Math.random() * 130);
        }
        if (frame < gustUntil) ball.vy += gustDir * 0.24;
        ball.vy += Math.sin(frame * 0.06) * 0.05;   // hafif sürekli sallanma
      }
      // Helikopter: ters yerçekimi ile de çalışır. gdir yerçekimi yönü (ters modda -1) →
      // basılı tut yerçekimine karşı iter (normalde yukarı, ters modda aşağı), temel yerçekimi hafifler.
      const holdOn = MODES[mode].hold;
      const gdir = MODES[mode].invert ? -1 : 1;
      if (holdOn && holding) ball.vy -= 0.46 * gdir;
      // yerçekimi (ters modda ters yön · helikopterde daha hafif = daha çok tepki süresi)
      const featherMul = frame < floatUntil ? 0.5 : 1;   // 🪶 Feather: yerçekimi yarı → süzülüş
      ball.vy += CONFIG.gravity * (holdOn ? 0.66 : 1) * gdir * featherMul;
      if (holdOn) {
        ball.vy = Math.max(-4.6, Math.min(5, ball.vy));   // dar hız sınırı → savrulma az, hover hissi
        ball.vy *= 0.985;                                  // hafif sönümleme → daha kararlı
      }
      ball.y += ball.vy;
      ball.rot = Math.max(-0.5, Math.min(1.2, ball.vy / 12));

      // seçili iz efekti (parçacık kuyruğu) — Görünmez modda kapalı (yoksa yolu ele verir)
      if (!MODES[mode].invisible) emitTrail();

      // Coin Rush: uçan altınları üret / kaydır / topla
      if (MODES[mode].coinRush) {
        if (!runCounted) { recordCoinRush(); runCounted = true; }   // oyun başlayınca günlük hakka say
        updateCoinRush(spd);
      }

      // çubukları kaydır
      for (const p of pipes) p.x -= spd;

      // hareketli borular dikey salınır — salınım BORUYA pişmiştir (p.amp>0),
      // moda göre değil. Böylece Kaos'ta hareketli faz bitse de o borular salınmaya devam eder.
      for (const p of pipes) {
        if (p.amp > 0) p.top = p.baseTop + Math.sin((frame + p.phase) * 0.03) * p.amp;
      }

      // güçlendiricileri üret / kaydır / topla
      updatePowerups(spd);

      // Kaçış modu: düşman kuşları üret / kaydır / çarpışma
      if (MODES[mode].swarm) updateEnemies(spd);
      // Kaos: kaçış fazı bitse bile o an gelmiş düşmanlar ekrandan çıkana dek uçmaya/çarpmaya devam etsin
      else if (MODES[mode].chaos && enemies.length) moveEnemies(spd);

      // Boss modu: boss saldırıları
      if (MODES[mode].boss) updateBoss(spd);

      // ekrandan çıkan boruları sil
      while (pipes.length && pipes[0].x + PIPE_W < 0) pipes.shift();
      // normal modlarda otomatik yeni boru (boss modunda tünel sadece saldırıyla gelir)
      if (!MODES[mode].boss && pipes.length) {
        const last = pipes[pipes.length - 1];
        if (last.x < W - CONFIG.interval) spawnPipe(last.x + CONFIG.interval);
      }

      // skor (kırmızı boru CONFIG.pointsRed puan)
      for (const p of pipes) {
        if (!p.passed && p.x + PIPE_W < ball.x) {
          p.passed = true;
          if (MODES[mode].boss) continue;   // boss modunda tünel puanı yok (skor hayatta kalma ile)
          let gained = p.points;
          if (frame < doubleUntil) gained *= 2;                  // x2 güçlendirici
          score += gained; scorePop = frame + 9;
          // altın: borunun taban puanı kadar kazan (x2'den etkilenmez)
          coins += p.points;
          runCoins += p.points;
          saveCoins();
          Sound.sfx("score");
          Rewards.onCoins(p.points);
          Rewards.onPipe(p.ci === 2);

          // Chaos: her CHAOS_SEG_PIPES boruda çarkı döndür → yeni alt-mekanik
          if (MODES[mode].chaos && --chaosPipesLeft <= 0) applyChaosPhase(false);

          // her CONFIG.milestone puanda çevre değişimi
          while (score >= nextMilestone) {
            applyMilestone();
            nextMilestone += CONFIG.milestone;
          }

          // Fırtına modu: her sütunda %STORM_LIGHTNING_PCT yıldırım
          if (MODES[mode].storm && state === STATE.PLAY) {
            if (Math.random() < STORM_LIGHTNING_PCT / 100) strikeLightning();
          }
        }
      }

      // Devasa: dokunduğu boruları parçala (borulardan ölmez)
      if (frame < giantUntil && state === STATE.PLAY) smashPipes();

      // çarpışma (yıldırım zaten öldürmüşse tekrar tetiklenmesin)
      if (state === STATE.PLAY && frame >= invulnUntil) {
        const ground = hitGroundOrCeiling();
        const pipe = (frame < giantUntil || frame < ghostUntil) ? false : (!ground && hitPipe());   // 👻 ghost: borulardan geç
        const bhit = !ground && !pipe && frame >= ghostUntil && MODES[mode].boss && bossHits();
        if (ground || pipe || bhit) {
          if (shieldActive) {
            // kalkan bir çarpışmayı emer
            shieldActive = false;
            invulnUntil = frame + 30;
            Sound.sfx("shield");
            if (ground) {
              // zeminden sekerek kurtul
              ball.vy = CONFIG.jump * 1.15;
              ball.y = H - GROUND_H - BALL_R - 2;
            } else {
              // borudan kurtul: değdiği boruda güvenli bölgeye taşı
              for (const p of pipes) {
                if (ball.x + BALL_R > p.x && ball.x - BALL_R < p.x + PIPE_W) {
                  if (!p.normal && p.troll) {
                    // troll: gap kills → move to the nearest pipe body
                    const mid = p.top + p.gap / 2;
                    if (ball.y < mid) ball.y = Math.max(BALL_R + 2, p.top - BALL_R - 3);
                    else ball.y = Math.min(H - GROUND_H - BALL_R - 2, p.top + p.gap + BALL_R + 3);
                  } else {
                    ball.y = p.top + p.gap / 2;   // normal: boşluk ortası güvenli
                  }
                  ball.vy = 0;
                  break;
                }
              }
            }
          } else {
            gameOver(bhit ? t("death_boss") : "");
          }
        }
      }
    } else if (state === STATE.READY || state === STATE.MENU) {
      // gentle bobbing on the menu / ready screen
      ball.y = H / 2 + Math.sin(frame / 18) * 8;
    }
    // 2P mode: on menu/ready both birds bob together; in play they move independently
    if (MODES[mode].mirror && ball2 && (state === STATE.READY || state === STATE.MENU)) { ball2.y = ball.y; }
  }

  // ---- 2P mode: two lanes, one bird each (W = left, ↑ = right) ----
  function mirrorBirdX() { return (W / 2) * 0.30; }

  function hitPipeLane(arr, bx, b) {
    for (const p of arr) {
      if (bx + ballR > p.x && bx - ballR < p.x + PIPE_W) {
        const gapTop = p.top, gapBottom = p.top + p.gap;
        if (b.y - ballR < gapTop || b.y + ballR > gapBottom) return true;
      }
    }
    return false;
  }

  function birdHitsBounds(b) {
    if (b.y + ballR >= H - GROUND_H) return true;         // ground kills
    if (b.y - ballR <= 0) { b.y = ballR; b.vy = 0; }      // ceiling bounces
    return false;
  }

  function updateMirror(spd) {
    const lw = W / 2;
    const BX = mirrorBirdX();
    const MI = CONFIG.interval * 0.72;

    // independent physics — each bird has its own gravity/velocity
    ball.vy += CONFIG.gravity;
    ball.y += ball.vy;
    ball.rot = Math.max(-0.5, Math.min(1.2, ball.vy / 12));
    if (ball2) {
      ball2.vy += CONFIG.gravity;
      ball2.y += ball2.vy;
      ball2.rot = Math.max(-0.5, Math.min(1.2, ball2.vy / 12));
    }

    // scroll both lanes (local coords, 0..lw)
    for (const p of pipes) p.x -= spd;
    for (const p of pipes2) p.x -= spd;
    while (pipes.length && pipes[0].x + PIPE_W < 0) pipes.shift();
    while (pipes2.length && pipes2[0].x + PIPE_W < 0) pipes2.shift();
    // keep each lane populated
    if (pipes.length) { const last = pipes[pipes.length - 1]; if (last.x < lw - MI) pipes.push(makePipe(last.x + MI)); }
    if (pipes2.length) { const last = pipes2[pipes2.length - 1]; if (last.x < lw - MI) pipes2.push(makePipe(last.x + MI)); }

    // scoring driven by the left lane; right lane marks passed for consistency
    for (const p of pipes) {
      if (!p.passed && p.x + PIPE_W < BX) {
        p.passed = true;
        let gained = p.points;
        if (frame < doubleUntil) gained *= 2;
        score += gained; scorePop = frame + 9;
        coins += p.points; runCoins += p.points; saveCoins();
        Sound.sfx("score");
        Rewards.onCoins(p.points); Rewards.onPipe(p.ci === 2);
        while (score >= nextMilestone) { applyMilestone(); nextMilestone += CONFIG.milestone; }
      }
    }
    for (const p of pipes2) { if (!p.passed && p.x + PIPE_W < BX) p.passed = true; }

    // collisions: EITHER bird dying (its lane or ground) ends the run for both
    if (frame >= invulnUntil) {
      const g1 = birdHitsBounds(ball);
      const g2 = ball2 ? birdHitsBounds(ball2) : false;
      const leftDead = g1 || hitPipeLane(pipes, BX, ball);
      const rightDead = (g2 || (ball2 && hitPipeLane(pipes2, BX, ball2)));
      if (leftDead || rightDead) {
        gameOver(rightDead && !leftDead ? t("death_mirror_r") : t("death_mirror_l"));
      }
    }
  }

  function hitGroundOrCeiling() {
    const ground = ball.y + ballR >= H - GROUND_H;
    const ceil = ball.y - ballR <= 0;
    // Ters + The Troll: tavan da öldürür (troll'da tavana spam yapıp ölümsüz kalma bug'ı kapanır)
    if (MODES[mode].invert || MODES[mode].troll) return ground || ceil;
    if (ground) return true;
    if (ceil) { ball.y = ballR; ball.vy = 0; }
    return false;
  }

  function hitPipe() {
    for (const p of pipes) {
      if (ball.x + ballR > p.x && ball.x - ballR < p.x + PIPE_W) {
        const troll = !p.normal && p.troll;   // troll BORUYA pişer (p.troll) — global mod ekrandaki normal boruyu troll'e çevirmesin
        const gapTop = p.top;
        const gapBottom = p.top + p.gap;
        if (troll) {
          // TROLL: dying if fully inside the gap (you must touch the pipe body)
          if (ball.y - ballR > gapTop && ball.y + ballR < gapBottom) return true;
        } else {
          if (ball.y - ballR < gapTop || ball.y + ballR > gapBottom) return true;
        }
      }
    }
    return false;
  }

  function gameOver(reason) {
    if (state !== STATE.PLAY) return;   // guard: only from active play (avoid double trigger)
    state = STATE.DYING;                // brief death animation (X eyes + tumble) before the panel
    paused = false;
    holding = false;
    scoreSaved = false;
    deathReason = reason || "";
    deathAnimUntil = frame + 48;
    Sound.stopRain();
    bossLaserState = "idle";   // ölünce lazer/göz animasyonunu durdur
    Sound.sfx("death");
    buzz([45, 35, 80]);
    addShake(9, 22);           // ölüm sarsıntısı
    // çarpışma patlaması (parçacıklar)
    burst(ball.x, ball.y, ["#ff5a3c", "#ffb03a", "#ffe14d", "#ffffff"], 24, { spd: 6, g: 0.28 });
    if (MODES[mode].mirror && ball2) burst(ball2.x, ball2.y, ["#ff5a3c", "#ffb03a", "#ffffff"], 18, { spd: 6, g: 0.28 });
    // mark dying bird(s) + give a little death hop; in 2P both die together
    ball.dead = true; ball.vy = CONFIG.jump * 0.7;
    if (MODES[mode].mirror && ball2) { ball2.dead = true; ball2.vy = CONFIG.jump * 0.7; }
    if (score > best) {
      best = score;
      isNewBest = true;
      localStorage.setItem("flappy_best_" + mode, String(best));
      if (best > bestAll) bestAll = best;
    }
    Rewards.onGameOver(score, mode, bossSurvive);
  }

  // Death animation: let the dead bird(s) hop then tumble down, then show the panel
  function updateDeathAnim() {
    const g = CONFIG.gravity * 1.15;
    if (ball && ball.dead) { ball.vy += g; ball.y += ball.vy; ball.rot = Math.min(3.2, ball.rot + 0.16); }
    if (MODES[mode].mirror && ball2 && ball2.dead) { ball2.vy += g; ball2.y += ball2.vy; ball2.rot = Math.min(3.2, ball2.rot + 0.16); }
    if (envMode === "rain") updateRain();
    if (frame >= deathAnimUntil) state = STATE.OVER;
  }

  // ---- Güçlendiriciler ----
  function updatePowerups(spd) {
    // yeni güçlendirici üret
    if (CONFIG.powerups && frame >= nextPowerFrame) {
      spawnPowerup();
      nextPowerFrame = frame + 165 + Math.floor(Math.random() * 155);   // bir tık daha sık (~2.75–5.3 sn)
    }
    // kaydır
    for (const pu of powerups) pu.x -= spd;
    // 🧲 mıknatıs aktifse güçleri kuşa doğru çek
    magnetPull(powerups);
    // ekrandan çıkanları at
    powerups = powerups.filter(function (pu) { return pu.x > -40; });
    // toplama (kuşa değince)
    for (const pu of powerups) {
      if (pu.taken) continue;
      const dx = pu.x - ball.x, dy = pu.y - ball.y;
      if (Math.sqrt(dx * dx + dy * dy) < ballR + pu.r) {
        pu.taken = true;
        let col = "#fff";
        for (const d of POWERUPS) { if (d.id === pu.type) { col = d.color; break; } }
        burst(pu.x, pu.y, [col, "#ffffff"], 14, { spd: 4.5 });
        activatePowerup(pu.type);
      }
    }
    powerups = powerups.filter(function (pu) { return !pu.taken; });
  }

  // Özel top (coin/güç) için güvenli konum:
  // en sağdaki borunun sağındaki koridora + o borunun BOŞLUĞU hizasına koy → asla boru gövdesine ya da tam dibe denk gelmez
  function spawnSpecial(r) {
    let gapPipe = null;
    for (const p of pipes) { if (!gapPipe || p.x > gapPipe.x) gapPipe = p; }
    const x = gapPipe ? Math.max(W + 30, gapPipe.x + PIPE_W + 30) : W + 30;
    let y;
    if (gapPipe) {
      const m = r + 18;
      const lo = gapPipe.top + m, hi = gapPipe.top + gapPipe.gap - m;
      y = hi > lo ? lo + Math.random() * (hi - lo) : gapPipe.top + gapPipe.gap / 2;
    } else {
      const topLim = 80, botLim = H - GROUND_H - 110;   // dipten uzak
      y = topLim + Math.random() * Math.max(40, botLim - topLim);
    }
    return { x: x, y: y };
  }

  function spawnPowerup() {
    const type = POWERUPS[Math.floor(Math.random() * POWERUPS.length)].id;
    const pos = spawnSpecial(16);
    powerups.push({ x: pos.x, y: pos.y, r: 16, type: type, taken: false });
  }

  function activatePowerup(type) {
    if (type === "shield") shieldActive = true;
    else if (type === "slowmo") slowUntil = frame + 300;   // ~5 sn
    else if (type === "double") doubleUntil = frame + 360;  // ~6 sn
    else if (type === "fast")  fastUntil = frame + 270;     // ⚡ ~4.5 sn
    else if (type === "giant") { giantUntil = frame + 360; miniUntil = 0; }  // 🐘 ~6 sn (mini iptal)
    else if (type === "mini")  { miniUntil = frame + 360; giantUntil = 0; }  // 🐤 ~6 sn (devasa iptal)
    else if (type === "magnet") magnetUntil = frame + 420;   // 🧲 ~7 sn
    else if (type === "ghost")  ghostUntil = frame + 180;    // 👻 ~3 sn borulardan geç
    else if (type === "feather") floatUntil = frame + 300;   // 🪶 ~5 sn yerçekimi yarı
    else if (type === "freeze") freezeUntil = frame + 78;    // ❄️ ~1.3 sn borular donar
    else if (type === "treasure") {                          // 💰 anında +30 altın
      coins += 30; runCoins += 30; saveCoins(); Rewards.onCoins(30);
      pushToast("+30 💰", "#ffd24a");
      Sound.sfx("coin"); buzz(20); return;
    }
    else if (type === "bonus") {                             // ⭐ anında +5 puan
      score += 5; scorePop = frame + 9;
      while (score >= nextMilestone) { applyMilestone(); nextMilestone += CONFIG.milestone; }
      pushToast("+5 ⭐", "#ffe066");
    }
    else if (type === "blind") {                             // 🌫️ TUZAK: 0.5 sn kör
      blindUntil = frame + 30;
      Sound.sfx("thunder"); buzz([50, 40, 60]); addShake(6, 16);
      return;   // mutlu power-up sesini çalma
    }
    Sound.sfx("powerup");
    buzz(20);
  }

  // ---- Devasa: boru parçalama + parçacıklar ----
  function smashPipes() {
    let smashed = false;
    for (const p of pipes) {
      if (p.smashed) continue;
      if (ball.x + ballR > p.x && ball.x - ballR < p.x + PIPE_W) {
        p.smashed = true; smashed = true;
        if (!p.passed && !MODES[mode].boss) {
          p.passed = true;
          let gained = p.points;
          if (frame < doubleUntil) gained *= 2;
          score += gained; scorePop = frame + 9;
          coins += p.points; runCoins += p.points; saveCoins();
          Rewards.onCoins(p.points); Rewards.onPipe(p.ci === 2);
          while (score >= nextMilestone) { applyMilestone(); nextMilestone += CONFIG.milestone; }
        }
        spawnSmashFx(p);
      }
    }
    if (smashed) { Sound.sfx("shield"); pipes = pipes.filter(function (p) { return !p.smashed; }); }
  }

  function spawnSmashFx(p) {
    const cx = p.x + PIPE_W / 2;
    const cnt = Math.max(4, Math.round(14 * qMul()));
    for (let i = 0; i < cnt; i++) {
      fx.push({
        x: cx + (Math.random() * PIPE_W - PIPE_W / 2),
        y: Math.random() < 0.5 ? p.top - Math.random() * 40 : p.top + p.gap + Math.random() * 40,
        vx: (Math.random() * 2 - 1) * 4 - 1,
        vy: (Math.random() * 2 - 1) * 4,
        s: 4 + Math.random() * 6,
        life: 1,
        col: p.col.mid
      });
    }
  }

  function updateFx() {
    if (!fx.length) return;
    for (const f of fx) {
      f.x += f.vx; f.y += f.vy;
      f.vy += (f.g == null ? 0.35 : f.g);
      f.vx *= 0.98;
      f.life -= (f.d || 0.03);
    }
    fx = fx.filter(function (f) { return f.life > 0; });
  }

  // ---- Genel parçacık patlaması (coin, güç, ölüm, kanat) ----
  // col: tek renk stringi ya da renk dizisi (rastgele seçilir)
  function burst(x, y, col, n, opts) {
    opts = opts || {};
    const spd = opts.spd == null ? 4 : opts.spd;
    const g = opts.g == null ? 0.35 : opts.g;
    const d = opts.d || 0.03;
    const sz = opts.s || 5;
    const count = Math.max(1, Math.round(n * qMul()));   // kaliteye göre yoğunluk
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const v = spd * (0.4 + Math.random() * 0.9);
      fx.push({
        x: x, y: y,
        vx: Math.cos(a) * v + (opts.vx || 0),
        vy: Math.sin(a) * v + (opts.vy || 0),
        s: sz * (0.5 + Math.random()),
        life: 1, g: g, d: d,
        col: Array.isArray(col) ? col[Math.floor(Math.random() * col.length)] : col
      });
    }
  }

  // ---- 📳 Haptic (mobil titreşim) ----
  function buzz(pattern) {
    if (!CONFIG.vibrate) return;
    if (navigator.vibrate) { try { navigator.vibrate(pattern); } catch (e) {} }
  }

  // ---- 🧲 Mıknatıs: yakındaki toplanabilirleri kuşa doğru çeker ----
  function magnetPull(list) {
    if (frame >= magnetUntil || !list.length) return;
    const R = 155;   // çekim yarıçapı
    for (const it of list) {
      if (it.taken || it.type === "blind") continue;   // 🌫️ tuzağı mıknatıs çekmesin
      const dx = ball.x - it.x, dy = ball.y - it.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < R && dist > 1) {
        const pull = (1 - dist / R) * 6.5 + 1;   // yakınlaştıkça hızlanır
        it.x += (dx / dist) * pull;
        it.y += (dy / dist) * pull;
      }
    }
  }

  // ---- Seçili iz efekti: kuşun arkasında parçacık kuyruğu ----
  function emitTrail() {
    if (selectedTrail === 0) return;            // "none"
    const every = CONFIG.quality === "low" ? 4 : CONFIG.quality === "high" ? 1 : 2;
    if (frame % every !== 0) return;            // kaliteye göre sıklık
    const tr = TRAILS[selectedTrail];
    const bx = ball.x - ballR * 0.8, by = ball.y + 3;
    let col;
    if (tr.rainbow) {
      const rc = ["#ff004c", "#ff8a00", "#ffe000", "#2ecc40", "#0074d9", "#b10dc9"];
      col = rc[Math.floor(frame / 4) % rc.length];
    } else {
      col = tr.cols[Math.floor(Math.random() * tr.cols.length)];
    }
    fx.push({
      x: bx + (Math.random() * 4 - 2), y: by + (Math.random() * 4 - 2),
      vx: -1.2 - Math.random() * 0.8, vy: (Math.random() * 2 - 1) * 0.6,
      s: (tr.s || 5) * (0.6 + Math.random() * 0.6),
      life: 1, g: (tr.g == null ? 0.02 : tr.g), d: 0.045,
      col: col
    });
  }

  function drawFx() {
    for (const f of fx) {
      ctx.globalAlpha = Math.max(0, f.life);
      ctx.fillStyle = f.col;
      ctx.fillRect(f.x - f.s / 2, f.y - f.s / 2, f.s, f.s);
    }
    ctx.globalAlpha = 1;
  }

  // ---- Coin Rush: uçan altınlar ----
  function updateCoinRush(spd) {
    if (frame >= nextCoinPickup) {
      const pos = spawnSpecial(13);
      coinPickups.push({ x: pos.x, y: pos.y, r: 13, taken: false });
      nextCoinPickup = frame + 18 + Math.floor(Math.random() * 24);
    }
    for (const c of coinPickups) c.x -= spd;
    // 🧲 mıknatıs aktifse altınları kuşa doğru çek
    magnetPull(coinPickups);
    coinPickups = coinPickups.filter(function (c) { return c.x > -30 && !c.taken; });
    for (const c of coinPickups) {
      const dx = c.x - ball.x, dy = c.y - ball.y;
      if (Math.sqrt(dx * dx + dy * dy) < ballR + c.r) {
        c.taken = true;
        coins += 1; runCoins += 1; score += 1; saveCoins();
        Sound.sfx("score"); Rewards.onCoins(1);
        burst(c.x, c.y, ["#fff6c2", "#ffd400", "#ffe14d"], 8, { spd: 3, g: 0.12, d: 0.045 });
        buzz(12);
      }
    }
    coinPickups = coinPickups.filter(function (c) { return !c.taken; });
  }

  function drawCoinPickups() {
    for (const c of coinPickups) {
      const wob = Math.abs(Math.sin(frame * 0.12 + c.x * 0.05)); // dönme efekti
      ctx.save();
      ctx.translate(c.x, c.y);
      ctx.scale(0.35 + wob * 0.65, 1);
      ctx.beginPath(); ctx.arc(0, 0, c.r, 0, Math.PI * 2);
      const g = ctx.createRadialGradient(-3, -3, 2, 0, 0, c.r);
      g.addColorStop(0, "#fff6c2"); g.addColorStop(0.6, "#ffd400"); g.addColorStop(1, "#e0a000");
      ctx.fillStyle = g; ctx.fill();
      ctx.lineWidth = 2; ctx.strokeStyle = "#a87d0a"; ctx.stroke();
      ctx.restore();
      ctx.fillStyle = "rgba(168,125,10,0.85)"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.font = "bold " + Math.round(c.r) + "px 'Segoe UI', sans-serif";
      if (wob > 0.5) ctx.fillText("₺", c.x, c.y + 1);
      ctx.textBaseline = "alphabetic";
    }
  }

  function drawWindArrow() {
    const up = gustDir < 0;
    const cx = ball.x + 46, cy = ball.y;
    ctx.save();
    ctx.globalAlpha = 0.55 + 0.35 * Math.abs(Math.sin(frame * 0.4));
    ctx.strokeStyle = "#bff0ff"; ctx.fillStyle = "#bff0ff"; ctx.lineWidth = 4;
    for (let i = 0; i < 3; i++) {
      const oy = cy + (up ? 1 : -1) * (i * 14 - 14);
      ctx.beginPath(); ctx.moveTo(cx - 14, oy); ctx.lineTo(cx + 14, oy); ctx.stroke();
    }
    const ty = up ? cy - 30 : cy + 30;
    ctx.beginPath();
    ctx.moveTo(cx, ty + (up ? -8 : 8));
    ctx.lineTo(cx - 9, ty + (up ? 6 : -6));
    ctx.lineTo(cx + 9, ty + (up ? 6 : -6));
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  function drawToasts() {
    toasts = toasts.filter(function (t) { return frame < t.until; });
    if (!toasts.length) return;
    ctx.textAlign = "center";
    let ty = H * 0.16;
    for (const t of toasts) {
      const age = frame - t.born, life = t.until - t.born;
      let a = 1;
      if (age < 12) a = age / 12;
      else if (frame > t.until - 24) a = (t.until - frame) / 24;
      ctx.font = "bold 15px 'Segoe UI', sans-serif";
      const w = ctx.measureText(t.text).width + 34;
      ctx.globalAlpha = Math.max(0, a);
      ctx.fillStyle = "rgba(12,18,26,0.9)";
      roundRect(W / 2 - w / 2, ty - 20, w, 30, 15); ctx.fill();
      ctx.lineWidth = 1.5; ctx.strokeStyle = t.color;
      roundRect(W / 2 - w / 2, ty - 20, w, 30, 15); ctx.stroke();
      ctx.fillStyle = t.color;
      ctx.fillText(t.text, W / 2, ty);
      ctx.globalAlpha = 1;
      ty += 38;
    }
  }

  // ---- Kaçış modu: düşman kuşlar üstümüze doğru uçar ----
  function updateEnemies(spd) {
    if (frame >= nextEnemyFrame) {
      spawnEnemy();
      nextEnemyFrame = frame + 120 + Math.floor(Math.random() * 150); // ~2–4.5 sn
    }
    moveEnemies(spd);
  }

  // Düşman kuşları hareket ettir + çarpışma (Kaçış ve Boss ortak)
  function moveEnemies(spd) {
    for (const e of enemies) {
      e.x -= spd * e.mul;                          // borulardan hızlı
      const dy = ball.y - e.y;                     // hafif dikey takip
      e.vy += Math.max(-0.06, Math.min(0.06, dy * 0.002));
      e.vy = Math.max(-2, Math.min(2, e.vy));
      e.y += e.vy;
    }
    for (const e of enemies) {
      if (e.dead) continue;
      const dx = e.x - ball.x, dy = e.y - ball.y;
      if (Math.sqrt(dx * dx + dy * dy) < ballR + e.r - 3) {
        if (frame < invulnUntil || frame < ghostUntil) { e.dead = true; continue; }
        if (shieldActive) { shieldActive = false; invulnUntil = frame + 20; e.dead = true; Sound.sfx("shield"); continue; }
        gameOver(e.big ? t("death_giant") : t("death_bird"));
        break;
      }
    }
    enemies = enemies.filter(function (e) { return e.x > -40 && !e.dead; });
  }

  // =============== BOSS FIGHT ===============
  function bossGeom() {
    const r = Math.min(H * 0.42, W * 0.32);
    return { cx: W + r * 0.12, cy: H / 2 + Math.sin(frame * 0.03) * 22, r: r };
  }

  function updateBoss(spd) {
    if (bossMouthOpen > 0) bossMouthOpen--;
    bossSurvive++;
    if (bossSurvive % 20 === 0) score++;                                  // hayatta kaldıkça puan
    if (bossSurvive % 60 === 0) { coins++; runCoins++; saveCoins(); Rewards.onCoins(1); }

    // sürekli küçük kuşlar (lazer eklendiği için %20 daha seyrek → aralık ×1.25)
    if (frame >= smallBirdNext) {
      spawnBossBird(false);
      smallBirdNext = frame + Math.round((55 + Math.random() * 45) * 1.25);
    }
    moveEnemies(spd);

    // göz lazeri (şarj → ateş → soğuma)
    updateBossLaser();

    // saldırı zamanlayıcı
    if (frame >= bossNextAttack) {
      doBossAttack();
      bossNextAttack = frame + 75 + Math.floor(Math.random() * 70);
    }

    // arada karanlık saldırısı (Karanlık modundan · full değil, geçici)
    if (frame >= bossNextDark) {
      bossDarkUntil = frame + BOSS_DARK_DUR;
      bossNextDark = frame + 60 * (13 + Math.floor(Math.random() * 8));   // 13-20 sn sonra tekrar
      Sound.sfx("thunder");
    }

    // hazardları hareket ettir
    for (const a of bossAttacks) {
      if (a.type === "fire") { a.x += a.vx; a.y += a.vy; }
      else a.x -= spd;   // sarmaşık / diken sola kayar
    }
    bossAttacks = bossAttacks.filter(function (a) {
      if (a.type === "fire") return a.x > -50 && a.x < W + 80 && a.y > -50 && a.y < H + 50;
      return a.x > -a.w - 12;
    });
  }

  // Boss gözünün konumu (çizim + lazer + çarpışma ortak kullanır)
  function bossEye() {
    const b = bossGeom();
    return { x: b.cx - b.r * 0.55, y: b.cy - b.r * 0.26 };
  }
  // Göz kızarma yoğunluğu 0..1 (şarj rampası → ateşte tam → soğumada iner)
  function bossLaserGlow() {
    let g = 0;
    if (bossLaserState === "charge")        g = 1 - (bossLaserT - frame) / LASER_CHARGE;   // 0→1
    else if (bossLaserState === "fire")     g = 1;
    else if (bossLaserState === "cooldown") g = (bossLaserT - frame) / LASER_COOL;          // 1→0
    return Math.max(0, Math.min(1, g));   // 0-1 arası kilitle (ölünce taşıp gözü büyütmesin)
  }

  function updateBossLaser() {
    if (bossLaserState === "idle") {
      if (frame >= bossNextLaser) {
        // şarj başlar: hedefi ŞU ANKİ konuma kilitle → ateşlenince "0.7 sn önceki yer" olur
        bossLaserState = "charge";
        bossLaserT = frame + LASER_CHARGE;
        bossLaserTx = ball.x; bossLaserTy = ball.y;
      }
    } else if (bossLaserState === "charge") {
      if (frame >= bossLaserT) {
        bossLaserState = "fire";
        bossLaserT = frame + LASER_FIRE;
        const eye = bossEye();
        bossLaserAng = Math.atan2(bossLaserTy - eye.y, bossLaserTx - eye.x);   // kilitli yön
        Sound.sfx("fire"); buzz(30); addShake(7, 14);
      }
    } else if (bossLaserState === "fire") {
      if (frame >= bossLaserT) { bossLaserState = "cooldown"; bossLaserT = frame + LASER_COOL; }
    } else if (bossLaserState === "cooldown") {
      if (frame >= bossLaserT) {
        bossLaserState = "idle";
        bossNextLaser = frame + 60 * (7 + Math.floor(Math.random() * 5));   // 7-11 sn sonra tekrar
      }
    }
  }

  function doBossAttack() {
    const b = bossGeom();
    const pick = Math.floor(Math.random() * 6);
    if (pick === 0) {                 // ağızdan ateş
      bossMouthOpen = 22;
      Sound.sfx("fire");
      const mx = b.cx - b.r * 0.72, my = b.cy;
      const n = 1 + Math.floor(Math.random() * 3);
      for (let i = 0; i < n; i++) {
        const ang = Math.atan2(ball.y - my, ball.x - mx) + (i - (n - 1) / 2) * 0.2;
        const sp = 4.6;
        bossAttacks.push({ type: "fire", x: mx, y: my, vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp, r: 13 });
      }
    } else if (pick === 1) {          // dev kuş fırlat
      bossMouthOpen = 22;
      Sound.sfx("fire");
      spawnBossBird(true);
    } else if (pick === 2) {          // üstten sarmaşık
      bossAttacks.push({ type: "vine", x: W + 12, w: 44, len: 120 + Math.random() * (H - GROUND_H) * 0.4 });
    } else if (pick === 3) {          // yerden çiçek/diken
      bossAttacks.push({ type: "spike", x: W + 12, w: 44, len: 120 + Math.random() * (H - GROUND_H) * 0.4 });
    } else if (pick === 4) {          // normal tunnel: fly through the GAP
      spawnPipe(W + 12);
    } else {                          // The Troll pipe — ama ihtimalini azalt: yarısı normal tünel olsun
      if (Math.random() < 0.5) {
        spawnPipe(W + 12);            // troll yerine normal tünel
      } else {
        bossMouthOpen = 22;
        Sound.sfx("fire");
        const tp = makePipe(W + 12);
        tp.troll = true;
        pipes.push(tp);
      }
    }
  }

  function spawnBossBird(big) {
    const b = bossGeom();
    const y = Math.max(50, Math.min(H - GROUND_H - 40, b.cy + (Math.random() * 180 - 90)));
    enemies.push({ x: b.cx - b.r * 0.7, y: y, r: big ? 28 : 13, vy: 0, mul: big ? 1.05 : (1.5 + Math.random() * 0.5), dead: false, big: !!big });
  }

  function bossHits() {
    const groundY = H - GROUND_H;
    for (const a of bossAttacks) {
      if (a.type === "fire") {
        const dx = a.x - ball.x, dy = a.y - ball.y;
        if (Math.sqrt(dx * dx + dy * dy) < ballR + a.r - 2) return true;
      } else if (a.type === "vine") {
        if (ball.x + ballR > a.x && ball.x - ballR < a.x + a.w && ball.y - ballR < a.len) return true;
      } else if (a.type === "spike") {
        if (ball.x + ballR > a.x && ball.x - ballR < a.x + a.w && ball.y + ballR > groundY - a.len) return true;
      }
    }
    // göz lazeri (sadece ateş fazında öldürür)
    if (bossLaserState === "fire") {
      const eye = bossEye();
      const dx = ball.x - eye.x, dy = ball.y - eye.y;
      const t = dx * Math.cos(bossLaserAng) + dy * Math.sin(bossLaserAng);   // ışına izdüşüm
      if (t > 0) {
        const px = eye.x + Math.cos(bossLaserAng) * t, py = eye.y + Math.sin(bossLaserAng) * t;
        if (Math.hypot(ball.x - px, ball.y - py) < ballR + LASER_HALF) return true;
      }
    }
    return false;
  }

  // ---- Boss çizimi ----
  function drawBoss() {
    const b = bossGeom();
    const cx = b.cx, cy = b.cy, r = b.r;
    const flap = Math.sin(frame * 0.12);
    const mo = bossMouthOpen > 0 ? Math.min(1, bossMouthOpen / 22) : 0;

    // öfke aurası (kırmızı nabız — biraz daha sinirli: daha güçlü/hızlı)
    const pulse = 0.5 + 0.5 * Math.sin(frame * 0.18);
    const aura = ctx.createRadialGradient(cx, cy, r * 0.7, cx, cy, r * 1.32);
    aura.addColorStop(0, "rgba(255,40,20,0)");
    aura.addColorStop(0.72, "rgba(255,26,10," + (0.15 + 0.17 * pulse).toFixed(3) + ")");
    aura.addColorStop(1, "rgba(255,0,0,0)");
    ctx.fillStyle = aura;
    ctx.beginPath(); ctx.arc(cx, cy, r * 1.3, 0, Math.PI * 2); ctx.fill();

    // boynuzlar (daha büyük, sivri, dışa kıvrık)
    ctx.fillStyle = "#2a0712";
    ctx.strokeStyle = "#12040a"; ctx.lineWidth = r * 0.02;
    for (let i = -1; i <= 1; i++) {
      const hx = cx + i * r * 0.42, curl = i * r * 0.16;
      ctx.beginPath();
      ctx.moveTo(hx - r * 0.11, cy - r * 0.58);
      ctx.quadraticCurveTo(hx - r * 0.02 + curl, cy - r * 1.06, hx + curl * 1.7, cy - r * 1.26);
      ctx.quadraticCurveTo(hx + r * 0.05 + curl, cy - r * 1.02, hx + r * 0.11, cy - r * 0.58);
      ctx.closePath(); ctx.fill(); ctx.stroke();
    }
    // kanat
    ctx.save();
    ctx.translate(cx + r * 0.12, cy - r * 0.05);
    ctx.rotate(flap * 0.18 - 0.15);
    ctx.fillStyle = "#5a1228";
    ctx.beginPath(); ctx.ellipse(0, 0, r * 0.6, r * 0.34, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    // gövde
    const bg = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, r * 0.2, cx, cy, r);
    bg.addColorStop(0, "#b5384f"); bg.addColorStop(0.6, "#7a1f38"); bg.addColorStop(1, "#450e20");
    ctx.fillStyle = bg;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
    // karın
    ctx.fillStyle = "rgba(255,220,190,0.14)";
    ctx.beginPath(); ctx.ellipse(cx - r * 0.15, cy + r * 0.28, r * 0.5, r * 0.4, 0, 0, Math.PI * 2); ctx.fill();
    // öfkeli alın gölgesi (kaş üstü)
    ctx.fillStyle = "rgba(0,0,0,0.32)";
    ctx.beginPath();
    ctx.moveTo(cx - r * 0.9, cy - r * 0.5);
    ctx.lineTo(cx - r * 0.18, cy - r * 0.14);
    ctx.lineTo(cx - r * 0.18, cy - r * 0.52);
    ctx.closePath(); ctx.fill();

    // göz (kızgın, kırmızı parlayan)
    const ex = cx - r * 0.55, ey = cy - r * 0.26;
    const eglow = ctx.createRadialGradient(ex, ey, r * 0.02, ex, ey, r * 0.28);
    eglow.addColorStop(0, "rgba(255,70,30,0.95)"); eglow.addColorStop(1, "rgba(255,0,0,0)");
    ctx.fillStyle = eglow; ctx.beginPath(); ctx.arc(ex, ey, r * 0.28, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#fff2ea"; ctx.beginPath(); ctx.arc(ex, ey, r * 0.16, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#ff1b1b"; ctx.beginPath(); ctx.arc(ex - r * 0.04, ey + r * 0.01, r * 0.092, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(ex - r * 0.05, ey + r * 0.01, r * 0.045, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.9)"; ctx.beginPath(); ctx.arc(ex - r * 0.085, ey - r * 0.035, r * 0.022, 0, Math.PI * 2); ctx.fill();

    // lazer şarj/ateş: göz fena kızarır (mini animasyon)
    const lg = bossLaserGlow();
    if (lg > 0) {
      const gg = ctx.createRadialGradient(ex, ey, r * 0.02, ex, ey, r * 0.42);
      gg.addColorStop(0, "rgba(255,255,255," + (0.55 * lg).toFixed(3) + ")");
      gg.addColorStop(0.3, "rgba(255,40,10," + (0.9 * lg).toFixed(3) + ")");
      gg.addColorStop(1, "rgba(255,0,0,0)");
      ctx.fillStyle = gg;
      ctx.beginPath(); ctx.arc(ex, ey, r * 0.42, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "rgba(255," + Math.round(50 + 190 * lg) + ",40," + lg.toFixed(3) + ")";
      ctx.beginPath(); ctx.arc(ex - r * 0.04, ey + r * 0.01, r * 0.10 * (1 + 0.5 * lg), 0, Math.PI * 2); ctx.fill();
    }

    // kaş (daha kalın + daha dik = daha sinirli) ve ikinci öfke çizgisi
    ctx.strokeStyle = "#050505"; ctx.lineCap = "round";
    ctx.lineWidth = r * 0.10;
    ctx.beginPath(); ctx.moveTo(ex - r * 0.34, ey - r * 0.46); ctx.lineTo(ex + r * 0.24, ey + r * 0.04); ctx.stroke();
    ctx.lineWidth = r * 0.04;
    ctx.beginPath(); ctx.moveTo(ex - r * 0.04, ey - r * 0.52); ctx.lineTo(ex + r * 0.28, ey - r * 0.14); ctx.stroke();
    ctx.lineCap = "butt";

    // gaga (açılan ağız)
    const bx = cx - r * 0.72, by = cy + r * 0.06;
    ctx.fillStyle = "#ff9a1f";
    ctx.beginPath();
    ctx.moveTo(bx + r * 0.32, by - r * 0.06 - mo * r * 0.16);
    ctx.lineTo(bx - r * 0.34, by - mo * r * 0.07);
    ctx.lineTo(bx + r * 0.32, by + r * 0.02);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#e07a00";
    ctx.beginPath();
    ctx.moveTo(bx + r * 0.32, by + r * 0.06 + mo * r * 0.16);
    ctx.lineTo(bx - r * 0.3, by + r * 0.07 + mo * r * 0.09);
    ctx.lineTo(bx + r * 0.32, by + r * 0.02);
    ctx.closePath(); ctx.fill();
    // açık ağız içi + sivri dişler
    if (mo > 0.15) {
      ctx.fillStyle = "rgba(110,0,0," + (0.55 + 0.45 * mo).toFixed(2) + ")";
      ctx.beginPath();
      ctx.moveTo(bx + r * 0.28, by - r * 0.04 - mo * r * 0.12);
      ctx.lineTo(bx - r * 0.2, by);
      ctx.lineTo(bx + r * 0.28, by + r * 0.04 + mo * r * 0.12);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#fff";
      for (let k = 0; k < 3; k++) {
        const tx = bx + r * 0.26 - k * r * 0.13;
        ctx.beginPath();
        ctx.moveTo(tx, by - r * 0.04 - mo * r * 0.1);
        ctx.lineTo(tx - r * 0.06, by - r * 0.04 - mo * r * 0.1);
        ctx.lineTo(tx - r * 0.03, by + r * 0.02);
        ctx.closePath(); ctx.fill();
      }
    }
    if (mo > 0.3) {
      ctx.fillStyle = "rgba(255,120,0," + mo.toFixed(2) + ")";
      ctx.beginPath(); ctx.arc(bx, by, r * 0.12 * mo, 0, Math.PI * 2); ctx.fill();
    }

    // burun deliğinden öfke dumanı
    for (let s = 0; s < 2; s++) {
      const ph = (frame * 0.05 + s * 3) % 6;
      const sy = by - r * 0.18 - ph * r * 0.055;
      ctx.fillStyle = "rgba(70,70,70," + Math.max(0, 0.22 - ph * 0.035).toFixed(3) + ")";
      ctx.beginPath(); ctx.arc(bx - r * 0.02 + s * r * 0.07, sy, r * 0.045 + ph * 0.01 * r, 0, Math.PI * 2); ctx.fill();
    }
  }

  function drawBossAttacks() {
    for (const a of bossAttacks) {
      if (a.type === "fire") drawFireball(a);
