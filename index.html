  // Görevler & Ödüller ekranı
  function drawMissionsMenu() {
    const boxW = Math.min(470, W - 24);
    const x = (W - boxW) / 2;
    const headH = 56, loginH = 52, missTitleH = 26, rowH = 46, rowGap = 8, achTitleH = 26;
    const ach = Rewards.getAch();
    const perRow = 6, achCell = 44, achGap = 8;
    const achRows = Math.ceil(ach.length / perRow);
    const daily = Rewards.getDaily();
    const boxH = headH + loginH + 10 + missTitleH + daily.length * rowH + (daily.length - 1) * rowGap
               + 14 + achTitleH + achRows * achCell + (achRows - 1) * achGap + 18;
    let y = H / 2 - boxH / 2 - 6; if (y < 6) y = 6;
    menuBox(x, y, boxW, boxH);

    ctx.textAlign = "center"; ctx.fillStyle = "#ffd400";
    ctx.font = "bold 22px 'Segoe UI', sans-serif";
    ctx.fillText(t("missions_title"), W / 2, y + 34);
    backRect = { x: x + 14, y: y + 16, w: 64, h: 30 }; drawBack(backRect);

    const inX = x + 16, inW = boxW - 32;
    let cy = y + headH;

    // --- Günlük giriş ödülü ---
    const lg = Rewards.getLogin();
    const claimable = Rewards.loginClaimable();
    ctx.fillStyle = "rgba(255,255,255,0.06)";
    roundRect(inX, cy, inW, loginH, 12); ctx.fill();
    ctx.textAlign = "left"; ctx.textBaseline = "middle";
    ctx.fillStyle = "#fff"; ctx.font = "bold 15px 'Segoe UI', sans-serif";
    ctx.fillText(t("daily_reward"), inX + 14, cy + loginH / 2 - 8);
    ctx.fillStyle = "rgba(255,255,255,0.6)"; ctx.font = "12px 'Segoe UI', sans-serif";
    ctx.fillText(tf("streak", { n: lg.streak, r: 20 + Math.min(lg.streak + 1, 7) * 10 }), inX + 14, cy + loginH / 2 + 10);
    // buton
    const lbw = 120, lbh = 34, lbx = inX + inW - lbw - 12, lby = cy + (loginH - lbh) / 2;
    if (claimable) {
      loginClaimRect = { x: lbx, y: lby, w: lbw, h: lbh };
      ctx.fillStyle = "#2f8f4a"; roundRect(lbx, lby, lbw, lbh, 9); ctx.fill();
      ctx.fillStyle = "#fff"; ctx.font = "bold 14px 'Segoe UI', sans-serif"; ctx.textAlign = "center";
      ctx.fillText(tf("claim_daily", { r: 20 + Math.min(lg.streak + 1, 7) * 10 }), lbx + lbw / 2, lby + lbh / 2);
    } else {
      loginClaimRect = null;
      ctx.fillStyle = "rgba(255,255,255,0.10)"; roundRect(lbx, lby, lbw, lbh, 9); ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.font = "13px 'Segoe UI', sans-serif"; ctx.textAlign = "center";
      ctx.fillText(t("claimed_today"), lbx + lbw / 2, lby + lbh / 2);
    }
    ctx.textAlign = "left";
    cy += loginH + 10;

    // --- Günlük görevler ---
    ctx.fillStyle = "#ffd400"; ctx.font = "bold 14px 'Segoe UI', sans-serif";
    ctx.fillText(t("daily_missions"), inX, cy + 16); cy += missTitleH;
    missionClaimRects = [];
    for (let i = 0; i < daily.length; i++) {
      const m = daily[i];
      const done = m.prog >= m.target;
      ctx.fillStyle = "rgba(255,255,255,0.05)";
      roundRect(inX, cy, inW, rowH, 10); ctx.fill();
      // metin
      ctx.fillStyle = "#fff"; ctx.font = "bold 13px 'Segoe UI', sans-serif"; ctx.textBaseline = "middle";
      ctx.fillText(missionText(m), inX + 12, cy + 15);
      // ilerleme çubuğu
      const pbW = inW - 130, pbX = inX + 12, pbY = cy + rowH - 15;
      ctx.fillStyle = "rgba(0,0,0,0.35)"; roundRect(pbX, pbY, pbW, 8, 4); ctx.fill();
      ctx.fillStyle = done ? "#7CFC7C" : "#ffb300";
      roundRect(pbX, pbY, pbW * Math.min(1, m.prog / m.target), 8, 4); ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,0.6)"; ctx.font = "11px 'Segoe UI', sans-serif";
      ctx.fillText(Math.min(m.prog, m.target) + " / " + m.target, pbX + pbW + 8, pbY + 4);
      // ödül düğmesi
      const bw = 92, bh = 30, bx = inX + inW - bw - 10, by = cy + (rowH - bh) / 2;
      if (m.claimed) {
        ctx.fillStyle = "rgba(255,255,255,0.08)"; roundRect(bx, by, bw, bh, 8); ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.font = "12px 'Segoe UI', sans-serif"; ctx.textAlign = "center";
        ctx.fillText(t("claimed_short"), bx + bw / 2, by + bh / 2);
      } else if (done) {
        missionClaimRects.push({ x: bx, y: by, w: bw, h: bh, i: i });
        ctx.fillStyle = "#2f8f4a"; roundRect(bx, by, bw, bh, 8); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.font = "bold 13px 'Segoe UI', sans-serif"; ctx.textAlign = "center";
        ctx.fillText(tf("claim_reward", { r: m.reward }), bx + bw / 2, by + bh / 2);
      } else {
        ctx.fillStyle = "rgba(255,214,0,0.12)"; roundRect(bx, by, bw, bh, 8); ctx.fill();
        ctx.fillStyle = "#ffd400"; ctx.font = "bold 12px 'Segoe UI', sans-serif"; ctx.textAlign = "center";
        ctx.fillText(tf("claim_reward_locked", { r: m.reward }), bx + bw / 2, by + bh / 2);
      }
      ctx.textAlign = "left";
      cy += rowH + rowGap;
    }
    ctx.textBaseline = "alphabetic";

    // --- Başarımlar ---
    cy += 6;
    const ac = Rewards.achCount();
    ctx.fillStyle = "#ffd400"; ctx.font = "bold 14px 'Segoe UI', sans-serif"; ctx.textAlign = "left";
    ctx.fillText(tf("achievements", { have: ac.have, total: ac.total }), inX, cy + 16);
    cy += achTitleH;
    const gridW = perRow * achCell + (perRow - 1) * achGap;
    const gx0 = W / 2 - gridW / 2;
    for (let i = 0; i < ach.length; i++) {
      const a = ach[i];
      const c = i % perRow, r = Math.floor(i / perRow);
      const ax = gx0 + c * (achCell + achGap), ay = cy + r * (achCell + achGap);
      ctx.globalAlpha = a.unlocked ? 1 : 0.32;
      ctx.fillStyle = a.unlocked ? "rgba(255,214,0,0.18)" : "rgba(255,255,255,0.06)";
      roundRect(ax, ay, achCell, achCell, 9); ctx.fill();
      if (a.unlocked) { ctx.lineWidth = 2; ctx.strokeStyle = "#ffd400"; roundRect(ax, ay, achCell, achCell, 9); ctx.stroke(); }
      ctx.globalAlpha = 1;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.font = "22px 'Segoe UI Emoji', sans-serif";
      ctx.globalAlpha = a.unlocked ? 1 : 0.4;
      ctx.fillText(a.unlocked ? a.icon : "🔒", ax + achCell / 2, ay + achCell / 2 + 1);
      ctx.globalAlpha = 1;
      ctx.textBaseline = "alphabetic";
    }
    ctx.textAlign = "center";
    ctx.fillStyle = "rgba(255,255,255,0.55)"; ctx.font = "11px 'Segoe UI', sans-serif";
    ctx.fillText(t("ach_hint"), W / 2, y + boxH - 12);
  }

  // Season / Battle Pass screen
  function drawSeasonMenu() {
    const boxW = Math.min(470, W - 24);
    const x = (W - boxW) / 2;
    const tiers = Season.getTiers();
    const prog = Season.progress();
    const st = Season.getState();
    const headH = 92, rowH = 46, rowGap = 8;
    const boxH = headH + tiers.length * (rowH + rowGap) - rowGap + 16;
    let y = H / 2 - boxH / 2 - 6; if (y < 6) y = 6;
    // clamp so long ladders still fit (cap height, rows scroll off is avoided by sizing)
    menuBox(x, y, boxW, boxH);

    ctx.textAlign = "center"; ctx.fillStyle = "#c86bff";
    ctx.font = "bold 22px 'Segoe UI', sans-serif";
    ctx.fillText(t("season_title"), W / 2, y + 32);
    backRect = { x: x + 14, y: y + 16, w: 64, h: 30 }; drawBack(backRect);

    const inX = x + 16, inW = boxW - 32;
    // level + XP bar
    ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
    ctx.fillStyle = "#fff"; ctx.font = "bold 15px 'Segoe UI', sans-serif";
    ctx.fillText(tf("tier_of", { a: prog.lvl, b: tiers.length }), inX, y + 58);
    ctx.textAlign = "right"; ctx.fillStyle = "rgba(255,255,255,0.6)"; ctx.font = "12px 'Segoe UI', sans-serif";
    ctx.fillText(prog.max ? t("max") : tf("xp_of", { cur: prog.cur, span: prog.span }), inX + inW, y + 58);
    // bar
    const barY = y + 68, barH = 10;
    ctx.textAlign = "left";
    ctx.fillStyle = "rgba(0,0,0,0.35)"; roundRect(inX, barY, inW, barH, 5); ctx.fill();
    ctx.fillStyle = "#c86bff";
    roundRect(inX, barY, inW * Math.min(1, prog.max ? 1 : prog.cur / prog.span), barH, 5); ctx.fill();

    // tier rows
    seasonClaimRects = [];
    let cy = y + headH;
    for (let i = 0; i < tiers.length; i++) {
      const tr = tiers[i];
      const reached = prog.lvl >= i + 1;
      const claimed = st.claimed.indexOf(i) !== -1;
      ctx.fillStyle = reached ? "rgba(200,107,255,0.12)" : "rgba(255,255,255,0.05)";
      roundRect(inX, cy, inW, rowH, 10); ctx.fill();
      if (reached && !claimed) { ctx.lineWidth = 2; ctx.strokeStyle = "#c86bff"; roundRect(inX, cy, inW, rowH, 10); ctx.stroke(); }

      // tier number disc
      ctx.beginPath(); ctx.arc(inX + 26, cy + rowH / 2, 16, 0, Math.PI * 2);
      ctx.fillStyle = reached ? "#8f4fd0" : "rgba(255,255,255,0.12)"; ctx.fill();
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillStyle = "#fff"; ctx.font = "bold 14px 'Segoe UI', sans-serif";
      ctx.fillText(String(i + 1), inX + 26, cy + rowH / 2 + 1);

      // reward text
      ctx.textAlign = "left";
      let rwText = "💰 " + tr.reward.coins;
      if (tr.reward.skin) {
        rwText += "  +  🐤 " + skinNameById(tr.reward.skin) + " " + t("skin_word");
      }
      ctx.fillStyle = "#fff"; ctx.font = "bold 13px 'Segoe UI', sans-serif";
      ctx.fillText(rwText, inX + 52, cy + rowH / 2 + 1);

      // claim button
      const bw = 92, bh = 30, bx = inX + inW - bw - 10, by = cy + (rowH - bh) / 2;
      if (claimed) {
        ctx.fillStyle = "rgba(255,255,255,0.08)"; roundRect(bx, by, bw, bh, 8); ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.font = "12px 'Segoe UI', sans-serif"; ctx.textAlign = "center";
        ctx.fillText(t("claimed_short"), bx + bw / 2, by + bh / 2);
      } else if (reached) {
        seasonClaimRects.push({ x: bx, y: by, w: bw, h: bh, i: i });
        ctx.fillStyle = "#8f4fd0"; roundRect(bx, by, bw, bh, 8); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.font = "bold 13px 'Segoe UI', sans-serif"; ctx.textAlign = "center";
        ctx.fillText(t("claim"), bx + bw / 2, by + bh / 2);
      } else {
        ctx.fillStyle = "rgba(255,255,255,0.08)"; roundRect(bx, by, bw, bh, 8); ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.font = "12px 'Segoe UI', sans-serif"; ctx.textAlign = "center";
        ctx.fillText(t("locked"), bx + bw / 2, by + bh / 2);
      }
      ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
      cy += rowH + rowGap;
    }
    ctx.textBaseline = "alphabetic"; ctx.textAlign = "center";
  }

    const bg = ctx.createLinearGradient(0, y, 0, y + boxH);

    bg.addColorStop(1, "rgba(9,16,22,0.92)");
    ctx.fillStyle = bg;
    roundRect(x, y, boxW, boxH, 18); ctx.fill();
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = hexA(accent, 0.5);
    roundRect(x, y, boxW, boxH, 18); ctx.stroke();

    // mod çipi (accent renkli) — panelin başı artık bu

    roundRect(chipX, chipY, chipW, chipH, chipH / 2); ctx.fill();
    ctx.lineWidth = 1.5; ctx.strokeStyle = accent;
    roundRect(chipX, chipY, chipW, chipH, chipH / 2); ctx.stroke();

    ctx.fillStyle = "#fff";

    ctx.font = "bold 16px 'Segoe UI', sans-serif";
    ctx.fillText(modeName(m), chipX + 46, chipY + chipH / 2 + 1);
    ctx.textBaseline = "alphabetic"; ctx.textAlign = "center";

    ctx.fillStyle = "#fff";
    ctx.font = "bold 17px 'Segoe UI', sans-serif";
    const rp = 1 + 0.06 * Math.sin(frame * 0.12);   // "başla" yazısı nabız gibi
    ctx.save(); ctx.translate(W / 2, y + 82); ctx.scale(rp, rp);

  // Bitiş panelinin sabit geometrisi (çizim + isim kutusu konumu ortak kullanır)
  function panelLayout() {
    const boxW = 360, boxH = 386;
    const x = (W - boxW) / 2;
    const y = H / 2 - boxH / 2 - 4;
    return { boxW: boxW, boxH: boxH, x: x, y: y };
  }

  // Oyun bitiş skor tablosu + kuş rengi + kuş tipi + isim
  function scorePanel() {
    const L = panelLayout();
    const x = L.x, y = L.y, boxW = L.boxW, boxH = L.boxH;

    // panel: gradyan + altın kenar + gölge (temiz görünüm)
    ctx.save();
    ctx.shadowColor = "rgba(0,0,0,0.55)"; ctx.shadowBlur = 26; ctx.shadowOffsetY = 8;
    const bg = ctx.createLinearGradient(0, y, 0, y + boxH);
    bg.addColorStop(0, "rgba(18,30,38,0.97)"); bg.addColorStop(1, "rgba(10,17,23,0.97)");
    ctx.fillStyle = bg;
    roundRect(x, y, boxW, boxH, 20); ctx.fill();
    ctx.restore();
    ctx.lineWidth = 1.5; ctx.strokeStyle = "rgba(255,212,0,0.35)";
    roundRect(x, y, boxW, boxH, 20); ctx.stroke();
    ctx.textAlign = "center";

    // temiz bölüm etiketi (küçük, altın, yanlarda ince çizgi)
    function secLabel(txt, yy) {
      ctx.font = "bold 10px 'Segoe UI', sans-serif";
      ctx.fillStyle = "rgba(255,212,0,0.9)";
      ctx.fillText(txt, W / 2, yy);
      const tw = ctx.measureText(txt).width;
      if (tw < boxW - 90) {
        ctx.strokeStyle = "rgba(255,255,255,0.10)"; ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x + 22, yy - 4); ctx.lineTo(W / 2 - tw / 2 - 10, yy - 4);
        ctx.moveTo(W / 2 + tw / 2 + 10, yy - 4); ctx.lineTo(x + boxW - 22, yy - 4);
        ctx.stroke();
      }
    }

    // Başlık + madalya
    let medal = "";
    if (score >= 100) medal = "💎"; else if (score >= 50) medal = "🥇";
    else if (score >= 25) medal = "🥈"; else if (score >= 10) medal = "🥉";
    ctx.fillStyle = "#ffd400";
    ctx.font = "bold 26px 'Segoe UI', sans-serif";
    ctx.fillText(t("game_over"), W / 2, y + 32);
    if (medal) {
      ctx.font = "27px 'Segoe UI Emoji', sans-serif";
      ctx.fillText(medal, x + 34, y + 34);
      ctx.fillText(medal, x + boxW - 34, y + 34);
    }

    // Ölüm nedeni (yıldırım vb.) veya bu turda kazanılan altın
    if (deathReason) {
      ctx.fillStyle = "#ffc0ae";
      ctx.font = "600 12.5px 'Segoe UI', sans-serif";
      ctx.fillText(deathReason, W / 2, y + 50);
    } else {
      ctx.fillStyle = "#ffe27a";
      ctx.font = "600 12.5px 'Segoe UI', sans-serif";
      ctx.fillText(tf("coins_total", { n: runCoins, t: coins }), W / 2, y + 50);
    }

    // SKOR / REKOR kartları
    const gapX = 16;
    const cardW = (boxW - 40 - gapX) / 2;
    const cardH = 52;
    const cardY = y + 60;
    const leftX = x + 20;
    const rightX = leftX + cardW + gapX;
    statCard(leftX, cardY, cardW, cardH, t("stat_score"), score, "#ffffff");
    statCard(rightX, cardY, cardW, cardH, t("stat_best"), best, "#ffd400");

    // Yeni rekor rozeti
    if (isNewBest) {
      ctx.save();
      ctx.shadowColor = "rgba(255,90,60,0.6)"; ctx.shadowBlur = 10;
      ctx.fillStyle = "#ff5a3c";
      roundRect(W / 2 - 62, y + 114, 124, 22, 11); ctx.fill();
      ctx.restore();
      ctx.fillStyle = "#fff";
      ctx.font = "bold 11px 'Segoe UI', sans-serif";
      ctx.fillText("★ " + t("new_best"), W / 2, y + 129);
    }

    // --- Kuş rengi / dükkan ---
    secLabel(tf("shop_line", { c: coins }), y + 148);
    drawSkinSwatches(x + 16, y + 156, boxW - 32);
    if (frame < skinMsgUntil && skinMsg) {
      ctx.fillStyle = skinMsg.charAt(0) === "✔" ? "#7CFC7C" : "#ff5a3c";
      ctx.font = "bold 13px 'Segoe UI', sans-serif";
      ctx.fillText(skinMsg, W / 2, y + 356);
    }

    // --- İsim --- (isim kutusu HTML <input>, y+236 — syncNameUI)
    secLabel(t("enter_name"), y + 226);

    // --- Kuş tipi (3 adet) ---
    secLabel(t("bird_type"), y + 280);
    drawTypeSwatches(x + 20, y + 290, boxW - 40);

    // retry hint
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.font = "14px 'Segoe UI', sans-serif";
    ctx.fillText(t("retry"), W / 2, y + boxH - 14);
  }

  // HTML isim kutusu ve Kaydet düğmesini panele hizala/göster
  function syncNameUI() {
    // Alt ipucu yazısı yalnızca menü/giriş ekranında görünsün (oyun içinde geri tuşuyla çakışmasın + "mod seç" yazısı anlamsız kalmasın)
    const hintEl = document.getElementById("hint");
    if (hintEl) hintEl.style.display = (state === STATE.MENU || state === STATE.INTRO) ? "" : "none";
    if (state === STATE.OVER) {
      const L = panelLayout();
      const iw = 150, ih = 28, bw = 66;
      const totalW = iw + 6 + bw;
      const ix = L.x + L.boxW / 2 - totalW / 2;
      const iy = L.y + 236;
      nameInput.style.left = ix + "px";
      nameInput.style.top = iy + "px";
      nameInput.style.width = iw + "px";
      nameInput.style.height = ih + "px";
      nameInput.style.lineHeight = ih + "px";
      saveBtn.style.left = (ix + iw + 6) + "px";
      saveBtn.style.top = iy + "px";
      saveBtn.style.width = bw + "px";
      saveBtn.style.height = ih + "px";
      nameInput.style.display = "block";
      saveBtn.style.display = "block";
    } else {
      if (nameInput.style.display !== "none") {
        nameInput.style.display = "none";
        saveBtn.style.display = "none";
      }
    }
  }

  // Kuş tipi seçim kutucukları (mini kuş önizlemesi)
  function drawTypeSwatches(x, y, totalW) {
    typeRects = [];
    const n = BIRD_TYPES.length;
    const cell = totalW / n;
    for (let i = 0; i < n; i++) {
      const cx = x + cell * i + cell / 2;
      const cy = y + 20;
      typeRects.push({ x: x + cell * i, y: y, w: cell, h: 52 });

      // seçili çerçeve
      if (i === selectedType) {
        ctx.fillStyle = "rgba(255,212,0,0.16)";
        roundRect(x + cell * i + 6, y - 2, cell - 12, 48, 10);
        ctx.fill();
        ctx.lineWidth = 2.5;
        ctx.strokeStyle = "#ffd400";
        roundRect(x + cell * i + 6, y - 2, cell - 12, 48, 10);
        ctx.stroke();
      }

      const unlocked = isTypeUnlocked(i);

      // mini kuş önizleme (seçili renk + bu tip)
      ctx.save();
      ctx.globalAlpha = unlocked ? 1 : 0.4;
      ctx.translate(cx - 3, cy);
      ctx.scale(0.6, 0.6);
      paintBird(BALL_R, SKINS[selectedSkin], BIRD_TYPES[i], Math.sin(frame * 0.25));
      ctx.restore();
      if (!unlocked) {
        ctx.font = "14px 'Segoe UI Emoji', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("🔒", cx, cy); ctx.textBaseline = "alphabetic";
      }

      // isim ya da fiyat
      ctx.textAlign = "center";
      ctx.font = "11px 'Segoe UI', sans-serif";
      if (!unlocked) {
        ctx.fillStyle = coins >= BIRD_TYPES[i].cost ? "#ffe066" : "rgba(255,255,255,0.7)";
        ctx.fillText("💰" + BIRD_TYPES[i].cost, cx, y + 42);
      } else {
        ctx.fillStyle = (i === selectedType) ? "#ffd400" : "rgba(255,255,255,0.7)";
        ctx.fillText(birdTypeName(i), cx, y + 42);
      }
    }
  }

  // Kuş görünümü seçim kutucukları
  function drawSkinSwatches(x, y, totalW) {
    skinRects = [];
    const n = SKINS.length;
    const cell = totalW / n;
    const r = 14;
    for (let i = 0; i < n; i++) {
      const cx = x + cell * i + cell / 2;
      const cy = y + 20;
      const unlocked = isSkinUnlocked(i);

      // tıklama alanı
      skinRects.push({ x: x + cell * i, y: y, w: cell, h: 56 });

      // seçili halka
      if (i === selectedSkin) {
        ctx.beginPath();
        ctx.arc(cx, cy, r + 4, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,212,0,0.22)";
        ctx.fill();
        ctx.lineWidth = 3;
        ctx.strokeStyle = "#ffd400";
        ctx.stroke();
      }

      // kuş ikonu
      drawSkinIcon(cx, cy, r, SKINS[i], unlocked);

      // etiket: kilitliyse altın fiyatı (yeterse sarı), açıksa durum
      ctx.textAlign = "center";
      if (!unlocked) {
        const affordable = coins >= SKINS[i].cost;
        ctx.fillStyle = affordable ? "#ffe066" : "rgba(255,255,255,0.85)";
        ctx.font = "bold 10px 'Segoe UI', sans-serif";
        ctx.fillText("💰" + SKINS[i].cost, cx, y + 50);
      } else {
        ctx.fillStyle = "rgba(255,255,255,0.55)";
        ctx.font = "10px 'Segoe UI', sans-serif";
        ctx.fillText(SKINS[i].need === 0 ? t("free") : "✔", cx, y + 50);
      }
    }
  }

  function drawSkinIcon(cx, cy, r, skin, unlocked) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    if (skin.rainbow) {
      const rg = ctx.createLinearGradient(cx - r, cy - r, cx + r, cy + r);
      rg.addColorStop(0.00, "#ff004c");
      rg.addColorStop(0.25, "#ff8a00");
      rg.addColorStop(0.50, "#ffe000");
      rg.addColorStop(0.70, "#2ecc40");
      rg.addColorStop(0.85, "#0074d9");
      rg.addColorStop(1.00, "#b10dc9");
      ctx.fillStyle = rg;
    } else {
      const g = ctx.createRadialGradient(cx - 4, cy - 5, 2, cx, cy, r);
      g.addColorStop(0, skin.c1);
      g.addColorStop(0.6, skin.c2);
      g.addColorStop(1, skin.c3);
      ctx.fillStyle = g;
    }
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = skin.stroke || "#000";
    ctx.stroke();

    // mini göz + gaga (kuş hissi)
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(cx + 4, cy - 4, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = skin.angry ? "#e01010" : "#222";
    ctx.beginPath();
    ctx.arc(cx + 5, cy - 4, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#ff8c1a";
    ctx.beginPath();
    ctx.moveTo(cx + r - 2, cy - 2);
    ctx.lineTo(cx + r + 5, cy);
    ctx.lineTo(cx + r - 2, cy + 3);
    ctx.closePath();
    ctx.fill();

    // kilitliyse karart
    if (!unlocked) {
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(15,15,20,0.62)";
      ctx.fill();
    }
    ctx.restore();
  }

  function statCard(x, y, w, h, label, value, valueColor) {
    const g = ctx.createLinearGradient(x, y, x, y + h);
    g.addColorStop(0, "rgba(255,255,255,0.10)"); g.addColorStop(1, "rgba(255,255,255,0.04)");
    ctx.fillStyle = g;
    roundRect(x, y, w, h, 12); ctx.fill();
    ctx.lineWidth = 1; ctx.strokeStyle = valueColor === "#ffd400" ? "rgba(255,212,0,0.35)" : "rgba(255,255,255,0.14)";
    roundRect(x, y, w, h, 12); ctx.stroke();
    ctx.fillStyle = "rgba(255,255,255,0.6)";
    ctx.font = "bold 11px 'Segoe UI', sans-serif";
    ctx.fillText(label.toUpperCase(), x + w / 2, y + 22);
    ctx.fillStyle = valueColor;
    ctx.font = "bold 34px 'Segoe UI', sans-serif";
    ctx.fillText(String(value), x + w / 2, y + 60);
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // ================= ADMIN PANELİ =================
  const ADMIN_PASS = "MRT";
  const ADMIN_FIELDS = [
    { sec: "🎮 Physics",  k: "gravity",    label: "Gravity",              min: 0.10, max: 0.60, step: 0.01 },
    {                    k: "jump",       label: "Flap strength",        min: -10,  max: -3,   step: 0.1 },
    { sec: "🟩 Pipes",   k: "pipeSpeed",  label: "Pipe speed",           min: 1,    max: 5,    step: 0.1 },
    {                    k: "interval",   label: "Distance between pipes", min: 180, max: 600,  step: 10 },
    {                    k: "gapGreen",   label: "Gap · Green",          min: 120,  max: 400,  step: 5 },
    {                    k: "gapYellow",  label: "Gap · Yellow",         min: 120,  max: 400,  step: 5 },
    {                    k: "gapRed",     label: "Gap · Red",            min: 120,  max: 400,  step: 5 },
    {                    k: "pointsRed",  label: "Red points",           min: 1,    max: 5,    step: 1 },
    { sec: "🎲 Pipe chance %", k: "probGreen",  label: "Green",          min: 0,    max: 100,  step: 1 },
    {                    k: "probYellow", label: "Yellow",               min: 0,    max: 100,  step: 1 },
    {                    k: "probRed",    label: "Red",                  min: 0,    max: 100,  step: 1 },
    { sec: "🌦️ General", k: "milestone",  label: "Environment change score", min: 5, max: 100, step: 5 },
    { sec: "🔊 Volume %", k: "musicVol", label: "Music",                 min: 0,    max: 100,  step: 5, audio: true },
    {                    k: "sfxVol",     label: "Effects",              min: 0,    max: 100,  step: 5, audio: true }
  ];

  const adminBtn = document.getElementById("adminBtn");
  const adminOverlay = document.getElementById("adminOverlay");
  const adminLogin = document.getElementById("adminLogin");
  const adminControls = document.getElementById("adminControls");
  const adminPass = document.getElementById("adminPass");
  const adminErr = document.getElementById("adminErr");
  const adminFields = document.getElementById("adminFields");
  const cfgGapScale = document.getElementById("cfgGapScale");
  const cfgPowerups = document.getElementById("cfgPowerups");
  const cfgSound = document.getElementById("cfgSound");
  const cfgMusic = document.getElementById("cfgMusic");
  const cfgVibrate = document.getElementById("cfgVibrate");

  function buildAdminFields() {
    adminFields.innerHTML = "";
    ADMIN_FIELDS.forEach(function (f) {
      if (f.sec) {
        const sh = document.createElement("div");
        sh.className = "adm-sec";
        sh.textContent = f.sec;
        adminFields.appendChild(sh);
      }
      const row = document.createElement("div");
      row.className = "adm-row";
      const lab = document.createElement("label");
      lab.textContent = f.label;
      const rng = document.createElement("input");
      rng.type = "range";
      rng.min = f.min; rng.max = f.max; rng.step = f.step;
      rng.value = CONFIG[f.k];
      const val = document.createElement("span");
      val.className = "val";
      val.textContent = CONFIG[f.k];
      rng.addEventListener("input", function () {
        CONFIG[f.k] = Number(rng.value);
        val.textContent = rng.value;
        saveConfig();
        if (f.audio) applyAudioSettings();   // ses seviyesi canlı uygulansın
      });
      row.appendChild(lab); row.appendChild(rng); row.appendChild(val);
      adminFields.appendChild(row);
    });
    cfgGapScale.checked = !!CONFIG.gapScale;
    cfgPowerups.checked = !!CONFIG.powerups;
    cfgSound.checked = !!CONFIG.sound;
    cfgMusic.checked = !!CONFIG.music;
    cfgVibrate.checked = !!CONFIG.vibrate;
  }

  function openAdmin() {
    unlockAudio();
    adminOpen = true;
    adminOverlay.style.display = "flex";
    adminErr.textContent = "";
    if (adminAuthed) {
      adminLogin.style.display = "none";
      adminControls.style.display = "block";
      buildAdminFields();
    } else {
      adminLogin.style.display = "block";
      adminControls.style.display = "none";
      adminPass.value = "";
      setTimeout(function () { adminPass.focus(); }, 30);
    }
  }
  function closeAdmin() {
    adminOpen = false;
    adminOverlay.style.display = "none";
  }

  adminBtn.addEventListener("click", openAdmin);
  document.getElementById("adminKapat1").addEventListener("click", closeAdmin);
  document.getElementById("adminKapat2").addEventListener("click", function () { saveConfig(); closeAdmin(); });

  function tryLogin() {
    if (adminPass.value === ADMIN_PASS) {
      adminAuthed = true;
      adminErr.textContent = "";
      adminLogin.style.display = "none";
      adminControls.style.display = "block";
      buildAdminFields();
    } else {
      adminErr.textContent = "Wrong password!";
      adminPass.value = "";
    }
  }
  document.getElementById("adminGiris").addEventListener("click", tryLogin);
  adminPass.addEventListener("keydown", function (e) {
    e.stopPropagation();
    if (e.code === "Enter") tryLogin();
  });

  cfgGapScale.addEventListener("change", function () {
    CONFIG.gapScale = cfgGapScale.checked;
    saveConfig();
  });
  cfgPowerups.addEventListener("change", function () {
    CONFIG.powerups = cfgPowerups.checked;
    saveConfig();
  });
  cfgSound.addEventListener("change", function () {
    CONFIG.sound = cfgSound.checked;
    saveConfig();
    unlockAudio();
    applyAudioSettings();
  });
  cfgMusic.addEventListener("change", function () {
    CONFIG.music = cfgMusic.checked;
    saveConfig();
    unlockAudio();
    applyAudioSettings();
  });
  cfgVibrate.addEventListener("change", function () {
    CONFIG.vibrate = cfgVibrate.checked;
    saveConfig();
    if (CONFIG.vibrate) buzz(20);   // test titreşimi
  });
  document.getElementById("adminAltinSifirla").addEventListener("click", function () {
    coins = 0; saveCoins();
  });
  document.getElementById("adminDeriSifirla").addEventListener("click", function () {
    owned = []; saveOwned();
    if (!isSkinUnlocked(selectedSkin)) { selectedSkin = 0; localStorage.setItem("flappy_skin", "0"); }
  });
  document.getElementById("adminVarsayilan").addEventListener("click", function () {
    CONFIG = Object.assign({}, DEFAULT_CONFIG);
    saveConfig();
    buildAdminFields();
    applyAudioSettings();
    applyQuality();
  });
  document.getElementById("adminSkorSifirla").addEventListener("click", function () {
    for (const k of MODE_KEYS) localStorage.removeItem("flappy_best_" + k);
    localStorage.removeItem("flappy_best");
    best = 0; bestAll = 0;
  });
  document.getElementById("adminTabloTemizle").addEventListener("click", function () {
    for (const k of MODE_KEYS) localStorage.removeItem("flappy_lb_" + k);
    localStorage.removeItem("flappy_lb");
    leaderboard = [];
  });

  // ---- Döngü ----
  function loop() {
    update();
    draw();
    syncNameUI();
    updateAudioScene();
    requestAnimationFrame(loop);
  }

  reset();
  applyAudioSettings();
  applyQuality();
  applyLang();
  loop();
})();
</script>
