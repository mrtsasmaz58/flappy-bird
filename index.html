<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #1b2b34;
    font-family: "Segoe UI", system-ui, sans-serif;
    overflow: hidden;
  }
  body {
    background: #000;
    user-select: none;
    -webkit-user-select: none;
  }
  .wrap {
    position: fixed;
    inset: 0;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    background: #4ec0ca;
    cursor: pointer;
    touch-action: none;
  }
  .hint {
    position: absolute;
    bottom: 10px;
    left: 0;
    right: 0;
    text-align: center;
    color: rgba(255,255,255,0.75);
    font-size: 13px;
    letter-spacing: 0.03em;
    pointer-events: none;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  }
  #nameInput {
    position: absolute;
    display: none;
    box-sizing: border-box;
    border: 2px solid #ffd400;
    border-radius: 8px;
    background: rgba(255,255,255,0.96);
    color: #1b2b34;
    font: 14px "Segoe UI", sans-serif;
    padding: 0 10px;
    outline: none;
  }
  #nameInput::placeholder { color: #90a0ab; }
  #saveBtn {
    position: absolute;
    display: none;
    box-sizing: border-box;
    border: none;
    border-radius: 8px;
    background: #ffd400;
    color: #1b2b34;
    font: bold 13px "Segoe UI", sans-serif;
    cursor: pointer;
  }
  #saveBtn:hover { background: #ffdd33; }

  /* ---- Admin paneli ---- */
  #adminBtn {
    position: fixed;
    right: 12px;
    bottom: 12px;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: rgba(0,0,0,0.45);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.25);
    font-size: 20px;
    line-height: 40px;
    text-align: center;
    cursor: pointer;
    z-index: 50;
    user-select: none;
    backdrop-filter: blur(4px);
  }
  #adminBtn:hover { background: rgba(0,0,0,0.7); }
  #adminOverlay {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    backdrop-filter: blur(3px);
  }
  #adminBox {
    width: min(420px, 92vw);
    max-height: 88vh;
    overflow-y: auto;
    background: #16232b;
    border: 1px solid rgba(255,212,0,0.4);
    border-radius: 16px;
    padding: 20px 22px;
    color: #e8eef2;
    font: 14px "Segoe UI", sans-serif;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  #adminBox h2 { font-size: 19px; color: #ffd400; margin-bottom: 4px; }
  #adminBox .sub { font-size: 12px; color: #9fb0ba; margin-bottom: 14px; }
  #adminLogin input {
    width: 100%; height: 38px; border-radius: 8px; border: 2px solid #ffd400;
    background: rgba(255,255,255,0.96); color: #1b2b34; padding: 0 12px;
    font: 15px "Segoe UI", sans-serif; outline: none; margin-bottom: 10px;
  }
  #adminErr { color: #ff6a5a; font-size: 12px; min-height: 16px; margin-bottom: 8px; }
  .adm-row {
    display: flex; align-items: center; gap: 10px; margin: 7px 0;
  }
  .adm-row label { flex: 1; font-size: 13px; color: #cdd8de; }
  .adm-row input[type=range] { flex: 1.4; accent-color: #ffd400; }
  .adm-row .val {
    width: 52px; text-align: right; font-weight: bold; color: #ffd400; font-size: 13px;
  }
  .adm-check { display: flex; align-items: center; gap: 8px; margin: 10px 0; }
  .adm-check input { width: 16px; height: 16px; accent-color: #ffd400; }
  .adm-btns { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  .adm-btns button {
    flex: 1; min-width: 120px; height: 36px; border: none; border-radius: 8px;
    font: bold 13px "Segoe UI", sans-serif; cursor: pointer;
  }
  .btn-y { background: #ffd400; color: #1b2b34; }
  .btn-g { background: #2f8f4a; color: #fff; }
  .btn-d { background: #7a2530; color: #fff; }
  .btn-x { background: #33454f; color: #e8eef2; }
  .adm-sec { margin-top: 12px; font-size: 12px; color: #7f939d; text-transform: uppercase; letter-spacing: 0.05em; }
</style>
</head>
<body>
  <div class="wrap">
    <canvas id="game" width="420" height="600"></canvas>
    <input id="nameInput" maxlength="12" placeholder="Adın..." autocomplete="off" />
    <button id="saveBtn">Kaydet</button>
    <div class="hint">Sol tık ile oyna · ölünce SPACE ile tekrar</div>
  </div>

  <div id="adminBtn" title="Admin">⚙</div>
  <div id="adminOverlay">
    <div id="adminBox">
      <h2>🔒 Admin Paneli</h2>
      <div class="sub">Her şeyi buradan ayarla</div>
      <div id="adminLogin">
        <input id="adminPass" type="password" placeholder="Giriş şifresi" autocomplete="off" />
        <div id="adminErr"></div>
        <div class="adm-btns">
          <button class="btn-y" id="adminGiris">Giriş</button>
          <button class="btn-x" id="adminKapat1">Kapat</button>
        </div>
      </div>
      <div id="adminControls" style="display:none;">
        <div class="adm-sec">Ayarlar</div>
        <div id="adminFields"></div>
        <div class="adm-check">
          <input type="checkbox" id="cfgGapScale" />
          <label for="cfgGapScale">Boşluğu ekran yüksekliğine göre ölçekle</label>
        </div>
        <div class="adm-btns">
          <button class="btn-g" id="adminVarsayilan">Varsayılana Dön</button>
          <button class="btn-d" id="adminSkorSifirla">Rekoru Sıfırla</button>
        </div>
        <div class="adm-btns">
          <button class="btn-d" id="adminTabloTemizle">Tabloyu Temizle</button>
          <button class="btn-y" id="adminKapat2">Kaydet & Kapat</button>
        </div>
      </div>
    </div>
  </div>

<script>
(function () {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const nameInput = document.getElementById("nameInput");
  const saveBtn = document.getElementById("saveBtn");

  // Tam ekran: canvas pencereyi tamamen doldurur
  let W, H;
  function resize() {
    canvas.width = W = window.innerWidth;
    canvas.height = H = window.innerHeight;
  }
  resize();
  window.addEventListener("resize", resize);

  // ---- Sabitler ----
  const BALL_R = 16;
  const PIPE_W = 62;
  const GROUND_H = 90;

  // ---- Ayarlanabilir CONFIG (admin panelinden değiştirilebilir) ----
  const DEFAULT_CONFIG = {
    gravity: 0.26,
    jump: -6.1,
    pipeSpeed: 2.1,
    interval: 340,     // tam ekran için daha geniş
    gapGreen: 235,     // tam ekran için daha geniş boşluklar
    gapYellow: 210,
    gapRed: 190,
    pointsRed: 2,
    probGreen: 70,
    probYellow: 20,
    probRed: 10,
    lightning: 15,     // yüzde (eski %5 → 3 katı)
    milestone: 20,
    gapScale: true     // boşluğu ekran yüksekliğine göre ölçekle
  };
  let CONFIG = Object.assign({}, DEFAULT_CONFIG);
  try {
    const saved = JSON.parse(localStorage.getItem("flappy_cfg") || "{}");
    CONFIG = Object.assign(CONFIG, saved);
  } catch (e) {}
  function saveConfig() { localStorage.setItem("flappy_cfg", JSON.stringify(CONFIG)); }

  // ---- Durum ----
  const STATE = { READY: 0, PLAY: 1, OVER: 2 };
  let state = STATE.READY;

  let ball, pipes, score, best, frame, groundX, isNewBest;
  let selectedSkin, skinMsgUntil = 0, skinRects = [];
  let adminOpen = false, adminAuthed = false;

  best = Number(localStorage.getItem("flappy_best") || 0);

  // Boru renkleri (zorluk/şans/puan CONFIG'ten gelir)
  const PIPE_COLORS = [
    { light: "#9fdb4d", mid: "#6db32c", dark: "#4d861f", lip: "#3f7018" }, // yeşil
    { light: "#ffe066", mid: "#f4c430", dark: "#c99a12", lip: "#a87d0a" }, // sarı
    { light: "#ff6f60", mid: "#e63b2e", dark: "#b81f16", lip: "#8f150e" }  // kırmızı
  ];

  function pickPipeColorIndex() {
    const g = CONFIG.probGreen, y = CONFIG.probYellow, rr = CONFIG.probRed;
    const total = (g + y + rr) || 1;
    const r = Math.random() * total;
    if (r < g) return 0;
    if (r < g + y) return 1;
    return 2;
  }

  function gapFor(ci) {
    const base = ci === 0 ? CONFIG.gapGreen : ci === 1 ? CONFIG.gapYellow : CONFIG.gapRed;
    const scale = CONFIG.gapScale ? Math.min(1.6, Math.max(0.9, H / 700)) : 1;
    return base * scale;
  }

  function pointsFor(ci) { return ci === 2 ? CONFIG.pointsRed : 1; }

  // ---- Kuş görünümleri (9 adet, best score ile açılır) ----
  const SKINS = [
    { id: "sari",     name: "Sarı",         need: 0,   c1: "#fff27a", c2: "#ffd400", c3: "#e0a400", stroke: "#b07d00", wing: "#f7be12" },
    { id: "kirmizi",  name: "Kırmızı",      need: 10,  c1: "#ff9a8a", c2: "#e63b2e", c3: "#b81f16", stroke: "#7e130c", wing: "#d12f22" },
    { id: "mavi",     name: "Mavi",         need: 20,  c1: "#9fd6ff", c2: "#2f8fe0", c3: "#1c5fb0", stroke: "#123f7a", wing: "#2b84d4" },
    { id: "yesil",    name: "Yeşil",        need: 30,  c1: "#b6f09a", c2: "#4fbf46", c3: "#2f8f2a", stroke: "#1c5e18", wing: "#46b03f" },
    { id: "turuncu",  name: "Turuncu",      need: 45,  c1: "#ffcf9e", c2: "#ff8a2b", c3: "#d9611a", stroke: "#a5450f", wing: "#ff7a1a" },
    { id: "pembe",    name: "Pembe",        need: 60,  c1: "#ffd0ec", c2: "#ff6fb5", c3: "#e03e8f", stroke: "#a12563", wing: "#ff5aa8" },
    { id: "mor",      name: "Mor",          need: 80,  c1: "#dcb6ff", c2: "#9b4dea", c3: "#6f28b0", stroke: "#47166f", wing: "#8f3fd8" },
    { id: "siyah",    name: "Kızgın Siyah", need: 100, c1: "#6a6a6a", c2: "#2a2a2a", c3: "#0f0f0f", stroke: "#000000", wing: "#3a3a3a", angry: true },
    { id: "rainbow",  name: "Rainbow",      need: 150, rainbow: true, stroke: "#8a5a00", wing: "#ffffff" }
  ];

  // ---- Kuş tipleri (3 adet, herkese açık) ----
  const BIRD_TYPES = [
    { id: "yuvarlak", name: "Yuvarlak", bx: 3, by: 0,  wx: 12, wy: 7.5, beak: 13, tail: 11, crest: false },
    { id: "sivri",    name: "Sivri",    bx: 6, by: -3, wx: 13, wy: 6,   beak: 18, tail: 15, crest: false },
    { id: "tombul",   name: "Tombul",   bx: 1, by: 3,  wx: 10, wy: 9,   beak: 11, tail: 8,  crest: true }
  ];
  let selectedType = Number(localStorage.getItem("flappy_type") || 0);
  if (isNaN(selectedType) || selectedType < 0 || selectedType >= BIRD_TYPES.length) selectedType = 0;
  let typeRects = [];

  function selectType(i) {
    if (i < 0 || i >= BIRD_TYPES.length) return;
    selectedType = i;
    localStorage.setItem("flappy_type", String(i));
  }

  // Kayıtlı kuş rengini yükle; kilitliyse sarıya düş
  selectedSkin = Number(localStorage.getItem("flappy_skin") || 0);
  if (isNaN(selectedSkin) || selectedSkin < 0 || selectedSkin >= SKINS.length) selectedSkin = 0;
  if (best < SKINS[selectedSkin].need) selectedSkin = 0;

  // ---- Çevre (her 20 puanda: gündüz / gece / yağmur) ----
  let envMode = "day";          // "day" | "night" | "rain"
  let nextMilestone = 20;
  let flashUntil = 0;           // yıldırım flaşı bitiş frame'i
  let lightningX = 0;
  let deathReason = "";
  let rainDrops = [];

  // Gece yıldızları (W,H oranına göre, ölçeklenir)
  const stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({ x: Math.random(), y: Math.random() * 0.62, r: Math.random() * 1.4 + 0.5, p: Math.random() * 6.28 });
  }

  function initRain() {
    rainDrops = [];
    for (let i = 0; i < 110; i++) {
      rainDrops.push({ x: Math.random() * W, y: Math.random() * H, len: 10 + Math.random() * 12, sp: 9 + Math.random() * 6 });
    }
  }

  function updateRain() {
    for (const d of rainDrops) {
      d.y += d.sp;
      d.x -= 2.2;
      if (d.y > H - GROUND_H + 10) { d.y = -10; d.x = Math.random() * W; }
      if (d.x < -5) d.x = W + Math.random() * 20;
    }
  }

  // Her 20 puanda çevre değişimi (eşit şans)
  function applyMilestone() {
    if (envMode === "night") {
      envMode = "day";          // geceyse gündüze dön
    } else {
      envMode = Math.random() < 0.5 ? "night" : "rain"; // eşit şans
    }
    if (envMode === "rain" && rainDrops.length === 0) initRain();
  }

  function strikeLightning() {
    flashUntil = frame + 10;
    lightningX = ball.x;
    gameOver("Yıldırım çarptı! ⚡");
  }

  // Kuş seçme denemesi (best score'a göre)
  function trySelectSkin(i) {
    if (i < 0 || i >= SKINS.length) return;
    if (best >= SKINS[i].need) {
      selectedSkin = i;
      localStorage.setItem("flappy_skin", String(i));
      skinMsgUntil = 0;
    } else {
      skinMsgUntil = frame + 100; // "puanınız yetmiyor" ~1.6 sn
    }
  }

  // ---- Liderlik tablosu (ilk 10, local) ----
  function loadLB() {
    try { return JSON.parse(localStorage.getItem("flappy_lb") || "[]"); }
    catch (e) { return []; }
  }
  let leaderboard = loadLB();
  let scoreSaved = false;
  nameInput.value = localStorage.getItem("flappy_name") || "";

  function addToLB(name, sc) {
    leaderboard.push({ name: name, score: sc });
    leaderboard.sort(function (a, b) { return b.score - a.score; });
    leaderboard = leaderboard.slice(0, 10);
    localStorage.setItem("flappy_lb", JSON.stringify(leaderboard));
  }

  function saveScore() {
    if (scoreSaved) return;
    let nm = (nameInput.value || "").trim();
    if (!nm) nm = "Oyuncu";
    localStorage.setItem("flappy_name", nm);
    addToLB(nm, score);
    scoreSaved = true;
  }

  saveBtn.addEventListener("click", function () {
    saveScore();
    nameInput.blur();
  });
  nameInput.addEventListener("keydown", function (e) {
    // yazarken tuşların oyuna gitmesini engelle (space, digit vs.)
    e.stopPropagation();
    if (e.code === "Enter") {
      saveScore();
      nameInput.blur();
    }
  });

  function reset() {
    ball = { x: W * 0.28, y: H / 2, vy: 0, rot: 0 };
    pipes = [];
    score = 0;
    frame = 0;
    groundX = 0;
    isNewBest = false;
    envMode = "day";
    nextMilestone = CONFIG.milestone;
    flashUntil = 0;
    deathReason = "";
    spawnPipe(W + 40);
    spawnPipe(W + 40 + CONFIG.interval);
    spawnPipe(W + 40 + CONFIG.interval * 2);
  }

  function spawnPipe(x) {
    const margin = 55;
    const ci = pickPipeColorIndex();
    const col = PIPE_COLORS[ci];
    const gap = gapFor(ci);
    const topMax = H - GROUND_H - gap - margin;
    const topH = margin + Math.random() * (topMax - margin);
    pipes.push({ x: x, top: topH, gap: gap, passed: false, col: col, ci: ci, points: pointsFor(ci) });
  }

  function jump() {
    if (state === STATE.READY) {
      state = STATE.PLAY;
      ball.vy = CONFIG.jump;
    } else if (state === STATE.PLAY) {
      ball.vy = CONFIG.jump;
    }
    // OVER'da zıplama/başlatma yok; oyuna dönüş sadece SPACE (restart)
  }

  function restart() {
    reset();
    state = STATE.READY;
  }

  // ---- Girdi ----
  canvas.addEventListener("mousedown", function (e) {
    if (e.button !== 0 || adminOpen) return;
    if (state === STATE.OVER) {
      // OVER'da sol tık SADECE seçim yapar; oyunu başlatmaz
      const rect = canvas.getBoundingClientRect();
      const mx = (e.clientX - rect.left) * (W / rect.width);
      const my = (e.clientY - rect.top) * (H / rect.height);
      // renk kutucukları
      for (let i = 0; i < skinRects.length; i++) {
        const s = skinRects[i];
        if (mx >= s.x && mx <= s.x + s.w && my >= s.y && my <= s.y + s.h) {
          trySelectSkin(i);
          return;
        }
      }
      // kuş tipi kutucukları
      for (let i = 0; i < typeRects.length; i++) {
        const s = typeRects[i];
        if (mx >= s.x && mx <= s.x + s.w && my >= s.y && my <= s.y + s.h) {
          selectType(i);
          return;
        }
      }
      return;
    }
    jump(); // READY başlat / PLAY zıpla
  });

  window.addEventListener("keydown", function (e) {
    if (adminOpen) return; // admin panelindeyken oyun tuşları çalışmaz
    if (state === STATE.OVER) {
      // 1-9 ile kuş seç
      if (e.code.indexOf("Digit") === 0) {
        const n = Number(e.code.slice(5));
        if (n >= 1 && n <= SKINS.length) { trySelectSkin(n - 1); e.preventDefault(); return; }
      }
      // SPACE ile oyuna dön
      if (e.code === "Space") { e.preventDefault(); restart(); return; }
      return;
    }
    // READY / PLAY: boşluk veya yukarı ok da zıplatır (ana kontrol sol tık)
    if (e.code === "Space" || e.code === "ArrowUp") {
      e.preventDefault();
      jump();
    }
  });

  canvas.addEventListener("touchstart", function (e) {
    e.preventDefault();
    if (state === STATE.OVER) { restart(); return; }
    jump();
  }, { passive: false });

  // ---- Güncelle ----
  function update() {
    if (adminOpen) return; // admin paneli açıkken oyun durur
    frame++;
    // zemin kaydırma animasyonu
    groundX = (groundX - CONFIG.pipeSpeed) % 24;

    // yağmur her durumda akar
    if (envMode === "rain") updateRain();

    if (state === STATE.PLAY) {
      ball.vy += CONFIG.gravity;
      ball.y += ball.vy;
      ball.rot = Math.max(-0.5, Math.min(1.2, ball.vy / 12));

      // çubukları kaydır
      for (const p of pipes) p.x -= CONFIG.pipeSpeed;

      // ekrandan çıkanı sil, yeni ekle
      if (pipes.length && pipes[0].x + PIPE_W < 0) pipes.shift();
      const last = pipes[pipes.length - 1];
      if (last.x < W - CONFIG.interval) spawnPipe(last.x + CONFIG.interval);

      // skor (kırmızı boru CONFIG.pointsRed puan)
      for (const p of pipes) {
        if (!p.passed && p.x + PIPE_W < ball.x) {
          p.passed = true;
          const gained = p.points;
          score += gained;

          // her CONFIG.milestone puanda çevre değişimi
          while (score >= nextMilestone) {
            applyMilestone();
            nextMilestone += CONFIG.milestone;
          }

          // yağmurda her puan başına yıldırım (CONFIG.lightning %)
          if (envMode === "rain" && state === STATE.PLAY) {
            for (let k = 0; k < gained; k++) {
              if (Math.random() < CONFIG.lightning / 100) { strikeLightning(); break; }
            }
          }
        }
      }

      // çarpışma (yıldırım zaten öldürmüşse tekrar tetiklenmesin)
      if (state === STATE.PLAY && (hitGroundOrCeiling() || hitPipe())) {
        gameOver();
      }
    } else if (state === STATE.READY) {
      // hafif süzülme
      ball.y = H / 2 + Math.sin(frame / 18) * 8;
    }
  }

  function hitGroundOrCeiling() {
    if (ball.y + BALL_R >= H - GROUND_H) return true;
    if (ball.y - BALL_R <= 0) { ball.y = BALL_R; ball.vy = 0; }
    return false;
  }

  function hitPipe() {
    for (const p of pipes) {
      if (ball.x + BALL_R > p.x && ball.x - BALL_R < p.x + PIPE_W) {
        const gapTop = p.top;
        const gapBottom = p.top + p.gap;
        if (ball.y - BALL_R < gapTop || ball.y + BALL_R > gapBottom) {
          return true;
        }
      }
    }
    return false;
  }

  function gameOver(reason) {
    state = STATE.OVER;
    scoreSaved = false;
    deathReason = reason || "";
    if (score > best) {
      best = score;
      isNewBest = true;
      localStorage.setItem("flappy_best", String(best));
    }
  }

  // ---- Çizim ----
  function draw() {
    // zengin arka plan (gökyüzü + güneş + tepeler + bulutlar)
    drawBackground();

    // çubuklar
    for (const p of pipes) drawPipe(p);

    // zemin
    drawGround();

    // kuş
    drawBird();

    // hava (yağmur + yıldırım flaşı, kuşun önünde)
    drawWeatherOverlay();

    // arayüz
    drawUI();
  }

  function drawWeatherOverlay() {
    if (envMode === "rain") drawRain();
    if (frame < flashUntil) {
      const a = 0.65 * (flashUntil - frame) / 10;
      ctx.fillStyle = "rgba(255,255,255," + a + ")";
      ctx.fillRect(0, 0, W, H);
      drawBolt(lightningX);
    }
  }

  function drawRain() {
    ctx.strokeStyle = "rgba(200,225,255,0.5)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (const d of rainDrops) {
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x - 3, d.y + d.len);
    }
    ctx.stroke();
  }

  function drawBolt(x) {
    ctx.strokeStyle = "#fff7b0";
    ctx.lineWidth = 4;
    ctx.lineJoin = "round";
    ctx.shadowColor = "#fff";
    ctx.shadowBlur = 16;
    ctx.beginPath();
    let y = 0;
    let cx = x;
    ctx.moveTo(cx, y);
    const segs = 6;
    const step = (H - GROUND_H) / segs;
    for (let i = 1; i <= segs; i++) {
      y = i * step;
      cx = x + (i % 2 === 0 ? -18 : 18) + (Math.sin(i * 3) * 6);
      ctx.lineTo(cx, y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Moda göre tepe renkleri
  const HILL_COLORS = {
    day:   ["#b3e0a5", "#9ad683", "#7fce5a", "#5db039"],
    night: ["#2c4a3a", "#254230", "#1d3527", "#152a1e"],
    rain:  ["#88ab90", "#799c80", "#63886d", "#517659"]
  };

  function drawBackground() {
    // ---- gökyüzü ----
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    if (envMode === "night") {
      sky.addColorStop(0, "#0a1230");
      sky.addColorStop(0.5, "#182a52");
      sky.addColorStop(0.85, "#26406a");
      sky.addColorStop(1, "#33506b");
    } else if (envMode === "rain") {
      sky.addColorStop(0, "#5a6b78");
      sky.addColorStop(0.5, "#788a97");
      sky.addColorStop(0.85, "#9fb0ac");
      sky.addColorStop(1, "#b7c4b2");
    } else {
      const t = frame * 0.008;
      const hueTop = 200 + Math.sin(t) * 8;
      const hueMid = 190 + Math.sin(t + 1.2) * 8;
      sky.addColorStop(0, "hsl(" + hueTop + ", 72%, 52%)");
      sky.addColorStop(0.45, "hsl(" + hueMid + ", 68%, 63%)");
      sky.addColorStop(0.8, "#bdeed0");
      sky.addColorStop(1, "#d8f3cf");
    }
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // ---- gök cismi / yıldızlar ----
    if (envMode === "night") { drawStars(); drawMoon(); }
    else if (envMode === "day") { drawSun(); }
    // yağmurda kapalı hava: gök cismi yok

    // ---- dağlar + tepeler ----
    drawMountains(frame * 0.08, H - GROUND_H);
    const hc = HILL_COLORS[envMode] || HILL_COLORS.day;
    drawHills(frame * 0.14, H - GROUND_H + 8, 100, hc[0]);
    drawHills(frame * 0.2, H - GROUND_H + 4, 74, hc[1]);

    // ---- bulutlar ----
    if (envMode === "rain") drawClouds("rgba(120,128,140,0.9)");
    else if (envMode === "night") drawClouds("rgba(150,160,190,0.35)");
    else drawClouds("rgba(255,255,255,0.85)");

    // uzak kuşlar sadece gündüz
    if (envMode === "day") drawFarBirds();

    drawHills(frame * 0.32, H - GROUND_H, 58, hc[2]);
    drawHills(frame * 0.6, H - GROUND_H, 40, hc[3]);
  }

  function drawStars() {
    for (const s of stars) {
      const tw = 0.55 + 0.45 * Math.sin(frame * 0.04 + s.p);
      ctx.fillStyle = "rgba(255,255,255," + tw.toFixed(3) + ")";
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawMoon() {
    const mx = W - 110, my = 100;
    const halo = ctx.createRadialGradient(mx, my, 6, mx, my, 60);
    halo.addColorStop(0, "rgba(230,238,255,0.5)");
    halo.addColorStop(1, "rgba(230,238,255,0)");
    ctx.fillStyle = halo;
    ctx.beginPath(); ctx.arc(mx, my, 60, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#eef3ff";
    ctx.beginPath(); ctx.arc(mx, my, 28, 0, Math.PI * 2); ctx.fill();
    // kraterler
    ctx.fillStyle = "rgba(180,190,215,0.55)";
    ctx.beginPath(); ctx.arc(mx - 8, my - 6, 5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(mx + 9, my + 4, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(mx + 2, my - 12, 3, 0, Math.PI * 2); ctx.fill();
  }

  function drawMountains(offset, baseY) {
    const spacing = 168;
    const shift = offset % spacing;
    const first = Math.floor(offset / spacing);
    const count = Math.ceil(W / spacing) + 2;
    for (let k = 0; k < count; k++) {
      const worldK = first + k;
      const rnd = Math.abs(Math.sin(worldK * 12.9898) * 43758.5453) % 1;
      const h = 120 + rnd * 90;
      const x = k * spacing - shift;
      drawPeak(x, baseY, spacing * 1.15, h);
    }
  }

  function drawPeak(cx, baseY, w, h) {
    // dağ gövdesi
    const g = ctx.createLinearGradient(cx, baseY - h, cx, baseY);
    g.addColorStop(0, "#9aa8bd");
    g.addColorStop(1, "#66768e");
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(cx - w / 2, baseY);
    ctx.lineTo(cx, baseY - h);
    ctx.lineTo(cx + w / 2, baseY);
    ctx.closePath();
    ctx.fill();

    // karlı zirve
    const capH = h * 0.3;
    const capY = baseY - h + capH;
    const cw = (w / 2) * (capH / h);
    ctx.fillStyle = "#f2f6fb";
    ctx.beginPath();
    ctx.moveTo(cx, baseY - h);
    ctx.lineTo(cx - cw, capY);
    ctx.lineTo(cx - cw * 0.45, capY - 5);
    ctx.lineTo(cx - cw * 0.05, capY + 2);
    ctx.lineTo(cx + cw * 0.4, capY - 4);
    ctx.lineTo(cx + cw, capY);
    ctx.closePath();
    ctx.fill();
  }

  function drawSun() {
    const sunX = 84, sunY = 98;
    // dönen ışınlar
    ctx.save();
    ctx.translate(sunX, sunY);
    ctx.rotate(frame * 0.004);
    ctx.strokeStyle = "rgba(255,240,150,0.4)";
    ctx.lineWidth = 4;
    for (let i = 0; i < 12; i++) {
      ctx.rotate(Math.PI / 6);
      ctx.beginPath();
      ctx.moveTo(0, 42);
      ctx.lineTo(0, 60);
      ctx.stroke();
    }
    ctx.restore();

    const halo = ctx.createRadialGradient(sunX, sunY, 8, sunX, sunY, 82);
    halo.addColorStop(0, "rgba(255,247,175,0.95)");
    halo.addColorStop(1, "rgba(255,247,175,0)");
    ctx.fillStyle = halo;
    ctx.beginPath();
    ctx.arc(sunX, sunY, 82, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#fff3a4";
    ctx.beginPath();
    ctx.arc(sunX, sunY, 30, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawFarBirds() {
    ctx.strokeStyle = "rgba(35,55,65,0.4)";
    ctx.lineWidth = 2;
    for (let i = 0; i < 4; i++) {
      const period = W + 240;
      const raw = (i * 190 - frame * 0.7) % period;
      const bx = (raw + period * 2) % period - 120;
      const by = 120 + i * 24 + Math.sin(frame * 0.05 + i) * 7;
      const s = 6 + (i % 2);
      ctx.beginPath();
      ctx.moveTo(bx - s, by);
      ctx.quadraticCurveTo(bx - s * 0.4, by - s, bx, by - s * 0.3);
      ctx.quadraticCurveTo(bx + s * 0.4, by - s, bx + s, by);
      ctx.stroke();
    }
  }

  function drawHills(offset, baseY, r, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(0, H);
    ctx.lineTo(0, baseY);
    const step = r * 1.5;
    const start = -(offset % step) - step;
    for (let x = start; x < W + step; x += step) {
      ctx.arc(x + step / 2, baseY, r, Math.PI, 0, false);
    }
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fill();
  }

  function drawClouds(color) {
    const cloudColor = color || "rgba(255,255,255,0.85)";
    for (let i = 0; i < 4; i++) {
      const period = W + 160;
      const raw = (i * 150 - frame * 0.3) % period;
      const x = (raw + period * 2) % period - 80;
      const y = 70 + (i % 2) * 70;
      ctx.fillStyle = cloudColor;
      ctx.beginPath();
      ctx.arc(x, y, 24, 0, Math.PI * 2);
      ctx.arc(x + 26, y + 6, 20, 0, Math.PI * 2);
      ctx.arc(x - 26, y + 6, 18, 0, Math.PI * 2);
      ctx.arc(x + 4, y + 14, 22, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawPipe(p) {
    const c = p.col;
    const bottomY = p.top + p.gap;
    const grad = ctx.createLinearGradient(p.x, 0, p.x + PIPE_W, 0);
    grad.addColorStop(0, c.dark);
    grad.addColorStop(0.5, c.light);
    grad.addColorStop(1, c.dark);
    ctx.fillStyle = grad;

    // üst çubuk
    ctx.fillRect(p.x, 0, PIPE_W, p.top);
    // alt çubuk
    ctx.fillRect(p.x, bottomY, PIPE_W, H - GROUND_H - bottomY);

    // uç kapaklar
    ctx.fillStyle = c.lip;
    const lip = 14;
    ctx.fillRect(p.x - 4, p.top - lip, PIPE_W + 8, lip);
    ctx.fillRect(p.x - 4, bottomY, PIPE_W + 8, lip);

    // parlama
    ctx.fillStyle = "rgba(255,255,255,0.28)";
    ctx.fillRect(p.x + 8, 0, 6, p.top);
    ctx.fillRect(p.x + 8, bottomY, 6, H - GROUND_H - bottomY);
  }

  function drawGround() {
    const y = H - GROUND_H;
    ctx.fillStyle = "#ded895";
    ctx.fillRect(0, y, W, GROUND_H);
    ctx.fillStyle = "#c5b95e";
    ctx.fillRect(0, y, W, 12);
    // çizgiler
    ctx.fillStyle = "#b7a94f";
    for (let x = groundX; x < W; x += 24) {
      ctx.fillRect(x, y + 12, 12, GROUND_H - 12);
    }
  }

  function drawBird() {
    const speed = state === STATE.PLAY ? 0.35 : 0.15;
    const flap = Math.sin(frame * speed);
    ctx.save();
    ctx.translate(ball.x, ball.y);
    ctx.rotate(ball.rot);
    paintBird(BALL_R, SKINS[selectedSkin], BIRD_TYPES[selectedType], flap);
    ctx.restore();
  }

  // Kuşu (0,0) merkezli çizer — hem oyun kuşu hem tip ikonları kullanır
  function paintBird(R, skin, t, flap) {
    const rx = R + t.bx, ry = R + t.by;

    // kuyruk
    ctx.fillStyle = skin.rainbow ? "#b10dc9" : skin.c3;
    ctx.beginPath();
    ctx.moveTo(-rx + 3, -3);
    ctx.lineTo(-R - t.tail, -9);
    ctx.lineTo(-R - (t.tail - 3), 0);
    ctx.lineTo(-R - t.tail, 8);
    ctx.lineTo(-rx + 3, 4);
    ctx.closePath();
    ctx.fill();

    // gövde
    ctx.beginPath();
    ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
    if (skin.rainbow) {
      const a = frame * 0.05;
      const gx = Math.cos(a) * (rx + 2), gy = Math.sin(a) * (ry + 2);
      const rg = ctx.createLinearGradient(-gx, -gy, gx, gy);
      rg.addColorStop(0.00, "#ff004c");
      rg.addColorStop(0.20, "#ff8a00");
      rg.addColorStop(0.40, "#ffe000");
      rg.addColorStop(0.60, "#2ecc40");
      rg.addColorStop(0.80, "#0074d9");
      rg.addColorStop(1.00, "#b10dc9");
      ctx.fillStyle = rg;
    } else {
      const g = ctx.createRadialGradient(-5, -6, 3, 0, 0, Math.max(rx, ry) + 4);
      g.addColorStop(0, skin.c1);
      g.addColorStop(0.6, skin.c2);
      g.addColorStop(1, skin.c3);
      ctx.fillStyle = g;
    }
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = skin.stroke;
    ctx.stroke();

    // tepe tüyü (tombul tip)
    if (t.crest) {
      ctx.fillStyle = skin.rainbow ? "#ff004c" : skin.c2;
      ctx.beginPath();
      ctx.moveTo(-3, -ry + 3);
      ctx.lineTo(-1, -ry - 9);
      ctx.lineTo(4, -ry + 2);
      ctx.closePath();
      ctx.fill();
    }

    // açık karın
    ctx.beginPath();
    ctx.ellipse(3, 7, Math.max(4, rx - 8), Math.max(3, ry - 9), 0, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255,0.35)";
    ctx.fill();

    // çırpan kanat
    ctx.save();
    ctx.translate(-3, -1);
    ctx.rotate(flap * 0.55);
    ctx.beginPath();
    ctx.ellipse(-5, 2, t.wx, t.wy, 0, 0, Math.PI * 2);
    ctx.fillStyle = skin.wing;
    ctx.fill();
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = skin.stroke;
    ctx.stroke();
    ctx.restore();

    // göz
    ctx.beginPath();
    ctx.arc(9, -6, 5.5, 0, Math.PI * 2);
    ctx.fillStyle = "#fff";
    ctx.fill();
    ctx.lineWidth = 1;
    ctx.strokeStyle = skin.stroke;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(11, -6, 2.6, 0, Math.PI * 2);
    ctx.fillStyle = skin.angry ? "#e01010" : "#222";
    ctx.fill();

    // kızgın kaş
    if (skin.angry) {
      ctx.strokeStyle = "#000";
      ctx.lineWidth = 3;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(2, -14);
      ctx.lineTo(14, -8);
      ctx.stroke();
      ctx.lineCap = "butt";
    }

    // gaga
    ctx.beginPath();
    ctx.moveTo(R + 1, -4);
    ctx.lineTo(R + t.beak, 0);
    ctx.lineTo(R + 1, 5);
    ctx.closePath();
    ctx.fillStyle = "#ff8c1a";
    ctx.fill();
    ctx.lineWidth = 1;
    ctx.strokeStyle = "#d96e00";
    ctx.stroke();
  }

  function drawUI() {
    ctx.textAlign = "center";

    if (state === STATE.PLAY) {
      // Oyun içi anlık skor (büyük, üstte)
      ctx.fillStyle = "#fff";
      ctx.strokeStyle = "rgba(0,0,0,0.35)";
      ctx.font = "bold 50px 'Segoe UI', sans-serif";
      ctx.lineWidth = 6;
      ctx.strokeText(score, W / 2, 92);
      ctx.fillText(score, W / 2, 92);

      // Köşede rekor rozeti
      drawBestBadge();
    }

    if (state === STATE.READY) {
      startPanel();
      drawBestBadge();
      drawLeaderboard();
    }

    if (state === STATE.OVER) {
      scorePanel();
      drawLeaderboard();
    }
  }

  // Sol üst köşe: ilk 10 liderlik tablosu
  function drawLeaderboard() {
    const x = 10, y = 10, w = 148, rows = 10;
    const h = 30 + rows * 15 + 8;
    ctx.fillStyle = "rgba(0,0,0,0.42)";
    roundRect(x, y, w, h, 10);
    ctx.fill();

    ctx.textAlign = "left";
    ctx.fillStyle = "#ffd400";
    ctx.font = "bold 13px 'Segoe UI', sans-serif";
    ctx.fillText("🏆 İLK 10", x + 10, y + 20);

    ctx.font = "12px 'Segoe UI', sans-serif";
    for (let i = 0; i < rows; i++) {
      const e = leaderboard[i];
      const ry = y + 38 + i * 15;
      ctx.textAlign = "left";
      ctx.fillStyle = "rgba(255,255,255,0.45)";
      ctx.fillText((i + 1) + ".", x + 9, ry);
      if (e) {
        ctx.fillStyle = "#fff";
        const nm = e.name.length > 8 ? e.name.slice(0, 8) : e.name;
        ctx.fillText(nm, x + 28, ry);
        ctx.textAlign = "right";
        ctx.fillStyle = "#ffd400";
        ctx.fillText(String(e.score), x + w - 10, ry);
      } else {
        ctx.fillStyle = "rgba(255,255,255,0.22)";
        ctx.fillText("—", x + 28, ry);
      }
    }
    ctx.textAlign = "center";
  }

  // Sağ üst köşede küçük rekor göstergesi
  function drawBestBadge() {
    const bw = 92, bh = 34, x = W - bw - 12, y = 12;
    ctx.fillStyle = "rgba(0,0,0,0.32)";
    roundRect(x, y, bw, bh, 10);
    ctx.fill();
    ctx.textAlign = "left";
    ctx.fillStyle = "#ffd400";
    ctx.font = "bold 12px 'Segoe UI', sans-serif";
    ctx.fillText("★ REKOR", x + 12, y + 15);
    ctx.fillStyle = "#fff";
    ctx.font = "bold 15px 'Segoe UI', sans-serif";
    ctx.fillText(String(best), x + 12, y + 29);
    ctx.textAlign = "center";
  }

  function startPanel() {
    const boxW = 300, boxH = 150;
    const x = (W - boxW) / 2, y = H / 2 - boxH / 2 - 40;
    ctx.fillStyle = "rgba(0,0,0,0.45)";
    roundRect(x, y, boxW, boxH, 16);
    ctx.fill();

    ctx.fillStyle = "#ffd400";
    ctx.font = "bold 34px 'Segoe UI', sans-serif";
    ctx.fillText("Flappy Bird", W / 2, y + 58);

    ctx.fillStyle = "#fff";
    ctx.font = "18px 'Segoe UI', sans-serif";
    ctx.fillText("Başlamak için sol tıkla", W / 2, y + 100);
  }

  // Bitiş panelinin sabit geometrisi (çizim + isim kutusu konumu ortak kullanır)
  function panelLayout() {
    const boxW = 360, boxH = 386;
    const x = (W - boxW) / 2;
    const y = H / 2 - boxH / 2 - 4;
    return { boxW: boxW, boxH: boxH, x: x, y: y };
  }

  // Oyun bitiş skor tablosu + kuş rengi + kuş tipi + isim
  function scorePanel() {
    const L = panelLayout();
    const x = L.x, y = L.y, boxW = L.boxW, boxH = L.boxH;

    ctx.fillStyle = "rgba(0,0,0,0.62)";
    roundRect(x, y, boxW, boxH, 18);
    ctx.fill();
    ctx.textAlign = "center";

    // Başlık
    ctx.fillStyle = "#ffd400";
    ctx.font = "bold 25px 'Segoe UI', sans-serif";
    ctx.fillText("Oyun Bitti", W / 2, y + 30);

    // Ölüm nedeni (yıldırım vb.)
    if (deathReason) {
      ctx.fillStyle = "#ffd0c2";
      ctx.font = "bold 13px 'Segoe UI', sans-serif";
      ctx.fillText(deathReason, W / 2, y + 50);
    }

    // SKOR / REKOR kartları
    const gapX = 16;
    const cardW = (boxW - 40 - gapX) / 2;
    const cardH = 52;
    const cardY = y + 60;
    const leftX = x + 20;
    const rightX = leftX + cardW + gapX;
    statCard(leftX, cardY, cardW, cardH, "SKOR", score, "#ffffff");
    statCard(rightX, cardY, cardW, cardH, "REKOR", best, "#ffd400");

    // Yeni rekor rozeti
    if (isNewBest) {
      ctx.fillStyle = "#ff5a3c";
      roundRect(W / 2 - 60, y + 116, 120, 20, 10);
      ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.font = "bold 11px 'Segoe UI', sans-serif";
      ctx.fillText("★ YENİ REKOR!", W / 2, y + 130);
    }

    // --- Kuş rengi ---
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.font = "bold 13px 'Segoe UI', sans-serif";
    ctx.fillText("Kuş Rengi  (tıkla / 1-9)", W / 2, y + 148);
    drawSkinSwatches(x + 16, y + 156, boxW - 32);
    if (frame < skinMsgUntil) {
      ctx.fillStyle = "#ff5a3c";
      ctx.font = "bold 13px 'Segoe UI', sans-serif";
      ctx.fillText("⚠ Puanınız yetmiyor!", W / 2, y + 356);
    }

    // --- İsim ---
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.font = "bold 13px 'Segoe UI', sans-serif";
    ctx.fillText("Adını yaz ve kaydet:", W / 2, y + 226);
    // (isim kutusu HTML <input>, y+236 — syncNameUI)

    // --- Kuş tipi (3 adet) ---
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.font = "bold 13px 'Segoe UI', sans-serif";
    ctx.fillText("Kuş Tipi", W / 2, y + 280);
    drawTypeSwatches(x + 20, y + 290, boxW - 40);

    // Tekrar bilgisi
    ctx.fillStyle = "rgba(255,255,255,0.9)";
    ctx.font = "15px 'Segoe UI', sans-serif";
    ctx.fillText("Oyuna dönmek için SPACE", W / 2, y + boxH - 14);
  }

  // HTML isim kutusu ve Kaydet düğmesini panele hizala/göster
  function syncNameUI() {
    if (state === STATE.OVER) {
      const L = panelLayout();
      const iw = 150, ih = 28, bw = 66;
      const totalW = iw + 6 + bw;
      const ix = L.x + L.boxW / 2 - totalW / 2;
      const iy = L.y + 236;
      nameInput.style.left = ix + "px";
      nameInput.style.top = iy + "px";
      nameInput.style.width = iw + "px";
      nameInput.style.height = ih + "px";
      nameInput.style.lineHeight = ih + "px";
      saveBtn.style.left = (ix + iw + 6) + "px";
      saveBtn.style.top = iy + "px";
      saveBtn.style.width = bw + "px";
      saveBtn.style.height = ih + "px";
      nameInput.style.display = "block";
      saveBtn.style.display = "block";
    } else {
      if (nameInput.style.display !== "none") {
        nameInput.style.display = "none";
        saveBtn.style.display = "none";
      }
    }
  }

  // Kuş tipi seçim kutucukları (mini kuş önizlemesi)
  function drawTypeSwatches(x, y, totalW) {
    typeRects = [];
    const n = BIRD_TYPES.length;
    const cell = totalW / n;
    for (let i = 0; i < n; i++) {
      const cx = x + cell * i + cell / 2;
      const cy = y + 20;
      typeRects.push({ x: x + cell * i, y: y, w: cell, h: 52 });

      // seçili çerçeve
      if (i === selectedType) {
        ctx.fillStyle = "rgba(255,212,0,0.16)";
        roundRect(x + cell * i + 6, y - 2, cell - 12, 48, 10);
        ctx.fill();
        ctx.lineWidth = 2.5;
        ctx.strokeStyle = "#ffd400";
        roundRect(x + cell * i + 6, y - 2, cell - 12, 48, 10);
        ctx.stroke();
      }

      // mini kuş önizleme (seçili renk + bu tip)
      ctx.save();
      ctx.translate(cx - 3, cy);
      ctx.scale(0.6, 0.6);
      paintBird(BALL_R, SKINS[selectedSkin], BIRD_TYPES[i], Math.sin(frame * 0.25));
      ctx.restore();

      // isim
      ctx.textAlign = "center";
      ctx.fillStyle = (i === selectedType) ? "#ffd400" : "rgba(255,255,255,0.7)";
      ctx.font = "11px 'Segoe UI', sans-serif";
      ctx.fillText(BIRD_TYPES[i].name, cx, y + 42);
    }
  }

  // Kuş görünümü seçim kutucukları
  function drawSkinSwatches(x, y, totalW) {
    skinRects = [];
    const n = SKINS.length;
    const cell = totalW / n;
    const r = 14;
    for (let i = 0; i < n; i++) {
      const cx = x + cell * i + cell / 2;
      const cy = y + 20;
      const unlocked = best >= SKINS[i].need;

      // tıklama alanı
      skinRects.push({ x: x + cell * i, y: y, w: cell, h: 56 });

      // seçili halka
      if (i === selectedSkin) {
        ctx.beginPath();
        ctx.arc(cx, cy, r + 4, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,212,0,0.22)";
        ctx.fill();
        ctx.lineWidth = 3;
        ctx.strokeStyle = "#ffd400";
        ctx.stroke();
      }

      // kuş ikonu
      drawSkinIcon(cx, cy, r, SKINS[i], unlocked);

      // etiket (kilit + gerekli puan)
      ctx.textAlign = "center";
      if (!unlocked) {
        ctx.fillStyle = "rgba(255,255,255,0.9)";
        ctx.font = "bold 10px 'Segoe UI', sans-serif";
        ctx.fillText("🔒" + SKINS[i].need, cx, y + 50);
      } else {
        ctx.fillStyle = "rgba(255,255,255,0.55)";
        ctx.font = "10px 'Segoe UI', sans-serif";
        ctx.fillText(SKINS[i].need === 0 ? "açık" : String(SKINS[i].need), cx, y + 50);
      }
    }
  }

  function drawSkinIcon(cx, cy, r, skin, unlocked) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    if (skin.rainbow) {
      const rg = ctx.createLinearGradient(cx - r, cy - r, cx + r, cy + r);
      rg.addColorStop(0.00, "#ff004c");
      rg.addColorStop(0.25, "#ff8a00");
      rg.addColorStop(0.50, "#ffe000");
      rg.addColorStop(0.70, "#2ecc40");
      rg.addColorStop(0.85, "#0074d9");
      rg.addColorStop(1.00, "#b10dc9");
      ctx.fillStyle = rg;
    } else {
      const g = ctx.createRadialGradient(cx - 4, cy - 5, 2, cx, cy, r);
      g.addColorStop(0, skin.c1);
      g.addColorStop(0.6, skin.c2);
      g.addColorStop(1, skin.c3);
      ctx.fillStyle = g;
    }
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = skin.stroke || "#000";
    ctx.stroke();

    // mini göz + gaga (kuş hissi)
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(cx + 4, cy - 4, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = skin.angry ? "#e01010" : "#222";
    ctx.beginPath();
    ctx.arc(cx + 5, cy - 4, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#ff8c1a";
    ctx.beginPath();
    ctx.moveTo(cx + r - 2, cy - 2);
    ctx.lineTo(cx + r + 5, cy);
    ctx.lineTo(cx + r - 2, cy + 3);
    ctx.closePath();
    ctx.fill();

    // kilitliyse karart
    if (!unlocked) {
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(15,15,20,0.62)";
      ctx.fill();
    }
    ctx.restore();
  }

  function statCard(x, y, w, h, label, value, valueColor) {
    ctx.fillStyle = "rgba(255,255,255,0.1)";
    roundRect(x, y, w, h, 12);
    ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.7)";
    ctx.font = "bold 13px 'Segoe UI', sans-serif";
    ctx.fillText(label, x + w / 2, y + 26);
    ctx.fillStyle = valueColor;
    ctx.font = "bold 34px 'Segoe UI', sans-serif";
    ctx.fillText(String(value), x + w / 2, y + 62);
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // ================= ADMIN PANELİ =================
  const ADMIN_PASS = "THExMRT";
  const ADMIN_FIELDS = [
    { k: "gravity",    label: "Yerçekimi",              min: 0.10, max: 0.60, step: 0.01 },
    { k: "jump",       label: "Zıplama gücü",           min: -10,  max: -3,   step: 0.1 },
    { k: "pipeSpeed",  label: "Boru hızı",              min: 1,    max: 5,    step: 0.1 },
    { k: "interval",   label: "Borular arası mesafe",   min: 180,  max: 600,  step: 10 },
    { k: "gapGreen",   label: "Boşluk · Yeşil",         min: 120,  max: 400,  step: 5 },
    { k: "gapYellow",  label: "Boşluk · Sarı",          min: 120,  max: 400,  step: 5 },
    { k: "gapRed",     label: "Boşluk · Kırmızı",       min: 120,  max: 400,  step: 5 },
    { k: "pointsRed",  label: "Kırmızı puanı",          min: 1,    max: 5,    step: 1 },
    { k: "probGreen",  label: "Şans % · Yeşil",         min: 0,    max: 100,  step: 1 },
    { k: "probYellow", label: "Şans % · Sarı",          min: 0,    max: 100,  step: 1 },
    { k: "probRed",    label: "Şans % · Kırmızı",       min: 0,    max: 100,  step: 1 },
    { k: "lightning",  label: "Yıldırım %",             min: 0,    max: 100,  step: 1 },
    { k: "milestone",  label: "Kaç puanda çevre değişsin", min: 5, max: 100,  step: 5 }
  ];

  const adminBtn = document.getElementById("adminBtn");
  const adminOverlay = document.getElementById("adminOverlay");
  const adminLogin = document.getElementById("adminLogin");
  const adminControls = document.getElementById("adminControls");
  const adminPass = document.getElementById("adminPass");
  const adminErr = document.getElementById("adminErr");
  const adminFields = document.getElementById("adminFields");
  const cfgGapScale = document.getElementById("cfgGapScale");

  function buildAdminFields() {
    adminFields.innerHTML = "";
    ADMIN_FIELDS.forEach(function (f) {
      const row = document.createElement("div");
      row.className = "adm-row";
      const lab = document.createElement("label");
      lab.textContent = f.label;
      const rng = document.createElement("input");
      rng.type = "range";
      rng.min = f.min; rng.max = f.max; rng.step = f.step;
      rng.value = CONFIG[f.k];
      const val = document.createElement("span");
      val.className = "val";
      val.textContent = CONFIG[f.k];
      rng.addEventListener("input", function () {
        CONFIG[f.k] = Number(rng.value);
        val.textContent = rng.value;
        saveConfig();
      });
      row.appendChild(lab); row.appendChild(rng); row.appendChild(val);
      adminFields.appendChild(row);
    });
    cfgGapScale.checked = !!CONFIG.gapScale;
  }

  function openAdmin() {
    adminOpen = true;
    adminOverlay.style.display = "flex";
    adminErr.textContent = "";
    if (adminAuthed) {
      adminLogin.style.display = "none";
      adminControls.style.display = "block";
      buildAdminFields();
    } else {
      adminLogin.style.display = "block";
      adminControls.style.display = "none";
      adminPass.value = "";
      setTimeout(function () { adminPass.focus(); }, 30);
    }
  }
  function closeAdmin() {
    adminOpen = false;
    adminOverlay.style.display = "none";
  }

  adminBtn.addEventListener("click", openAdmin);
  document.getElementById("adminKapat1").addEventListener("click", closeAdmin);
  document.getElementById("adminKapat2").addEventListener("click", function () { saveConfig(); closeAdmin(); });

  function tryLogin() {
    if (adminPass.value === ADMIN_PASS) {
      adminAuthed = true;
      adminErr.textContent = "";
      adminLogin.style.display = "none";
      adminControls.style.display = "block";
      buildAdminFields();
    } else {
      adminErr.textContent = "Hatalı şifre!";
      adminPass.value = "";
    }
  }
  document.getElementById("adminGiris").addEventListener("click", tryLogin);
  adminPass.addEventListener("keydown", function (e) {
    e.stopPropagation();
    if (e.code === "Enter") tryLogin();
  });

  cfgGapScale.addEventListener("change", function () {
    CONFIG.gapScale = cfgGapScale.checked;
    saveConfig();
  });
  document.getElementById("adminVarsayilan").addEventListener("click", function () {
    CONFIG = Object.assign({}, DEFAULT_CONFIG);
    saveConfig();
    buildAdminFields();
  });
  document.getElementById("adminSkorSifirla").addEventListener("click", function () {
    best = 0;
    localStorage.setItem("flappy_best", "0");
  });
  document.getElementById("adminTabloTemizle").addEventListener("click", function () {
    leaderboard = [];
    localStorage.setItem("flappy_lb", "[]");
  });

  // ---- Döngü ----
  function loop() {
    update();
    draw();
    syncNameUI();
    requestAnimationFrame(loop);
  }

  reset();
  loop();
})();
</script>
