      else if (a.type === "vine") drawVine(a);
      else if (a.type === "spike") drawSpike(a);
    }
  }

  // Göz lazeri: şarjda kesik nişan çizgisi + hedef halkası, ateşte kalın ışın
  function drawBossLaser() {
    if (state !== STATE.PLAY) return;   // ölünce/dururken ışın çizilmesin (büyüme bug'ı)
    if (bossLaserState !== "charge" && bossLaserState !== "fire") return;
    const eye = bossEye();
    ctx.save();
    if (bossLaserState === "charge") {
      const ang = Math.atan2(bossLaserTy - eye.y, bossLaserTx - eye.x);
      const prog = Math.max(0, Math.min(1, 1 - (bossLaserT - frame) / LASER_CHARGE));   // 0..1 KİLİTLİ (taşıp kalınlaşmasın)
      ctx.strokeStyle = "rgba(255,45,30," + (0.25 + 0.55 * prog).toFixed(3) + ")";
      ctx.lineWidth = 2 + 3 * prog;
      ctx.setLineDash([9, 9]); ctx.lineDashOffset = -frame * 0.9;
      ctx.beginPath();
      ctx.moveTo(eye.x, eye.y);
      ctx.lineTo(eye.x + Math.cos(ang) * 2400, eye.y + Math.sin(ang) * 2400);
      ctx.stroke();
      ctx.setLineDash([]);
      // hedef halkası (0.7 sn önceki yer)
      ctx.strokeStyle = "rgba(255,60,40," + (0.4 + 0.5 * prog).toFixed(3) + ")";
      ctx.lineWidth = 2.5;
      const rr = 12 + 4 * Math.sin(frame * 0.5);
      ctx.beginPath(); ctx.arc(bossLaserTx, bossLaserTy, rr, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bossLaserTx - rr, bossLaserTy); ctx.lineTo(bossLaserTx + rr, bossLaserTy);
      ctx.moveTo(bossLaserTx, bossLaserTy - rr); ctx.lineTo(bossLaserTx, bossLaserTy + rr); ctx.stroke();
    } else {
      // ateş: gözden kilitli yön boyunca kalın ışın
      const ang = bossLaserAng;
      const tx = eye.x + Math.cos(ang) * 2600, ty = eye.y + Math.sin(ang) * 2600;
      const fade = (bossLaserT - frame) / LASER_FIRE;   // 1..0
      ctx.lineCap = "round";
      ctx.strokeStyle = "rgba(255,60,40," + (0.35 * fade).toFixed(3) + ")";
      ctx.lineWidth = LASER_HALF * 2 + 12;
      ctx.beginPath(); ctx.moveTo(eye.x, eye.y); ctx.lineTo(tx, ty); ctx.stroke();
      ctx.strokeStyle = "rgba(255,45,35," + Math.max(0.55, fade).toFixed(3) + ")";
      ctx.lineWidth = LASER_HALF * 2;
      ctx.beginPath(); ctx.moveTo(eye.x, eye.y); ctx.lineTo(tx, ty); ctx.stroke();
      ctx.strokeStyle = "rgba(255,240,230," + Math.max(0.65, fade).toFixed(3) + ")";
      ctx.lineWidth = LASER_HALF * 0.8;
      ctx.beginPath(); ctx.moveTo(eye.x, eye.y); ctx.lineTo(tx, ty); ctx.stroke();
    }
    ctx.restore();
  }
  function drawFireball(a) {
    const grd = ctx.createRadialGradient(a.x, a.y, 2, a.x, a.y, a.r + 7);
    grd.addColorStop(0, "#fff2a0"); grd.addColorStop(0.4, "#ff9a1f"); grd.addColorStop(1, "rgba(255,40,0,0)");
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(a.x, a.y, a.r + 7, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#ff5a1f";
    ctx.beginPath(); ctx.arc(a.x, a.y, a.r * 0.6, 0, Math.PI * 2); ctx.fill();
  }
  function drawVine(a) {
    const x = a.x, w = a.w, len = a.len;
    ctx.fillStyle = "#2f7d2a"; ctx.fillRect(x, 0, w, len);
    ctx.fillStyle = "#3fa03a";
    for (let yy = 12; yy < len; yy += 26) {
      ctx.beginPath(); ctx.ellipse(x + 5, yy, 8, 5, -0.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x + w - 5, yy + 13, 8, 5, 0.5, 0, Math.PI * 2); ctx.fill();
    }
    ctx.fillStyle = "#256b22";
    ctx.beginPath(); ctx.ellipse(x + w / 2, len, w / 2, 11, 0, 0, Math.PI * 2); ctx.fill();
  }
  function drawSpike(a) {
    const x = a.x, w = a.w, len = a.len, groundY = H - GROUND_H, topY = groundY - len;
    ctx.fillStyle = "#2f7d2a"; ctx.fillRect(x, topY, w, len);
    ctx.fillStyle = "#3fa03a";
    for (let yy = groundY - 14; yy > topY; yy -= 26) {
      ctx.beginPath(); ctx.ellipse(x + 5, yy, 8, 5, 0.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x + w - 5, yy - 13, 8, 5, -0.5, 0, Math.PI * 2); ctx.fill();
    }
    // ölümcül çiçek tepesi
    ctx.fillStyle = "#e63b2e";
    for (let i = 0; i < 6; i++) {
      const ang = i * (Math.PI * 2 / 6);
      ctx.beginPath(); ctx.arc(x + w / 2 + Math.cos(ang) * 10, topY + Math.sin(ang) * 10, 6, 0, Math.PI * 2); ctx.fill();
    }
    ctx.fillStyle = "#ffd400";
    ctx.beginPath(); ctx.arc(x + w / 2, topY, 5, 0, Math.PI * 2); ctx.fill();
  }

  function spawnEnemy() {
    // oyuncunun yüksekliğine yakın doğar → "bize doğru" gelir
    const big = Math.random() < 0.1;   // nadiren (~%10) dev kuş
    const y = Math.max(60, Math.min(H - GROUND_H - 40, ball.y + (Math.random() * 140 - 70)));
    enemies.push({
      x: W + 30, y: y, r: big ? 26 : 15, vy: 0,
      mul: big ? 1.15 : (1.6 + Math.random() * 0.6),   // dev kuş daha yavaş süzülür
      dead: false, big: big
    });
  }

  function drawEnemies() {
    for (const e of enemies) {
      ctx.save();
      ctx.translate(e.x, e.y);
      ctx.scale(-1, 1);   // sola doğru baksın (geldiği yöne)
      paintBird(e.r, ENEMY_SKIN, BIRD_TYPES[1], Math.sin(frame * 0.4 + e.x));
      ctx.restore();
    }
  }

  // ---- Rendering ----
  function draw() {
    // rich background (sky + sun + hills + clouds)
    drawBackground();

    // Giriş animasyonu ekranı
    if (state === STATE.INTRO) { drawIntro(); return; }

    // Mirror mode: dual split-screen lanes, then shared overlays
    if (MODES[mode].mirror) {
      drawMirrorLanes();
      drawGround();
      drawMirrorBirds();
      drawWeatherOverlay();
      drawUI();
      drawToasts();
      return;
    }

    // --- ekran sarsıntısı: SADECE dünya sarsılır (arka plan + UI sabit → kenar boşluğu / okunabilirlik sorunu yok) ---
    const shaking = frame < shakeUntil;
    if (shaking) {
      const k = shakeMag * Math.min(1, (shakeUntil - frame) / 10);
      ctx.save();
      ctx.translate((Math.random() * 2 - 1) * k, (Math.random() * 2 - 1) * k);
    }

    // Boss (on the right, in front of the background)
    if (MODES[mode].boss) drawBoss();

    // pipes
    for (const p of pipes) drawPipe(p);

    // ground
    drawGround();

    // ground flowers (all modes, for a full background)
    drawFlowers();

    // power-ups (between ground and bird)
    drawPowerups();

    // Coin Rush: flying coins
    if (MODES[mode].coinRush) drawCoinPickups();

    // Escape mode: enemy birds
    drawEnemies();

    // Boss attacks (fire / vine / spike)
    if (MODES[mode].boss) drawBossAttacks();

    // smash particles (giant)
    drawFx();

    // bird (ringed when shielded)
    drawBird();

    // Boss göz lazeri (kuşun üstünde)
    if (MODES[mode].boss) drawBossLaser();

    // weather (rain + lightning flash, in front of the bird)
    drawWeatherOverlay();

    // Wind mode: active gust arrow
    if (MODES[mode].wind && state === STATE.PLAY && frame < gustUntil) drawWindArrow();

    // Darkness mode: periodic blackout (covers the field, score stays visible)
    drawDarkness();

    if (shaking) ctx.restore();   // sarsıntıyı bitir → UI/toast sabit kalsın

    // interface
    drawUI();

    // 🌫️ Blind tuzağı: ~0.5 sn tüm ekranı karart (skor dahil), sona doğru açılır
    drawBlind();

    // notification bubbles (on top of everything)
    drawToasts();
  }

  function drawBlind() {
    if (state !== STATE.PLAY || frame >= blindUntil) return;
    const left = blindUntil - frame;
    let a = 0.95;
    if (left < 8) a = 0.95 * (left / 8);   // son ~0.13 sn fade-out
    ctx.save();
    ctx.fillStyle = "rgba(5,5,9," + a + ")";
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  // ---- Mirror mode rendering ----
  function drawMirrorLanes() {
    const lw = W / 2;
    // left lane (normal orientation)
    ctx.save();
    ctx.beginPath(); ctx.rect(0, 0, lw, H); ctx.clip();
    for (const p of pipes) drawPipe(p);
    ctx.restore();
    // right lane (horizontally mirrored)
    ctx.save();
    ctx.beginPath(); ctx.rect(lw, 0, lw, H); ctx.clip();
    ctx.translate(W, 0); ctx.scale(-1, 1);
    for (const p of pipes2) drawPipe(p);
    ctx.restore();
  }

  function drawMirrorBirds() {
    const lw = W / 2, BX = mirrorBirdX();
    const anim = frame * (state === STATE.PLAY ? 0.35 : 0.15);
    const skin = SKINS[selectedSkin], t = BIRD_TYPES[selectedType];
    const b2 = ball2 || ball;
    // left bird (W)
    ctx.save(); ctx.translate(BX, ball.y); ctx.rotate(ball.rot);
    paintBird(ballR, skin, t, ball.dead ? 0 : Math.sin(anim), ball.dead); ctx.restore();
    // right bird (↑) — mirrored → faces left
    ctx.save(); ctx.translate(W - BX, b2.y); ctx.scale(-1, 1); ctx.rotate(b2.rot);
    paintBird(ballR, skin, t, b2.dead ? 0 : Math.sin(anim), b2.dead); ctx.restore();
    // shield rings on both birds
    if (shieldActive || frame < invulnUntil) {
      const rr = ballR + 9 + Math.sin(frame * 0.2) * 2;
      ctx.strokeStyle = "rgba(84,200,255,0.85)"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(BX, ball.y, rr, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.arc(W - BX, b2.y, rr, 0, Math.PI * 2); ctx.stroke();
    }
    // center divider
    ctx.save();
    ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 3;
    ctx.setLineDash([10, 8]);
    ctx.beginPath(); ctx.moveTo(lw, 0); ctx.lineTo(lw, H - GROUND_H); ctx.stroke();
    ctx.restore();
  }

  // Karanlık modu: her ~1 sn görünür, ~0.5 sn kapkaranlık (60fps: 60 açık / 30 kapalı)
  function drawDarkness() {
    if (state !== STATE.PLAY || paused) return;
    // Karanlık modu VEYA Boss'un arada gelen karanlık saldırısı → aynı yanıp sönen karartma
    if (!MODES[mode].dark && frame >= bossDarkUntil) return;
    const cycle = 90;
    const t = frame % cycle;
    if (t < 60) return; // görünür faz
    let a = 0.96;
    const into = t - 60;              // 0..30
    if (into < 5) a *= into / 5;      // karartmaya yumuşak giriş
    else if (into > 25) a *= (30 - into) / 5; // yumuşak çıkış
    ctx.fillStyle = "rgba(2,4,10," + a.toFixed(3) + ")";
    ctx.fillRect(0, 0, W, H);
  }

  function drawWeatherOverlay() {
    if (envMode === "rain") drawRain();
    if (frame < flashUntil) {
      const a = 0.65 * (flashUntil - frame) / 10;
      ctx.fillStyle = "rgba(255,255,255," + a + ")";
      ctx.fillRect(0, 0, W, H);
      drawBolt(lightningX);
    }
  }

  function drawRain() {
    ctx.strokeStyle = "rgba(200,225,255,0.5)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (const d of rainDrops) {
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x - 3, d.y + d.len);
    }
    ctx.stroke();
  }

  function drawBolt(x) {
    ctx.strokeStyle = "#fff7b0";
    ctx.lineWidth = 4;
    ctx.lineJoin = "round";
    ctx.shadowColor = "#fff";
    ctx.shadowBlur = 16;
    ctx.beginPath();
    let y = 0;
    let cx = x;
    ctx.moveTo(cx, y);
    const segs = 6;
    const step = (H - GROUND_H) / segs;
    for (let i = 1; i <= segs; i++) {
      y = i * step;
      cx = x + (i % 2 === 0 ? -18 : 18) + (Math.sin(i * 3) * 6);
      ctx.lineTo(cx, y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Moda göre tepe renkleri
  const HILL_COLORS = {
    day:   ["#b3e0a5", "#9ad683", "#7fce5a", "#5db039"],
    night: ["#2c4a3a", "#254230", "#1d3527", "#152a1e"],
    rain:  ["#88ab90", "#799c80", "#63886d", "#517659"]
  };

  function drawBackground() {
    // ---- gökyüzü: geçişte iki hava arasında yumuşak lerp (crossfade) ----
    const mixing = envNext && envNext !== envMode;
    const tt = mixing ? (0.5 - 0.5 * Math.cos(Math.PI * Math.min(1, envT))) : 0;   // easeInOut
    renderEnv = (mixing && tt >= 0.5) ? envNext : envMode;   // ayrık öğeler (tepe/ağaç/gök cismi) ortada değişir
    const a = SKY_STOPS[envMode] || SKY_STOPS.day, b = SKY_STOPS[envNext] || a;
    const pos = [0, 0.5, 0.85, 1];
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    for (let i = 0; i < 4; i++) sky.addColorStop(pos[i], lerpRGB(a[i], b[i], tt));
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // ---- gök cismi / yıldızlar ----
    if (renderEnv === "night") { drawStars(); drawMoon(); }
    else if (renderEnv === "day") { drawSun(); }
    // yağmurda kapalı hava: gök cismi yok

    // ---- dağlar + tepeler ----
    drawMountains(frame * 0.08, H - GROUND_H);
    const hc = HILL_COLORS[renderEnv] || HILL_COLORS.day;
    drawHills(frame * 0.14, H - GROUND_H + 8, 100, hc[0]);
    drawHills(frame * 0.2, H - GROUND_H + 4, 74, hc[1]);

    // ---- bulutlar ----
    if (renderEnv === "rain") drawClouds("rgba(120,128,140,0.9)");
    else if (renderEnv === "night") drawClouds("rgba(150,160,190,0.35)");
    else drawClouds("rgba(255,255,255,0.85)");

    // uzak kuşlar (gece hariç her havada)
    if (renderEnv !== "night") drawFarBirds();

    drawHills(frame * 0.32, H - GROUND_H, 58, hc[2]);
    // ağaçlar (orta katman)
    drawTrees(frame * 0.42, H - GROUND_H + 4);
    drawHills(frame * 0.6, H - GROUND_H, 40, hc[3]);
    // ön ağaç sırası (daha büyük, parallax hızlı)
    drawTrees(frame * 0.72, H - GROUND_H, 1.25);
  }

  // Basit ağaçlar (parallax kayar), moda göre renklenir
  function drawTrees(offset, baseY, scale) {
    scale = scale || 1;
    const spacing = 128 * scale;
    const shift = offset % spacing;
    const first = Math.floor(offset / spacing);
    const count = Math.ceil(W / spacing) + 2;
    const leaf = renderEnv === "night" ? "#1d3b2a" : renderEnv === "rain" ? "#3f5f47" : "#3f9e3a";
    const leaf2 = renderEnv === "night" ? "#173123" : renderEnv === "rain" ? "#365340" : "#4fb048";
    const trunk = renderEnv === "night" ? "#3a2a1c" : "#6b4a2a";
    for (let k = 0; k < count; k++) {
      const wk = first + k;
      const rnd = Math.abs(Math.sin(wk * 33.7) * 1000) % 1;
      const x = k * spacing - shift + rnd * 40;
      const h = (30 + rnd * 24) * scale;
      const r = (13 + rnd * 4) * scale;
      ctx.fillStyle = trunk;
      ctx.fillRect(x - 3 * scale, baseY - h, 6 * scale, h);
      ctx.fillStyle = rnd > 0.5 ? leaf : leaf2;
      ctx.beginPath();
      ctx.arc(x, baseY - h - r * 0.4, r, 0, Math.PI * 2);
      ctx.arc(x - r * 0.85, baseY - h + r * 0.2, r * 0.8, 0, Math.PI * 2);
      ctx.arc(x + r * 0.85, baseY - h + r * 0.2, r * 0.8, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawStars() {
    // Kaliteye göre çizilen yıldız sayısı (gece sahnesinde FPS'i korur)
    const n = CONFIG.quality === "low" ? 34 : CONFIG.quality === "high" ? stars.length : 54;
    for (let i = 0; i < n; i++) {
      const s = stars[i];
      const tw = 0.55 + 0.45 * Math.sin(frame * 0.04 + s.p);
      ctx.fillStyle = "rgba(255,255,255," + tw.toFixed(3) + ")";
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawMoon() {
    const mx = W - 110, my = 100;
    const halo = ctx.createRadialGradient(mx, my, 6, mx, my, 60);
    halo.addColorStop(0, "rgba(230,238,255,0.5)");
    halo.addColorStop(1, "rgba(230,238,255,0)");
    ctx.fillStyle = halo;
    ctx.beginPath(); ctx.arc(mx, my, 60, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#eef3ff";
    ctx.beginPath(); ctx.arc(mx, my, 28, 0, Math.PI * 2); ctx.fill();
    // kraterler
    ctx.fillStyle = "rgba(180,190,215,0.55)";
    ctx.beginPath(); ctx.arc(mx - 8, my - 6, 5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(mx + 9, my + 4, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(mx + 2, my - 12, 3, 0, Math.PI * 2); ctx.fill();
  }

  function drawMountains(offset, baseY) {
    const spacing = 168;
    const shift = offset % spacing;
    const first = Math.floor(offset / spacing);
    const count = Math.ceil(W / spacing) + 2;
    for (let k = 0; k < count; k++) {
      const worldK = first + k;
      const rnd = Math.abs(Math.sin(worldK * 12.9898) * 43758.5453) % 1;
      const h = 120 + rnd * 90;
      const x = k * spacing - shift;
      drawPeak(x, baseY, spacing * 1.15, h);
    }
  }

  function drawPeak(cx, baseY, w, h) {
    // dağ gövdesi
    const g = ctx.createLinearGradient(cx, baseY - h, cx, baseY);
    g.addColorStop(0, "#9aa8bd");
    g.addColorStop(1, "#66768e");
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(cx - w / 2, baseY);
    ctx.lineTo(cx, baseY - h);
    ctx.lineTo(cx + w / 2, baseY);
    ctx.closePath();
    ctx.fill();

    // karlı zirve
    const capH = h * 0.3;
    const capY = baseY - h + capH;
    const cw = (w / 2) * (capH / h);
    ctx.fillStyle = "#f2f6fb";
    ctx.beginPath();
    ctx.moveTo(cx, baseY - h);
    ctx.lineTo(cx - cw, capY);
    ctx.lineTo(cx - cw * 0.45, capY - 5);
    ctx.lineTo(cx - cw * 0.05, capY + 2);
    ctx.lineTo(cx + cw * 0.4, capY - 4);
    ctx.lineTo(cx + cw, capY);
    ctx.closePath();
    ctx.fill();
  }

  function drawSun() {
    const sunX = 84, sunY = 98;
    // dönen ışınlar
    ctx.save();
    ctx.translate(sunX, sunY);
    ctx.rotate(frame * 0.004);
    ctx.strokeStyle = "rgba(255,240,150,0.4)";
    ctx.lineWidth = 4;
    for (let i = 0; i < 12; i++) {
      ctx.rotate(Math.PI / 6);
      ctx.beginPath();
      ctx.moveTo(0, 42);
      ctx.lineTo(0, 60);
      ctx.stroke();
    }
    ctx.restore();

    const halo = ctx.createRadialGradient(sunX, sunY, 8, sunX, sunY, 82);
    halo.addColorStop(0, "rgba(255,247,175,0.95)");
    halo.addColorStop(1, "rgba(255,247,175,0)");
    ctx.fillStyle = halo;
    ctx.beginPath();
    ctx.arc(sunX, sunY, 82, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#fff3a4";
    ctx.beginPath();
    ctx.arc(sunX, sunY, 30, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawFarBirds() {
    ctx.strokeStyle = envMode === "rain" ? "rgba(40,50,58,0.5)" : "rgba(35,55,65,0.4)";
    ctx.lineWidth = 2;
    for (let i = 0; i < 7; i++) {
      const period = W + 240;
      const raw = (i * 150 - frame * 0.7) % period;
      const bx = (raw + period * 2) % period - 120;
      const by = 90 + i * 26 + Math.sin(frame * 0.05 + i) * 7;
      const s = 6 + (i % 2);
      ctx.beginPath();
      ctx.moveTo(bx - s, by);
      ctx.quadraticCurveTo(bx - s * 0.4, by - s, bx, by - s * 0.3);
      ctx.quadraticCurveTo(bx + s * 0.4, by - s, bx + s, by);
      ctx.stroke();
    }
  }

  function drawHills(offset, baseY, r, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(0, H);
    ctx.lineTo(0, baseY);
    const step = r * 1.5;
    const start = -(offset % step) - step;
    for (let x = start; x < W + step; x += step) {
      ctx.arc(x + step / 2, baseY, r, Math.PI, 0, false);
    }
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fill();
  }

  function drawClouds(color) {
    const cloudColor = color || "rgba(255,255,255,0.85)";
    for (let i = 0; i < 7; i++) {
      const period = W + 160;
      const raw = (i * 110 - frame * (0.24 + (i % 3) * 0.06)) % period;
      const x = (raw + period * 2) % period - 80;
      const y = 48 + (i % 3) * 58;
      ctx.fillStyle = cloudColor;
      ctx.beginPath();
      ctx.arc(x, y, 24, 0, Math.PI * 2);
      ctx.arc(x + 26, y + 6, 20, 0, Math.PI * 2);
      ctx.arc(x - 26, y + 6, 18, 0, Math.PI * 2);
      ctx.arc(x + 4, y + 14, 22, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawPipe(p) {
    const c = p.col;
    const bottomY = p.top + p.gap;
    const troll = !p.normal && p.troll;   // troll BORUYA pişer (p.troll) — global mod ekrandaki normal boruyu troll'e çevirmesin

    // TROLL modunda borular geçilebilir → daha saydam çiz ("içinden geç")
    if (troll) ctx.globalAlpha = 0.38;

    const grad = ctx.createLinearGradient(p.x, 0, p.x + PIPE_W, 0);
    grad.addColorStop(0, c.dark);
    grad.addColorStop(0.5, c.light);
    grad.addColorStop(1, c.dark);
    ctx.fillStyle = grad;

    // üst çubuk
    ctx.fillRect(p.x, 0, PIPE_W, p.top);
    // alt çubuk
    ctx.fillRect(p.x, bottomY, PIPE_W, H - GROUND_H - bottomY);

    // uç kapaklar
    ctx.fillStyle = c.lip;
    const lip = 14;
    ctx.fillRect(p.x - 4, p.top - lip, PIPE_W + 8, lip);
    ctx.fillRect(p.x - 4, bottomY, PIPE_W + 8, lip);

    // parlama
    ctx.fillStyle = "rgba(255,255,255,0.28)";
    ctx.fillRect(p.x + 8, 0, 6, p.top);
    ctx.fillRect(p.x + 8, bottomY, 6, H - GROUND_H - bottomY);

    ctx.globalAlpha = 1;

    // TROLL: boşluk = ölüm bölgesi · X yok, sadece çok hafif kırmızı ipucu (borular saydam, içinden geç)
    if (troll) {
      ctx.fillStyle = "rgba(230,40,40,0.10)";
      ctx.fillRect(p.x, p.top, PIPE_W, p.gap);
    }
  }

  function drawGround() {
    const y = H - GROUND_H;
    ctx.fillStyle = "#ded895";
    ctx.fillRect(0, y, W, GROUND_H);
    ctx.fillStyle = "#c5b95e";
    ctx.fillRect(0, y, W, 12);
    // çizgiler
    ctx.fillStyle = "#b7a94f";
    for (let x = groundX; x < W; x += 24) {
      ctx.fillRect(x, y + 12, 12, GROUND_H - 12);
    }
  }

  // Zemin çiçekleri (parallax kayar, sadece menü/hazır ekranında)
  function drawFlowers() {
    const baseY = H - GROUND_H;
    const spacing = 58;
    const offset = frame * 0.6;
    const shift = offset % spacing;
    const first = Math.floor(offset / spacing);
    const count = Math.ceil(W / spacing) + 2;
    const palette = ["#ff5aa8", "#ffd400", "#ff8a2b", "#ff5a5a", "#b46bff", "#ffffff", "#54c8ff"];
    for (let k = 0; k < count; k++) {
      const worldK = first + k;
      const rnd = Math.abs(Math.sin(worldK * 45.13) * 1000) % 1;
      const rnd2 = Math.abs(Math.sin(worldK * 12.9) * 1000) % 1;
      const x = k * spacing - shift + rnd * 24;
      const h = 18 + rnd2 * 22;
      drawFlower(x, baseY + 8, h, palette[worldK % palette.length], rnd);
    }
  }

  function drawFlower(x, baseY, h, color, rnd) {
    // sap
    ctx.strokeStyle = "#3f8f2a";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x, baseY); ctx.lineTo(x, baseY - h); ctx.stroke();
    // yaprak
    ctx.fillStyle = "#4fbf46";
    ctx.beginPath(); ctx.ellipse(x + 4, baseY - h * 0.55, 5, 3, -0.6, 0, Math.PI * 2); ctx.fill();
    // taç yaprakları
    const cy = baseY - h;
    ctx.fillStyle = color;
    for (let i = 0; i < 5; i++) {
      const a = i * (Math.PI * 2 / 5) + rnd * 3;
      ctx.beginPath();
      ctx.arc(x + Math.cos(a) * 5, cy + Math.sin(a) * 5, 3.6, 0, Math.PI * 2);
      ctx.fill();
    }
    // orta
    ctx.fillStyle = "#ffd400";
    ctx.beginPath(); ctx.arc(x, cy, 2.6, 0, Math.PI * 2); ctx.fill();
  }

  function drawBird() {
    const speed = state === STATE.PLAY ? 0.35 : 0.15;
    const flap = ball.dead ? 0 : Math.sin(frame * speed);
    ctx.save();
    ctx.translate(ball.x, ball.y);
    ctx.rotate(ball.rot);
    if (MODES[mode].invert && !ball.dead) ctx.scale(1, -1);   // 🙃 ters yerçekimi: kuş baş aşağı (karışımda da)
    if (frame < ghostUntil) ctx.globalAlpha = 0.4 + 0.15 * Math.sin(frame * 0.2);   // 👻 hayalet: yarı saydam
    else if (MODES[mode].invisible && state === STATE.PLAY && !ball.dead)            // 🫥 Görünmez: oynarken neredeyse şeffaf
      ctx.globalAlpha = 0.02 + 0.022 * Math.abs(Math.sin(frame * 0.08));   // neredeyse tamamen görünmez
    paintBird(ballR, SKINS[selectedSkin], BIRD_TYPES[selectedType], flap, ball.dead);
    ctx.restore();

    // 👻 hayalet aurası
    if (frame < ghostUntil) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ballR + 8 + Math.sin(frame * 0.2) * 2, 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(223,231,255,0.6)"; ctx.lineWidth = 2.5; ctx.stroke();
      ctx.restore();
    }

    // devasa parlaması
    if (frame < giantUntil) {
      ctx.save();
      ctx.globalAlpha = 0.5 + 0.2 * Math.sin(frame * 0.3);
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ballR + 6, 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(255,138,92,0.9)"; ctx.lineWidth = 4; ctx.stroke();
      ctx.restore();
    }

    // kalkan halkası
    if (shieldActive || frame < invulnUntil) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ballR + 9 + Math.sin(frame * 0.2) * 2, 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(84,200,255,0.85)";
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.restore();
    }
  }

  // Ekrandaki güçlendiricileri çiz
  function drawPowerups() {
    for (const pu of powerups) {
      let def = POWERUPS[0];
      for (const d of POWERUPS) { if (d.id === pu.type) { def = d; break; } }
      const bob = Math.sin(frame * 0.1 + pu.x * 0.05) * 3;
      const y = pu.y + bob;
      ctx.save();
      // parlama halkası
      ctx.beginPath();
      ctx.arc(pu.x, y, pu.r + 4 + Math.sin(frame * 0.15) * 1.5, 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(255,255,255,0.25)";
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // gövde
      ctx.beginPath();
      ctx.arc(pu.x, y, pu.r, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(0,0,0,0.32)";
      ctx.fill();
      ctx.lineWidth = 2.5;
      ctx.strokeStyle = def.color;
      ctx.stroke();
      // ikon
      ctx.font = "18px 'Segoe UI Emoji', sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#fff";
      ctx.fillText(def.icon, pu.x, y + 1);
      ctx.textBaseline = "alphabetic";
      ctx.restore();
    }
    // 🧲 mıknatıs aktifken kuşun etrafında nabız gibi çekim alanı
    if (frame < magnetUntil) {
      const R = 155;
      const pulse = 0.35 + 0.25 * Math.abs(Math.sin(frame * 0.12));
      ctx.save();
      const g = ctx.createRadialGradient(ball.x, ball.y, R * 0.3, ball.x, ball.y, R);
      g.addColorStop(0, "rgba(255,92,122,0)");
      g.addColorStop(1, "rgba(255,92,122," + (pulse * 0.28) + ")");
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(ball.x, ball.y, R, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "rgba(255,92,122," + pulse + ")";
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 8]);
      ctx.lineDashOffset = -frame * 0.5;
      ctx.beginPath(); ctx.arc(ball.x, ball.y, R, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();
    }
  }

  // Kuşu (0,0) merkezli çizer — hem oyun kuşu hem tip ikonları kullanır
  function paintBird(R, skin, t, flap, dead) {
    const rx = R + t.bx, ry = R + t.by;

    // kuyruk
    ctx.fillStyle = skin.rainbow ? "#b10dc9" : skin.c3;
    ctx.beginPath();
    ctx.moveTo(-rx + 3, -3);
    ctx.lineTo(-R - t.tail, -9);
    ctx.lineTo(-R - (t.tail - 3), 0);
    ctx.lineTo(-R - t.tail, 8);
    ctx.lineTo(-rx + 3, 4);
    ctx.closePath();
    ctx.fill();

    // gövde
    ctx.beginPath();
    ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
    if (skin.rainbow) {
      const a = frame * 0.05;
      const gx = Math.cos(a) * (rx + 2), gy = Math.sin(a) * (ry + 2);
      const rg = ctx.createLinearGradient(-gx, -gy, gx, gy);
      rg.addColorStop(0.00, "#ff004c");
      rg.addColorStop(0.20, "#ff8a00");
      rg.addColorStop(0.40, "#ffe000");
      rg.addColorStop(0.60, "#2ecc40");
      rg.addColorStop(0.80, "#0074d9");
      rg.addColorStop(1.00, "#b10dc9");
      ctx.fillStyle = rg;
    } else {
      const g = ctx.createRadialGradient(-5, -6, 3, 0, 0, Math.max(rx, ry) + 4);
      g.addColorStop(0, skin.c1);
      g.addColorStop(0.6, skin.c2);
      g.addColorStop(1, skin.c3);
      ctx.fillStyle = g;
    }
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = skin.stroke;
    ctx.stroke();

    // tepe tüyü (tombul tip)
    if (t.crest) {
      ctx.fillStyle = skin.rainbow ? "#ff004c" : skin.c2;
      ctx.beginPath();
      ctx.moveTo(-3, -ry + 3);
      ctx.lineTo(-1, -ry - 9);
      ctx.lineTo(4, -ry + 2);
      ctx.closePath();
      ctx.fill();
    }

    // açık karın
    ctx.beginPath();
    ctx.ellipse(3, 7, Math.max(4, rx - 8), Math.max(3, ry - 9), 0, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255,0.35)";
    ctx.fill();

    // çırpan kanat
    ctx.save();
    ctx.translate(-3, -1);
    ctx.rotate(flap * 0.55);
    ctx.beginPath();
    ctx.ellipse(-5, 2, t.wx, t.wy, 0, 0, Math.PI * 2);
    ctx.fillStyle = skin.wing;
    ctx.fill();
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = skin.stroke;
    ctx.stroke();
    ctx.restore();

    // göz (beyaz taban)
    ctx.beginPath();
    ctx.arc(9, -6, 5.5, 0, Math.PI * 2);
    ctx.fillStyle = "#fff";
    ctx.fill();
    ctx.lineWidth = 1;
    ctx.strokeStyle = skin.stroke;
    ctx.stroke();
    if (dead) {
      // ölü: göz = çarpı (X)
      ctx.strokeStyle = "#161616"; ctx.lineWidth = 1.8; ctx.lineCap = "round";
      const ex = 9, ey = -6, s = 4;
      ctx.beginPath();
      ctx.moveTo(ex - s, ey - s); ctx.lineTo(ex + s, ey + s);
      ctx.moveTo(ex + s, ey - s); ctx.lineTo(ex - s, ey + s);
      ctx.stroke();
      ctx.lineCap = "butt";
    } else {
      ctx.beginPath();
      ctx.arc(11, -6, 2.6, 0, Math.PI * 2);
      ctx.fillStyle = skin.angry ? "#e01010" : "#222";
      ctx.fill();
    }

    // kızgın kaş (ölüyken çizme)
    if (skin.angry && !dead) {
      ctx.strokeStyle = "#000";
      ctx.lineWidth = 3;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(2, -14);
      ctx.lineTo(14, -8);
      ctx.stroke();
      ctx.lineCap = "butt";
    }

    // gaga
    ctx.beginPath();
    ctx.moveTo(R + 1, -4);
    ctx.lineTo(R + t.beak, 0);
    ctx.lineTo(R + 1, 5);
    ctx.closePath();
    ctx.fillStyle = "#ff8c1a";
    ctx.fill();
    ctx.lineWidth = 1;
    ctx.strokeStyle = "#d96e00";
    ctx.stroke();
  }

  function drawUI() {
    ctx.textAlign = "center";

    if (state === STATE.PLAY) {
      // Oyun içi anlık skor (büyük, üstte) — puan alınca kısa "pop" büyümesi
      const pop = frame < scorePop ? 1 + 0.32 * Math.min(1, (scorePop - frame) / 9) : 1;   // clamp → stale değer devasa büyütmesin
      ctx.save();
      ctx.translate(W / 2, 92);
      if (pop !== 1) ctx.scale(pop, pop);
      ctx.fillStyle = "#fff";
      ctx.strokeStyle = "rgba(0,0,0,0.35)";
      ctx.font = "bold 50px 'Segoe UI', sans-serif";
      ctx.lineWidth = 6;
      ctx.strokeText(score, 0, 0);
      ctx.fillText(score, 0, 0);
      ctx.restore();

      // Chaos modu: aktif faz rozeti (ikon + isim + sonraki çarka kalan boru)
      if (MODES[mode].chaos && chaosSeg >= 0) {
        const sub = MODES[CHAOS_PHASES[chaosSeg].key];
        const label = "🎰 " + sub.icon + " " + modeName(sub);
        ctx.font = "bold 15px 'Segoe UI', sans-serif";
        const bw = ctx.measureText(label).width + 26;
        const bx = W / 2 - bw / 2, by = 150, bh = 26;   // güç efekti çiplerinin (y=110) altında
        ctx.fillStyle = "rgba(0,0,0,0.42)";
        roundRect(bx, by, bw, bh, 13); ctx.fill();
        ctx.fillStyle = MODES.chaos.accent;
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(label, W / 2, by + bh / 2 + 1);
        ctx.textBaseline = "alphabetic";
        // sonraki çarka kalan boru — küçük noktalar
        for (let i = 0; i < CHAOS_SEG_PIPES; i++) {
          ctx.beginPath();
          ctx.arc(bx + bw / 2 - (CHAOS_SEG_PIPES - 1) * 4 + i * 8, by + bh + 8, 2.4, 0, 6.283);
          ctx.fillStyle = i < chaosPipesLeft ? MODES.chaos.accent : "rgba(255,255,255,0.28)";
          ctx.fill();
        }
      }

      // Köşede rekor rozeti + altın + aktif güçlendiriciler
      drawBestBadge();
      drawCoinBadge();
      drawActiveEffects();
    }

    if (state === STATE.MENU) {
      menuPanel();
    }

    if (state === STATE.READY) {
      readyPanel();
      drawBestBadge();
      drawLeaderboard();
    }

    if (state === STATE.OVER) {
      scorePanel();
      drawLeaderboard();
    }

    if (paused && state === STATE.PLAY) drawPauseOverlay();

    // Sol altta "‹ Geri" tuşu — mobilde mod ekranına dönüş (ESC yok). Duraklatınca gizli.
    if (!paused && (state === STATE.READY || state === STATE.PLAY || state === STATE.DYING || state === STATE.OVER)) drawGameBack();
    else gameBackRect = null;
  }

  // Oyun içi sol-alt geri tuşu (mod ekranına döner)
  function drawGameBack() {
    const w = 86, h = 40, x = 14, y = H - h - 14;
    gameBackRect = { x: x, y: y, w: w, h: h };
    ctx.save();
    ctx.fillStyle = "rgba(10,16,22,0.55)";
    roundRect(x, y, w, h, 12); ctx.fill();
    ctx.lineWidth = 1.4; ctx.strokeStyle = "rgba(255,255,255,0.30)";
    roundRect(x, y, w, h, 12); ctx.stroke();
    ctx.fillStyle = "#fff";
    ctx.font = "bold 15px 'Segoe UI', sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(t("back"), x + w / 2, y + h / 2 + 1);
    ctx.textBaseline = "alphabetic";
    ctx.restore();
  }

  // Oyundan mod seçim ekranına dön (geri tuşu)
  function goToModes() {
    setEnvInstant("day");
    menuScreen = "modes";
    state = STATE.MENU;
    paused = false;
    holding = false;
    Sound.sfx("click");
  }

  // Cam parlamalı basit buton (duraklat menüsü vb.)
  function drawSimpleBtn(x, y, w, h, label, color) {
    const g = ctx.createLinearGradient(x, y, x, y + h);
    g.addColorStop(0, hexA(color, 1)); g.addColorStop(1, hexA(color, 0.78));
    ctx.fillStyle = g; roundRect(x, y, w, h, 12); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.13)"; roundRect(x + 2, y + 2, w - 4, h * 0.44, 9); ctx.fill();
    ctx.lineWidth = 1.4; ctx.strokeStyle = hexA(color, 1); roundRect(x, y, w, h, 12); ctx.stroke();
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.font = "bold 16px 'Segoe UI', sans-serif"; ctx.fillStyle = "#fff";
    ctx.fillText(label, x + w / 2, y + h / 2 + 1);
    ctx.textBaseline = "alphabetic";
  }

  function drawPauseOverlay() {
    ctx.fillStyle = "rgba(0,0,0,0.62)";
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = "center";
    ctx.fillStyle = "#ffd400";
    ctx.font = "bold 40px 'Segoe UI', sans-serif";
    ctx.fillText(t("paused"), W / 2, H / 2 - 46);

    // Devam / Ana Menü / Bitir düğmeleri
    const bw = Math.min(150, (W - 64) / 3), bh = 46, gap = 12;
    const totalW = bw * 3 + gap * 2;
    const bx = W / 2 - totalW / 2, by = H / 2 - 4;
    pauseResumeRect = { x: bx, y: by, w: bw, h: bh };
    pauseMenuRect = { x: bx + (bw + gap), y: by, w: bw, h: bh };
    pauseEndRect = { x: bx + (bw + gap) * 2, y: by, w: bw, h: bh };

    drawSimpleBtn(pauseResumeRect.x, by, bw, bh, t("resume"), "#2f8f4a");
    drawSimpleBtn(pauseMenuRect.x, by, bw, bh, t("main_menu"), "#2f6f9f");
    drawSimpleBtn(pauseEndRect.x, by, bw, bh, t("end"), "#a52a37");

    ctx.fillStyle = "rgba(255,255,255,0.7)";
    ctx.font = "14px 'Segoe UI', sans-serif";
    ctx.fillText(t("pause_hint"), W / 2, by + bh + 30);
  }

  // Sol üst köşe: ilk 10 liderlik tablosu
  function drawLeaderboard() {
    const x = 10, y = 10, w = 148, rows = 10;
    const h = 30 + rows * 15 + 8;
    ctx.fillStyle = "rgba(0,0,0,0.42)";
    roundRect(x, y, w, h, 10);
    ctx.fill();

    ctx.textAlign = "left";
    ctx.fillStyle = "#ffd400";
    ctx.font = "bold 13px 'Segoe UI', sans-serif";
    ctx.fillText("🏆 " + MODES[mode].icon + " " + modeName(MODES[mode]), x + 10, y + 20);

    ctx.font = "12px 'Segoe UI', sans-serif";
    for (let i = 0; i < rows; i++) {
      const e = leaderboard[i];
      const ry = y + 38 + i * 15;
      ctx.textAlign = "left";
      ctx.fillStyle = "rgba(255,255,255,0.45)";
      ctx.fillText((i + 1) + ".", x + 9, ry);
      if (e) {
        ctx.fillStyle = "#fff";
        const nm = e.name.length > 8 ? e.name.slice(0, 8) : e.name;
        ctx.fillText(nm, x + 28, ry);
        ctx.textAlign = "right";
        ctx.fillStyle = "#ffd400";
        ctx.fillText(String(e.score), x + w - 10, ry);
      } else {
        ctx.fillStyle = "rgba(255,255,255,0.22)";
        ctx.fillText("—", x + 28, ry);
      }
    }
    ctx.textAlign = "center";
  }

  // Sağ üst köşede küçük rekor göstergesi
  function drawBestBadge() {
    const bw = 92, bh = 34, x = W - bw - 12, y = 12;
    ctx.fillStyle = "rgba(0,0,0,0.32)";
    roundRect(x, y, bw, bh, 10);
    ctx.fill();
    ctx.textAlign = "left";
    ctx.fillStyle = "#ffd400";
    ctx.font = "bold 12px 'Segoe UI', sans-serif";
    ctx.fillText(t("badge_best"), x + 12, y + 15);
    ctx.fillStyle = "#fff";
    ctx.font = "bold 15px 'Segoe UI', sans-serif";
    ctx.fillText(String(best), x + 12, y + 29);
    ctx.textAlign = "center";
  }

  // Rekor rozetinin altında altın sayacı
  function drawCoinBadge() {
    const bw = 92, bh = 26, x = W - bw - 12, y = 52;
    ctx.fillStyle = "rgba(0,0,0,0.32)";
    roundRect(x, y, bw, bh, 9);
    ctx.fill();
    ctx.textAlign = "left";
    ctx.font = "14px 'Segoe UI Emoji', sans-serif";
    ctx.fillText("💰", x + 9, y + 18);
    ctx.fillStyle = "#ffd400";
    ctx.font = "bold 14px 'Segoe UI', sans-serif";
    ctx.fillText(String(coins), x + 34, y + 18);
    ctx.textAlign = "center";
  }

  // Aktif güçlendirici çipleri (skorun altında, ortada)
  function drawActiveEffects() {
    const chips = [];
    if (shieldActive) chips.push({ icon: "🛡", c: "#54c8ff", t: "" });
    if (frame < slowUntil) chips.push({ icon: "🐌", c: "#9be870", t: Math.ceil((slowUntil - frame) / 60) + "s" });
    if (frame < doubleUntil) chips.push({ icon: "✨", c: "#ffd54a", t: Math.ceil((doubleUntil - frame) / 60) + "s" });
    if (frame < fastUntil)  chips.push({ icon: "⚡", c: "#ffe14d", t: Math.ceil((fastUntil - frame) / 60) + "s" });
    if (frame < giantUntil) chips.push({ icon: "🐘", c: "#ff8a5c", t: Math.ceil((giantUntil - frame) / 60) + "s" });
    if (frame < miniUntil)  chips.push({ icon: "🐤", c: "#9be0ff", t: Math.ceil((miniUntil - frame) / 60) + "s" });
    if (frame < magnetUntil) chips.push({ icon: "🧲", c: "#ff5c7a", t: Math.ceil((magnetUntil - frame) / 60) + "s" });
    if (frame < ghostUntil)  chips.push({ icon: "👻", c: "#dfe7ff", t: Math.ceil((ghostUntil - frame) / 60) + "s" });
    if (frame < floatUntil)  chips.push({ icon: "🪶", c: "#b6f0d2", t: Math.ceil((floatUntil - frame) / 60) + "s" });
    if (frame < freezeUntil) chips.push({ icon: "❄️", c: "#9fe8ff", t: Math.ceil((freezeUntil - frame) / 60) + "s" });
    if (!chips.length) return;
    const cw = 54, gap = 8;
    const total = chips.length * cw + (chips.length - 1) * gap;
    let x = W / 2 - total / 2;
    const y = 110;
    for (const c of chips) {
      ctx.fillStyle = "rgba(0,0,0,0.4)";
      roundRect(x, y, cw, 26, 9); ctx.fill();
      ctx.lineWidth = 1.5; ctx.strokeStyle = c.c;
      roundRect(x, y, cw, 26, 9); ctx.stroke();
      ctx.textAlign = "left";
      ctx.font = "15px 'Segoe UI Emoji', sans-serif";
      ctx.fillStyle = "#fff";
      ctx.fillText(c.icon, x + 6, y + 19);
      if (c.t) {
        ctx.font = "bold 12px 'Segoe UI', sans-serif";
        ctx.fillText(c.t, x + 30, y + 18);
      }
      x += cw + gap;
    }
    ctx.textAlign = "center";
  }

  // #rrggbb → rgba(...) yardımcı
  function hexA(hex, a) {
    const n = parseInt(hex.slice(1), 16);
    return "rgba(" + ((n >> 16) & 255) + "," + ((n >> 8) & 255) + "," + (n & 255) + "," + a + ")";
  }

  // Metni maxW'ye sığdır: fontu base'ten min'e küçült, hâlâ taşarsa "…" ile kısalt.
  // ctx.font ayarlanmış olarak döner; kısaltılmış metni verir.
  function fitText(text, maxW, base, min, weight) {
    const w = weight ? weight + " " : "";
    let s = base;
    ctx.font = w + s + "px 'Segoe UI', sans-serif";
    while (s > min && ctx.measureText(text).width > maxW) {
      s -= 1; ctx.font = w + s + "px 'Segoe UI', sans-serif";
    }
    if (ctx.measureText(text).width > maxW) {
      while (text.length > 1 && ctx.measureText(text + "…").width > maxW) text = text.slice(0, -1);
      text += "…";
    }
    return text;
  }

  // Küçük bilgi hapı (coin / rekor)
  function drawPill(px, py, pw, ph, text, color) {
    ctx.fillStyle = "rgba(255,255,255,0.08)";
    roundRect(px, py, pw, ph, ph / 2); ctx.fill();
    ctx.lineWidth = 1;
    ctx.strokeStyle = "rgba(255,255,255,0.16)";
    roundRect(px, py, pw, ph, ph / 2); ctx.stroke();
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.font = "bold 13px 'Segoe UI', sans-serif";
    ctx.fillStyle = color || "#fff";
    ctx.fillText(text, px + pw / 2, py + ph / 2 + 1);
    ctx.textBaseline = "alphabetic";
  }

  // Tek bir mod tile'ı (kompakt dikey: ikon üstte, isim ortada, ★rekor altta)
  function drawModeTile(cx, cy, w, h, m, sel, bestVal) {
    const accent = m.accent || "#4ec0ca";
    // arka plan
    const g = ctx.createLinearGradient(cx, cy, cx, cy + h);
    if (sel) { g.addColorStop(0, hexA(accent, 0.34)); g.addColorStop(1, hexA(accent, 0.12)); }
    else { g.addColorStop(0, "rgba(255,255,255,0.06)"); g.addColorStop(1, "rgba(255,255,255,0.025)"); }
    ctx.fillStyle = g;
    roundRect(cx, cy, w, h, 13); ctx.fill();
    ctx.lineWidth = sel ? 2.5 : 1;
    ctx.strokeStyle = sel ? accent : "rgba(255,255,255,0.14)";
    roundRect(cx, cy, w, h, 13); ctx.stroke();

    // ikon diski (üst-orta)
    const ix = cx + w / 2, iy = cy + 27;
    ctx.beginPath(); ctx.arc(ix, iy, 20, 0, Math.PI * 2);
    ctx.fillStyle = hexA(accent, sel ? 0.95 : 0.72); ctx.fill();
    if (sel) { ctx.lineWidth = 2; ctx.strokeStyle = hexA(accent, 1); ctx.stroke(); }
    ctx.font = "22px 'Segoe UI Emoji', sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillStyle = "#fff";
    ctx.fillText(m.icon, ix, iy + 1);
    ctx.textBaseline = "alphabetic";

    // Coin Rush: kalan günlük hak rozeti (ikon köşesinde)
    if (m.coinRush) {
      const left = coinRushLeft(), bx = ix + 16, by = iy - 15;
      ctx.beginPath(); ctx.arc(bx, by, 10, 0, Math.PI * 2);
      ctx.fillStyle = left > 0 ? "#2f8f4a" : "#c0392f"; ctx.fill();
      ctx.lineWidth = 2; ctx.strokeStyle = "rgba(0,0,0,0.45)"; ctx.stroke();
      ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.font = "bold 11px 'Segoe UI', sans-serif";
      ctx.fillText(String(left), bx, by + 1);
      ctx.textBaseline = "alphabetic";
    }

    // isim (orta, sığdır)
    ctx.textAlign = "center";
    const nm = fitText(modeName(m), w - 16, 14, 10, "bold");
    ctx.fillStyle = sel ? "#ffffff" : "rgba(255,255,255,0.94)";
    ctx.fillText(nm, ix, cy + 62);

    // ★ rekor (alt)
    ctx.font = "bold 11px 'Segoe UI', sans-serif";
    ctx.fillStyle = sel ? hexA(accent, 0.95) : "rgba(255,255,255,0.6)";
    ctx.fillText("★ " + (bestVal || 0), ix, cy + 80);
  }

  // Boş "yakında gelecek mod" yeri (tıklanınca sadece bilgi verir)
  function drawModePlaceholder(cx, cy, w, h) {
    ctx.save();
    ctx.fillStyle = "rgba(255,255,255,0.02)";
    roundRect(cx, cy, w, h, 13); ctx.fill();
    ctx.setLineDash([6, 5]);
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = "rgba(255,255,255,0.22)";
    roundRect(cx, cy, w, h, 13); ctx.stroke();
    ctx.restore();
    const ix = cx + w / 2, iy = cy + 27;
    ctx.beginPath(); ctx.arc(ix, iy, 20, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255,0.08)"; ctx.fill();
    ctx.font = "24px 'Segoe UI', sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillStyle = "rgba(255,255,255,0.4)";
    ctx.fillText("?", ix, iy + 1);
    ctx.textBaseline = "alphabetic";
    ctx.font = "bold 12px 'Segoe UI', sans-serif";
    ctx.fillStyle = "rgba(255,255,255,0.42)";
    ctx.fillText(t("mode_soon"), ix, cy + 62);
  }

  // ---- Menü ortak yardımcıları ----
  function menuBox(x, y, w, h) {
    const bg = ctx.createLinearGradient(0, y, 0, y + h);
    bg.addColorStop(0, "rgba(16,28,36,0.94)");
    bg.addColorStop(1, "rgba(9,16,22,0.94)");
    ctx.fillStyle = bg;
    roundRect(x, y, w, h, 20); ctx.fill();
    ctx.lineWidth = 1.5; ctx.strokeStyle = "rgba(255,212,0,0.35)";
    roundRect(x, y, w, h, 20); ctx.stroke();
  }
  function menuButton(x, y, w, h, label, color, act, icon, primary) {
    // primary (PLAY): nabız gibi dış parıltı
    if (primary) {
      const pulse = 0.5 + 0.5 * Math.sin(frame * 0.09);
      ctx.save();
      ctx.shadowColor = hexA(color, 0.95);
      ctx.shadowBlur = 12 + 12 * pulse;
      ctx.fillStyle = hexA(color, 0.98);
      roundRect(x, y, w, h, 13); ctx.fill();
      ctx.restore();
    }
    // gövde
    const g = ctx.createLinearGradient(x, y, x, y + h);
    g.addColorStop(0, hexA(color, primary ? 1 : 0.92)); g.addColorStop(1, hexA(color, primary ? 0.82 : 0.70));
    ctx.fillStyle = g;
    roundRect(x, y, w, h, 13); ctx.fill();
    // üstte cam parlaması
    ctx.fillStyle = "rgba(255,255,255,0.13)";
    roundRect(x + 2, y + 2, w - 4, h * 0.44, 10); ctx.fill();
    ctx.lineWidth = primary ? 2.2 : 1.4; ctx.strokeStyle = hexA(color, 1);
    roundRect(x, y, w, h, 13); ctx.stroke();
    // sol ikon diski
    let lx = x + w / 2;
    if (icon) {
      const ir = h * 0.30, ix = x + 12 + ir, iy = y + h / 2;
      ctx.beginPath(); ctx.arc(ix, iy, ir, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(0,0,0,0.20)"; ctx.fill();
      ctx.font = Math.round(ir * 1.15) + "px 'Segoe UI Emoji', sans-serif";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillStyle = "#fff"; ctx.fillText(icon, ix, iy + 1);
      lx = ix + ir + 10;   // etiket ikonun sağında
    }
    // etiket (ikon varsa sola yaslı, yoksa ortalı)
    ctx.textAlign = icon ? "left" : "center"; ctx.textBaseline = "middle";
    ctx.font = "bold " + (primary ? 20 : 18) + "px 'Segoe UI', sans-serif";
    ctx.fillStyle = "#fff";
    ctx.fillText(label, lx, y + h / 2 + 1);
    ctx.textBaseline = "alphabetic"; ctx.textAlign = "center";
    menuBtnRects.push({ x: x, y: y, w: w, h: h, act: act });
  }
  function drawBack(r) {
    ctx.fillStyle = "rgba(255,255,255,0.1)";
    roundRect(r.x, r.y, r.w, r.h, 8); ctx.fill();
    ctx.lineWidth = 1; ctx.strokeStyle = "rgba(255,255,255,0.28)";
    roundRect(r.x, r.y, r.w, r.h, 8); ctx.stroke();
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.font = "bold 13px 'Segoe UI', sans-serif";
    ctx.fillStyle = "#fff";
    ctx.fillText(t("back"), r.x + r.w / 2, r.y + r.h / 2 + 1);
    ctx.textBaseline = "alphabetic";
  }
  function getLB(mk) {
    try { return JSON.parse(localStorage.getItem("flappy_lb_" + mk) || "[]"); }
    catch (e) { return []; }
  }

  // Menü yönlendirici
  function menuPanel() {
    backRect = null; menuBtnRects = [];
    if (menuScreen === "modes") drawModesMenu();
    else if (menuScreen === "custom") drawCustomMenu();
    else if (menuScreen === "market") drawMarketMenu();
    else if (menuScreen === "settings") drawSettingsMenu();
    else if (menuScreen === "scores") drawScoresMenu();
    else if (menuScreen === "howto") drawHowtoMenu();
    else if (menuScreen === "missions") drawMissionsMenu();
    else if (menuScreen === "season") drawSeasonMenu();
    else drawHomeMenu();
  }

  // 3D blok yazı (merkez 0,0 · y kaydırmalı), altın yüzlü + kahve gölgeli
  function draw3DText(text, size, y) {
    ctx.font = "900 " + size + "px 'Segoe UI', Arial, sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    const depth = Math.max(5, Math.round(size * 0.15));
    for (let i = depth; i >= 1; i--) {
      ctx.fillStyle = (i > depth * 0.5) ? "#5a3600" : "#8a5a00";
      ctx.fillText(text, i * 0.7, y + i * 0.9);
    }
    const g = ctx.createLinearGradient(0, y - size * 0.55, 0, y + size * 0.55);
    g.addColorStop(0, "#fff7b8"); g.addColorStop(0.5, "#ffd400"); g.addColorStop(1, "#f39a00");
    ctx.fillStyle = g;
    ctx.fillText(text, 0, y);
    ctx.lineWidth = Math.max(1.5, size * 0.035);
    ctx.strokeStyle = "#6e3f00";
    ctx.strokeText(text, 0, y);
    ctx.textBaseline = "alphabetic";
  }

  // MEGA FLAPPY BIRD — 3D, hafif yanlı logo
  function draw3DLogo(cx, cy) {
    const maxW = Math.min(W - 36, 540);
    let size = 62;
    ctx.font = "900 " + size + "px 'Segoe UI', Arial, sans-serif";
    const w = ctx.measureText("FLAPPY BIRD").width;
    if (w > maxW) size = Math.floor(size * maxW / w);
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(-0.05);   // hafif yanlı
    draw3DText("MEGA", Math.round(size * 0.58), -size * 0.72);
    draw3DText("FLAPPY BIRD", size, size * 0.42);
    ctx.restore();
  }

  function easeOutCubic(x) { return 1 - Math.pow(1 - x, 3); }

  // 4-uçlu yıldız parıltısı (0,0 merkezli) — parlak çekirdek + ince ışınlar
  function sparkleStar(r, alpha, color) {
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    ctx.globalAlpha = alpha;
    const g = ctx.createRadialGradient(0, 0, 0, 0, 0, r);
    g.addColorStop(0, color); g.addColorStop(0.4, "rgba(255,230,140,0.5)"); g.addColorStop(1, "rgba(255,200,60,0)");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = color;
    for (let k = 0; k < 4; k++) {
      ctx.rotate(Math.PI / 2);
      ctx.beginPath();
      ctx.moveTo(0, 0); ctx.lineTo(r * 0.18, r * 0.18); ctx.lineTo(0, r * 1.6); ctx.lineTo(-r * 0.18, r * 0.18);
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  }

  // Açılış giriş animasyonu — sinematik: god-ray + kuş süzülüşü + logo SLAM + parıltı. Sol tık bekler.
  function drawIntro() {
    const p = Math.min(1, (frame - introStart) / INTRO_DUR);   // ilerleme (0..1), sonra 1'de sabit
    const cx = W / 2, cy = H * 0.42;
    const qm = qMul();

    // sinematik karartma — logoya doğru radyal, kenarlar daha koyu
    const vg = ctx.createRadialGradient(cx, cy, 40, cx, cy, Math.max(W, H) * 0.75);
    vg.addColorStop(0, "rgba(6,12,20,0.15)");
    vg.addColorStop(1, "rgba(4,8,16,0.72)");
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);

    // ---- dönen ışık huzmeleri (god rays), logonun arkasından ----
    const rayA = Math.min(1, Math.max(0, (p - 0.08) / 0.3)) * (0.5 + 0.5 * Math.sin(frame * 0.05));
    if (rayA > 0.01) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.globalCompositeOperation = "lighter";
      ctx.rotate(frame * 0.004);
      const rays = 10;
      for (let i = 0; i < rays; i++) {
        ctx.rotate(Math.PI * 2 / rays);
        const rg = ctx.createLinearGradient(0, 0, 0, -Math.max(W, H));
        rg.addColorStop(0, "rgba(255,215,110," + (0.10 * rayA).toFixed(3) + ")");
        rg.addColorStop(1, "rgba(255,215,110,0)");
        ctx.fillStyle = rg;
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-46, -Math.max(W, H)); ctx.lineTo(46, -Math.max(W, H)); ctx.closePath(); ctx.fill();
      }
      ctx.restore();
    }

    // ---- kuş: ışık/tüy izi bırakarak sürekli süzülür ----
    const cyc = 300, bp = ((frame - introStart) % cyc) / cyc;
    const birdX = function (u) { return -50 + u * (W + 100); };
    const birdY = function (u) { return cy + 100 + Math.sin(u * Math.PI * 4) * 34; };
    // iz (arkada kalan altın zerreler)
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    for (let i = 1; i <= 7; i++) {
      const u2 = bp - i * 0.014; if (u2 < 0) continue;
      const a = (1 - i / 8) * 0.5;
      const tr = 6 - i * 0.5;
      const g = ctx.createRadialGradient(birdX(u2), birdY(u2), 0, birdX(u2), birdY(u2), tr * 2);
      g.addColorStop(0, "rgba(255,235,150," + a.toFixed(3) + ")");
      g.addColorStop(1, "rgba(255,200,80,0)");
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(birdX(u2), birdY(u2), tr * 2, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
    ctx.save();
    ctx.translate(birdX(bp), birdY(bp));
    ctx.rotate(Math.cos(bp * Math.PI * 4) * 0.22);
    paintBird(BALL_R * 1.1, SKINS[selectedSkin], BIRD_TYPES[selectedType], Math.sin(frame * 0.3), false);
    ctx.restore();

    // ---- logo SLAM: yukarıdan iner, p≈0.42'de çarpar ----
    const drop = p < 0.42 ? (1 - easeOutCubic(p / 0.42)) : 0;          // 1→0 iniş
    const logoY = cy - drop * H * 0.5;
    // çarpma anında sıkışma (squash) sonra oturma
    let sq = 1;
    if (p >= 0.42 && p < 0.56) { const q = (p - 0.42) / 0.14; sq = 1 + Math.sin(q * Math.PI) * 0.12 * (1 - q); }
    const appear = Math.min(1, p / 0.14);

    // SLAM tetikleme (bir kez): patlama + sarsıntı + flaş + halka
    if (!introSlammed && p >= 0.42) {
      introSlammed = true;
      introFlash = 0.85;
      addShake(9, 22);
      if (introArmed && CONFIG.sound) { Sound.introFx("boom"); Sound.introFx("sparkle"); }   // slam sesi
      const n = Math.round(46 * qm);
      for (let i = 0; i < n; i++) {
        const ang = (i / n) * Math.PI * 2 + Math.sin(i) * 0.3;
        const sp = 4 + (i % 5) * 2.2;
        introBurst.push({ x: cx, y: cy, vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp - 1.5, life: 46 + (i % 20), max: 46 + (i % 20), r: 2 + (i % 4) });
      }
      for (let i = 0; i < 5; i++) introSparks.push({ x: cx + (i - 2) * 46, y: cy - 6 + (i % 2) * 12, born: frame, dur: 34, r: 16 + (i % 3) * 6 });
    }

    // genişleyen şok dalgası halkaları
    if (introSlammed) {
      const age = (frame - introStart) - INTRO_DUR * 0.42;
      for (let r = 0; r < 2; r++) {
        const rp = (age - r * 6) / 34;
        if (rp > 0 && rp < 1) {
          ctx.save();
          ctx.globalCompositeOperation = "lighter";
          ctx.globalAlpha = (1 - rp) * 0.55;
          ctx.strokeStyle = "#ffe680"; ctx.lineWidth = 4 * (1 - rp) + 1;
          ctx.beginPath(); ctx.arc(cx, cy, 30 + rp * 260, 0, Math.PI * 2); ctx.stroke();
          ctx.restore();
        }
      }
    }

    // logo çizimi (glow + squash)
    ctx.save();
    ctx.translate(cx, logoY);
    ctx.scale(1, sq);
    ctx.globalAlpha = appear;
    ctx.shadowColor = "rgba(255,190,40,0.6)"; ctx.shadowBlur = 24;
    draw3DLogo(0, 0);
    ctx.restore();

    // ---- parıltı süpürmesi (shine sweep) logo üzerinde ----
    if (p > 0.5 && p < 0.78) {
      const sw = (p - 0.5) / 0.28;
      const lw = Math.min(W - 36, 540);
      ctx.save();
      ctx.beginPath(); ctx.rect(cx - lw / 2, cy - 90, lw, 180); ctx.clip();
      ctx.globalCompositeOperation = "lighter";
      ctx.translate(cx - lw / 2 + sw * (lw + 120) - 60, cy);
      ctx.rotate(-0.35);
      const sg = ctx.createLinearGradient(-40, 0, 40, 0);
      sg.addColorStop(0, "rgba(255,255,255,0)");
      sg.addColorStop(0.5, "rgba(255,255,255,0.55)");
      sg.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = sg;
      ctx.fillRect(-40, -140, 80, 280);
      ctx.restore();
    }

    // ---- parçacık patlamasını güncelle & çiz ----
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    for (let i = introBurst.length - 1; i >= 0; i--) {
      const b = introBurst[i];
      b.x += b.vx; b.y += b.vy; b.vx *= 0.93; b.vy = b.vy * 0.93 + 0.12; b.life--;
      if (b.life <= 0) { introBurst.splice(i, 1); continue; }
      const a = b.life / b.max;
      const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r * 2.4);
      g.addColorStop(0, "rgba(255,240,170," + a.toFixed(3) + ")");
      g.addColorStop(1, "rgba(255,190,60,0)");
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r * 2.4, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();

    // yıldız parıltıları
    for (let i = introSparks.length - 1; i >= 0; i--) {
      const s = introSparks[i];
      const age = frame - s.born;
      if (age > s.dur) { introSparks.splice(i, 1); continue; }
      const q = age / s.dur;
      ctx.save();
      ctx.translate(s.x, s.y);
      ctx.rotate(age * 0.04);
      sparkleStar(s.r * (0.4 + q * 0.9), (1 - q) * 0.9, "#fff7d0");
      ctx.restore();
    }

    // ---- ambiyans: süzülen altın zerreler (oturma sonrası canlı kalsın) ----
    if (p > 0.5 && introEmbers.length < 26 * qm && (frame % 3 === 0)) {
      introEmbers.push({ x: Math.random() * W, y: H + 8, vy: -(0.3 + Math.random() * 0.7), r: 1 + Math.random() * 2, ph: Math.random() * 6.28, life: 200 + Math.random() * 160 });
    }
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    for (let i = introEmbers.length - 1; i >= 0; i--) {
      const e = introEmbers[i];
      e.y += e.vy; e.x += Math.sin(frame * 0.02 + e.ph) * 0.4; e.life--;
      if (e.life <= 0 || e.y < -10) { introEmbers.splice(i, 1); continue; }
      ctx.globalAlpha = (0.3 + 0.5 * Math.abs(Math.sin(frame * 0.05 + e.ph))) * Math.min(1, e.life / 60);
      ctx.fillStyle = "#ffe28a";
      ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();

    // ---- slam beyaz flaşı ----
    if (introFlash > 0.01) {
      ctx.save();
      ctx.globalAlpha = introFlash;
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
      introFlash *= 0.82;
    }

    // "başlamak için dokun" — logo oturduktan sonra belirir, nabız gibi
    if (p > 0.75) {
      const pa = Math.min(1, (p - 0.75) / 0.2);
      ctx.save();
      ctx.textAlign = "center";
      ctx.font = "bold 16px 'Segoe UI', sans-serif";
      // hafif altın parıltılı nabız
      ctx.globalAlpha = (0.45 + 0.4 * Math.sin(frame * 0.11)) * pa;
      ctx.shadowColor = "rgba(255,210,80,0.8)"; ctx.shadowBlur = 12;
      ctx.fillStyle = "#fff";
      ctx.fillText(t("intro_tap"), W / 2, H - 44);
      ctx.restore();
    }
  }

  // Ana ekran: 3D logo üstte + temiz düğme yığını
  function drawHomeMenu() {
    const logoY = Math.max(96, H * 0.24);
    draw3DLogo(W / 2, logoY);

    const items = [
      { label: t("play"), color: "#2f8f4a", act: "modes", icon: "🎮", primary: true },
      { label: t("market"), color: "#c0392f", act: "market", icon: "🛒" },
      { label: t("season") + (Season.hasClaimable() ? "  ●" : ""), color: "#8f4fd0", act: "season", icon: "🎖️" },
      { label: t("missions") + (Rewards.hasClaimable() ? "  ●" : ""), color: "#c07a2f", act: "missions", icon: "🎯" },
      { label: t("scores"), color: "#2f6f9f", act: "scores", icon: "🏆" },
      { label: t("howto"), color: "#7a5cc0", act: "howto", icon: "❓" },
      { label: t("settings"), color: "#556070", act: "settings", icon: "⚙️" }
    ];
    const bw = Math.min(300, W - 60), bh = 46, bgap = 9;
    const pillsH = 26, pillGap = 10, flagsH = 32, flagsGap = 10, padX = 22, padY = 14;
    const innerH = pillsH + pillGap + flagsH + flagsGap + items.length * (bh + bgap) - bgap;
    const panW = bw + padX * 2, panH = innerH + padY * 2;
    const panX = W / 2 - panW / 2;
    const panY = logoY + 72;

    // soft panel (readability)
    ctx.fillStyle = "rgba(10,18,26,0.72)";
    roundRect(panX, panY, panW, panH, 18); ctx.fill();

  // Language flag switcher row (home menu)
  function drawLangRow(x, y, w, h) {
    langRects = [];
    const n = LANGS.length;
    const cell = w / n;
    for (let i = 0; i < n; i++) {
      const cx = x + cell * i, sel = LANGS[i].code === lang;
      langRects.push({ x: cx, y: y, w: cell, h: h, code: LANGS[i].code });
      if (sel) {
        ctx.fillStyle = "rgba(255,212,0,0.18)";
        roundRect(cx + 3, y + 2, cell - 6, h - 4, 8); ctx.fill();
        ctx.lineWidth = 2; ctx.strokeStyle = "#ffd400";
        roundRect(cx + 3, y + 2, cell - 6, h - 4, 8); ctx.stroke();
      }
      ctx.globalAlpha = sel ? 1 : 0.62;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.font = "bold 14px 'Segoe UI', sans-serif";
      ctx.fillStyle = sel ? "#ffd400" : "#fff";
      ctx.fillText(LANGS[i].code.toUpperCase(), cx + cell / 2, y + h / 2 + 1);
      ctx.globalAlpha = 1;
      ctx.textBaseline = "alphabetic";
    }
    ctx.textAlign = "center";
  }

  // Mod seçim ekranı (kompakt tile ızgarası + son sırada "yakında" boş yer)
  function drawModesMenu() {
    const pad = 16, cardGap = 9;
    const cols = W < 400 ? 2 : 3;
    const total = MODE_KEYS.length;
    const rows = Math.ceil(total / cols);
    const cardH = 90;
    const boxW = Math.min(560, W - 18);
    const gridW = boxW - pad * 2;
    const cardW = (gridW - (cols - 1) * cardGap) / cols;
    const headH = 60, footH = 34;
    const boxH = headH + rows * cardH + (rows - 1) * cardGap + footH;
    const x = (W - boxW) / 2;
    let y = H / 2 - boxH / 2 - 8; if (y < 8) y = 8;
    menuBox(x, y, boxW, boxH);

    ctx.textAlign = "center";
    ctx.fillStyle = "#ffd400";
    ctx.font = "bold 22px 'Segoe UI', sans-serif";
    ctx.fillText(t("select_mode"), W / 2, y + 34);
    backRect = { x: x + 14, y: y + 15, w: 64, h: 30 };
    drawBack(backRect);

    const gridX = x + pad, gridY = y + headH;
    modeRects = [];
    for (let i = 0; i < total; i++) {
      const c = i % cols, r = Math.floor(i / cols);
      const cardX = gridX + c * (cardW + cardGap);
      const cardY = gridY + r * (cardH + cardGap);
      const key = MODE_KEYS[i];
      modeRects.push({ x: cardX, y: cardY, w: cardW, h: cardH, key: key });
      drawModeTile(cardX, cardY, cardW, cardH, MODES[key], key === mode, loadBest(key));
    }

    ctx.textAlign = "center";
    ctx.fillStyle = "rgba(255,255,255,0.7)";
    ctx.font = "13px 'Segoe UI', sans-serif";
    ctx.fillText(t("tap_mode"), W / 2, y + boxH - 13);
  }

  // Karışım (Custom) builder: max 4 mod seç → mekanikler birleşir
  function drawCustomMenu() {
    const accent = MODES.karisim.accent;
    const pad = 16, gap = 8, cols = 2;
    const rows = Math.ceil(CUSTOM_POOL.length / cols);
    const cardH = 50;
    const boxW = Math.min(520, W - 18);
    const gridW = boxW - pad * 2;
    const cardW = (gridW - (cols - 1) * gap) / cols;
    const headH = 82, footH = 60;
    const boxH = headH + rows * cardH + (rows - 1) * gap + footH;
    const x = (W - boxW) / 2;
    let y = H / 2 - boxH / 2 - 8; if (y < 8) y = 8;
    menuBox(x, y, boxW, boxH);

    // başlık + geri
    ctx.textAlign = "center"; ctx.fillStyle = "#ffd400";
    ctx.font = "bold 22px 'Segoe UI', sans-serif";
    ctx.fillText("🧪 " + modeName(MODES.karisim), W / 2, y + 32);
    backRect = { x: x + 14, y: y + 14, w: 64, h: 30 }; drawBack(backRect);
    // alt başlık + sayaç
    ctx.font = "13px 'Segoe UI', sans-serif";
    ctx.fillStyle = "rgba(255,255,255,0.7)";
    ctx.fillText(tf("custom_hint", { n: CUSTOM_MAX }), W / 2, y + 56);
    ctx.fillStyle = accent;
    ctx.font = "bold 14px 'Segoe UI', sans-serif";
    ctx.fillText(customSel.length + " / " + CUSTOM_MAX, W / 2, y + 74);

    // seçilebilir mod çipleri
    const gridX = x + pad, gridY = y + headH;
    customRects = [];
    for (let i = 0; i < CUSTOM_POOL.length; i++) {
      const key = CUSTOM_POOL[i];
      const m = MODES[key];
      const c = i % cols, r = Math.floor(i / cols);
      const cx = gridX + c * (cardW + gap), cy = gridY + r * (cardH + gap);
      const on = customSel.indexOf(key) !== -1;
      customRects.push({ x: cx, y: cy, w: cardW, h: cardH, key: key });
      // arka plan
      ctx.fillStyle = on ? hexA(m.accent, 0.30) : "rgba(255,255,255,0.05)";
      roundRect(cx, cy, cardW, cardH, 11); ctx.fill();
      ctx.lineWidth = on ? 2.5 : 1;
      ctx.strokeStyle = on ? m.accent : "rgba(255,255,255,0.14)";
      roundRect(cx, cy, cardW, cardH, 11); ctx.stroke();
      // ikon
      ctx.font = "20px 'Segoe UI Emoji', sans-serif";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillStyle = "#fff";
      ctx.fillText(m.icon, cx + 24, cy + cardH / 2 + 1);
      // isim
      ctx.textAlign = "left"; ctx.textBaseline = "middle";
      ctx.fillStyle = on ? "#fff" : "rgba(255,255,255,0.9)";
      const nm = fitText(modeName(m), cardW - 74, 14, 10, "bold");
      ctx.fillText(nm, cx + 44, cy + cardH / 2 + 1);
      // seçili işareti
      if (on) {
        ctx.beginPath(); ctx.arc(cx + cardW - 18, cy + cardH / 2, 10, 0, Math.PI * 2);
        ctx.fillStyle = m.accent; ctx.fill();
        ctx.fillStyle = "#0a1a16"; ctx.font = "bold 13px 'Segoe UI', sans-serif";
        ctx.textAlign = "center"; ctx.fillText("✓", cx + cardW - 18, cy + cardH / 2 + 1);
      }
      ctx.textBaseline = "alphabetic";
    }

    // OYNA butonu
    const on = customSel.length > 0;
    const bw = Math.min(240, gridW), bh = 40;
    const bx = W / 2 - bw / 2, by = y + boxH - footH + 8;
    customPlayRect = { x: bx, y: by, w: bw, h: bh };
    const bg = ctx.createLinearGradient(bx, by, bx, by + bh);
    if (on) { bg.addColorStop(0, hexA(accent, 0.95)); bg.addColorStop(1, hexA(accent, 0.72)); }
    else { bg.addColorStop(0, "rgba(255,255,255,0.10)"); bg.addColorStop(1, "rgba(255,255,255,0.05)"); }
    ctx.fillStyle = bg;
    roundRect(bx, by, bw, bh, bh / 2); ctx.fill();
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.font = "bold 17px 'Segoe UI', sans-serif";
    ctx.fillStyle = on ? "#062018" : "rgba(255,255,255,0.4)";
    ctx.fillText("▶ " + t("play"), W / 2, by + bh / 2 + 1);
    ctx.textBaseline = "alphabetic"; ctx.textAlign = "center";
  }

  // ===================== MARKET =====================
  function drawMarketMenu() {
    const items = marketTab === "skins" ? SKINS : marketTab === "birds" ? BIRD_TYPES : TRAILS;

    const gridW = boxW - pad * 2;
    const cardW = (gridW - (cols - 1) * gap) / cols;
    const cardH = 104;
    const headH = 56, dealH = 76, tabsH = 38, msgH = 30;
    const gridH = rows * cardH + (rows - 1) * gap;
    const boxH = headH + dealH + 12 + tabsH + 12 + gridH + msgH;
    const x = (W - boxW) / 2;
    let y = H / 2 - boxH / 2 - 6; if (y < 8) y = 8;
    menuBox(x, y, boxW, boxH);

    // başlık + geri + altın
    ctx.textAlign = "center"; ctx.fillStyle = "#ffd400";
    ctx.font = "bold 22px 'Segoe UI', sans-serif";
    ctx.fillText(t("market_title"), W / 2, y + 34);
    backRect = { x: x + 14, y: y + 14, w: 64, h: 30 }; drawBack(backRect);
    drawPill(x + boxW - 118 - 14, y + 15, 118, 28, "💰 " + coins, "#ffd400");

    // günün fırsatı
    const deal = dailyDeal();
    const dy = y + headH;
    drawDealBanner(x + pad, dy, gridW, dealH, deal);

    // sekmeler
    const ty = dy + dealH + 12;
    drawMarketTabs(x + pad, ty, gridW, tabsH);

    // ürün ızgarası
    const gy = ty + tabsH + 12;
    marketRects = [];
    for (let i = 0; i < items.length; i++) {
      const c = i % cols, r = Math.floor(i / cols);
      const cx = x + pad + c * (cardW + gap);
      const cyy = gy + r * (cardH + gap);
      drawMarketCard(cx, cyy, cardW, cardH, kind, i);
    }

    ctx.textAlign = "center";
    if (frame < marketMsgUntil && marketMsg) {
      ctx.font = "bold 14px 'Segoe UI', sans-serif"; ctx.fillStyle = "#ffe066";
      ctx.fillText(marketMsg, W / 2, y + boxH - 11);
    } else {
      ctx.font = "12px 'Segoe UI', sans-serif"; ctx.fillStyle = "rgba(255,255,255,0.5)";
      ctx.fillText("🔥 " + tf("deal_ends", { h: hoursToReset() }), W / 2, y + boxH - 11);

  function drawMarketTabs(x, y, w, h) {
    marketTabRects = [];
    const tabs = [
      { id: "skins",   label: t("tab_skins") },
      { id: "birds",   label: t("tab_birds") },
      { id: "effects", label: t("tab_effects") }
    ];
    const gap = 8, cell = (w - gap * 2) / 3;
    for (let i = 0; i < 3; i++) {
      const cx = x + i * (cell + gap), sel = marketTab === tabs[i].id;
      marketTabRects.push({ x: cx, y: y, w: cell, h: h, tab: tabs[i].id });
      ctx.fillStyle = sel ? "rgba(255,212,0,0.18)" : "rgba(255,255,255,0.06)";
      roundRect(cx, y, cell, h, 10); ctx.fill();
      ctx.lineWidth = 2; ctx.strokeStyle = sel ? "#ffd400" : "rgba(255,255,255,0.15)";
      roundRect(cx, y, cell, h, 10); ctx.stroke();
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.font = "bold 13px 'Segoe UI', sans-serif";
      ctx.fillStyle = sel ? "#ffd400" : "rgba(255,255,255,0.75)";
      ctx.fillText(tabs[i].label, cx + cell / 2, y + h / 2 + 1);
      ctx.textBaseline = "alphabetic";
    }
    ctx.textAlign = "center";
  }

  function drawMarketCard(x, y, w, h, kind, i) {
    const own = itemOwned(kind, i);
    const sel = itemSelected(kind, i);
    marketRects.push({ x: x, y: y, w: w, h: h, kind: kind, i: i });

    ctx.fillStyle = sel ? "rgba(255,212,0,0.14)" : "rgba(255,255,255,0.05)";
    roundRect(x, y, w, h, 12); ctx.fill();
    ctx.lineWidth = sel ? 2.5 : 1.2;
    ctx.strokeStyle = sel ? "#ffd400" : "rgba(255,255,255,0.14)";
    roundRect(x, y, w, h, 12); ctx.stroke();

    const cx = x + w / 2;
    drawItemPreview(kind, i, cx, y + 30, own);

    ctx.textAlign = "center"; ctx.font = "11px 'Segoe UI', sans-serif";
    ctx.fillStyle = "rgba(255,255,255,0.88)";
    ctx.fillText(itemName(kind, i), cx, y + 62);

    // fırsat rozeti
    const deal = dailyDeal();
    const isDeal = deal.kind === kind && deal.i === i && !own;
    if (isDeal) {
      ctx.fillStyle = "#c0392f";
      roundRect(x + w - 40, y + 6, 34, 16, 6); ctx.fill();
      ctx.fillStyle = "#fff"; ctx.font = "bold 9px 'Segoe UI', sans-serif";
      ctx.fillText(tf("deal_off", { p: deal.pct }), x + w - 23, y + 17);
    }

    // durum çubuğu
    const bx = x + 8, by = y + h - 26, bw = w - 16;
    if (sel) {
      drawCardBtn(bx, by, bw, 19, t("equipped"), "#2f8f4a", true);
    } else if (own) {
      drawCardBtn(bx, by, bw, 19, t("equip"), "#2f6f9f", true);
    } else {
      const price = itemPrice(kind, i), afford = coins >= price;
      drawCardBtn(bx, by, bw, 19, "💰 " + price, afford ? (isDeal ? "#c0392f" : "#b8860b") : "#555555", afford);
    }
  }

  function drawCardBtn(x, y, w, h, text, color, filled) {
    ctx.fillStyle = filled ? hexA(color, 0.9) : hexA(color, 0.25);
    roundRect(x, y, w, h, 8); ctx.fill();
    ctx.lineWidth = 1; ctx.strokeStyle = hexA(color, 0.95);
    roundRect(x, y, w, h, 8); ctx.stroke();
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.font = "bold 11px 'Segoe UI', sans-serif"; ctx.fillStyle = "#fff";
    ctx.fillText(text, x + w / 2, y + h / 2 + 0.5);
    ctx.textBaseline = "alphabetic";
  }

  // Ürün önizlemesi: renk ikonu / mini kuş / iz swoosh
  function drawItemPreview(kind, i, cx, cy, unlocked) {
    ctx.save();
    if (kind === "skin") {
      drawSkinIcon(cx, cy, 15, SKINS[i], unlocked);
    } else if (kind === "type") {
      ctx.save();
      ctx.globalAlpha = unlocked ? 1 : 0.45;
      ctx.translate(cx - 2, cy); ctx.scale(0.6, 0.6);
      paintBird(BALL_R, SKINS[selectedSkin], BIRD_TYPES[i], Math.sin(frame * 0.2));
      ctx.restore();
      if (!unlocked) { ctx.font = "16px 'Segoe UI Emoji', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText("🔒", cx, cy); ctx.textBaseline = "alphabetic"; }
    } else {
      drawTrailPreview(i, cx, cy, unlocked);
    }
    ctx.restore();
  }

  function drawTrailPreview(i, cx, cy, unlocked) {
    const tr = TRAILS[i];
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    if (tr.id === "none") {
      ctx.font = "22px 'Segoe UI Emoji', sans-serif";
      ctx.fillText("🚫", cx, cy); ctx.textBaseline = "alphabetic"; return;
    }
    const rc = ["#ff004c", "#ff8a00", "#ffe000", "#2ecc40", "#0074d9", "#b10dc9"];
    for (let k = 0; k < 6; k++) {
      const px = cx - 17 + k * 6, rr = 1.6 + k * 0.9;
      ctx.globalAlpha = (unlocked ? 1 : 0.4) * (0.3 + k * 0.12);
      ctx.fillStyle = tr.rainbow ? rc[k] : tr.cols[k % tr.cols.length];
      ctx.beginPath(); ctx.arc(px, cy, rr, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.font = "16px 'Segoe UI Emoji', sans-serif";
    ctx.fillText(tr.icon, cx + 18, cy);
    ctx.textBaseline = "alphabetic";
  }

  function drawDealBanner(x, y, w, h, deal) {
    dealRect = { x: x, y: y, w: w, h: h };
    const own = itemOwned(deal.kind, deal.i);
    const g = ctx.createLinearGradient(x, y, x + w, y);
    g.addColorStop(0, "rgba(192,57,47,0.9)"); g.addColorStop(1, "rgba(200,140,20,0.9)");
    ctx.fillStyle = g; roundRect(x, y, w, h, 12); ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = "#ffd400"; roundRect(x, y, w, h, 12); ctx.stroke();

    ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
    ctx.fillStyle = "#fff"; ctx.font = "bold 12px 'Segoe UI', sans-serif";
    ctx.fillText(t("daily_deal"), x + 14, y + 19);

    drawItemPreview(deal.kind, deal.i, x + 32, y + 50, own);

    ctx.textAlign = "left"; ctx.fillStyle = "#fff"; ctx.font = "bold 15px 'Segoe UI', sans-serif";
    ctx.fillText(itemName(deal.kind, deal.i), x + 58, y + 46);

    // taban fiyat (üstü çizili)
    ctx.font = "12px 'Segoe UI', sans-serif"; ctx.fillStyle = "rgba(255,255,255,0.75)";
    const baseTxt = "💰" + deal.base;
    ctx.fillText(baseTxt, x + 58, y + 64);
    const bw2 = ctx.measureText(baseTxt).width;
    ctx.strokeStyle = "rgba(255,255,255,0.85)"; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.moveTo(x + 58, y + 60); ctx.lineTo(x + 58 + bw2, y + 60); ctx.stroke();

    ctx.textAlign = "right";
    if (own) {
      ctx.font = "bold 14px 'Segoe UI', sans-serif"; ctx.fillStyle = "#dfffe0";
      ctx.fillText("✓ " + t("owned_lbl"), x + w - 14, y + h / 2 + 4);
    } else {
      ctx.font = "bold 21px 'Segoe UI', sans-serif";
      ctx.fillStyle = coins >= deal.price ? "#fff" : "#ffecec";
      ctx.fillText("💰" + deal.price, x + w - 14, y + 46);
      ctx.font = "bold 12px 'Segoe UI', sans-serif"; ctx.fillStyle = "#ffe066";
      ctx.fillText(tf("deal_off", { p: deal.pct }), x + w - 14, y + 64);
    }
    ctx.textAlign = "center";
  }

  function drawSettingSlider(x, y, w, label, key) {
    const val = CONFIG[key] == null ? 0 : CONFIG[key];
    ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
    ctx.font = "bold 14px 'Segoe UI', sans-serif"; ctx.fillStyle = "rgba(255,255,255,0.9)";
    ctx.fillText(label, x, y);
    ctx.textAlign = "right"; ctx.fillStyle = "#ffd400";
    ctx.fillText(val + "%", x + w, y);

    const ty = y + 18, th = 8;
    sliderRects.push({ x: x, y: ty - 12, w: w, h: th + 24, key: key });   // geniş tık/tutuş alanı
    ctx.fillStyle = "rgba(255,255,255,0.15)"; roundRect(x, ty, w, th, 4); ctx.fill();
    const fw = w * val / 100;
    ctx.fillStyle = "#ffd400"; roundRect(x, ty, Math.max(th, fw), th, 4); ctx.fill();
    const kx = x + fw;
    ctx.beginPath(); ctx.arc(kx, ty + th / 2, 9, 0, Math.PI * 2);
    ctx.fillStyle = "#fff"; ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = "#e0a000"; ctx.stroke();
  }

  function drawSettingToggle(x, y, w, label, key) {
    const on = !!CONFIG[key];
    ctx.textAlign = "left"; ctx.textBaseline = "middle";
    ctx.font = "bold 14px 'Segoe UI', sans-serif"; ctx.fillStyle = "rgba(255,255,255,0.9)";
    ctx.fillText(label, x, y + 14);
    const tw = 60, th = 28, tx = x + w - tw, ty = y;
    toggleRects.push({ x: tx, y: ty, w: tw, h: th, key: key });
    ctx.fillStyle = on ? "rgba(47,143,74,0.95)" : "rgba(120,120,120,0.5)";
    roundRect(tx, ty, tw, th, th / 2); ctx.fill();
    ctx.beginPath(); ctx.arc(on ? tx + tw - th / 2 : tx + th / 2, ty + th / 2, th / 2 - 4, 0, Math.PI * 2);
    ctx.fillStyle = "#fff"; ctx.fill();
    ctx.textAlign = "center"; ctx.font = "bold 9px 'Segoe UI', sans-serif"; ctx.fillStyle = "#fff";
    ctx.fillText(on ? t("opt_on") : t("opt_off"), on ? tx + th / 2 + 3 : tx + tw - th / 2 - 3, ty + th / 2 + 1);
    ctx.textBaseline = "alphabetic";
  }
